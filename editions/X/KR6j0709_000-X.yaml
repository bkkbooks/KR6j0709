body:
  text: 釋教總論人之恒性廼上帝降衷人所同具者以其無思無為故謂之寂以其不可覩聞故謂之微以其無物故謂之虗以其無欲故謂之靜以其智周萬物故謂之覺而其歸不出於無之一言無者有之基也故寂以通天下之感靜以貞天下之動微以效天下之顯虗以御天下之實覺以神天下之應是謂千聖相傳無所倚之學漢儒徒以訓詁為學補綴張皇攷訂於形名器數之末取古聖賢已行之跡著為典要相守以為世法不知以無為用彼佛氏者見吾儒學術之弊奮然攘臂其間取吾學之精義據而有之於己凡古聖賢已行之跡一切掃歸於無而吾儒廼競競自守拘滯於形器之中終身煩惱而不自覺語及虗寂則曰此異端之教也避之惟恐不及不知佛氏所謂虗寂本吾儒之故物彼直竊而據焉韓歐原道本論欲以虗聲嚇之直指其粗迹耳請言其精有謂吾儒之學主於經世佛氏之學主於出世以為公私之辨者矣有謂躭悅禪味偏於靜虗者矣有謂絕情去念流於斷滅者矣有謂經是言詮直指單傳不立文字者矣夫佛氏慈悲喜捨普度眾生雖身命有所不惜未嘗自私也偏於靜虗乃二乘見解若上乘之禪從塵勞煩惱中作佛事於眾生心行中覓佛法未嘗厭動而有所偏也最上乘之禪亦以斷滅為外道於念離念即情忘情不即不離是究竟法未嘗絕情去念也經何有過何妨於誦此不立文字便是文字之相出息不涉於眾緣入息不居於陰界是謂轉經要法不能心悟反為法華所轉始落言詮爾此其大凡也善乎文中子之言曰佛為西方之聖人中則泥盖吾儒之學以萬物各得其所為盡性佛氏之教欲使萬物同歸寂滅不可以治天下家是則所謂泥也此又為儒者所當知龍溪王畿譔譯經便覽王鳳洲曰王荊公以誤解三昧字為釋門所譏余久不得頻婆末利花果二字義近於宋版翻譯名義集攷出怳若獲真珠舡者因修佛書中有常用而不能解或此解而不知彼音者悉錄之多陀阿伽陀如來也阿羅訶應供也又殺賊也又生觀也三藐三佛陀正徧知也亦云正徧覺也侈遮羅那三般那明行足也阿耨多羅無上也脩伽陀去也路迦憊世間解也富樓沙曇藐婆羅提可化丈夫調御師也舍多提婆魔㝹舍陀大人教師也路迦那他世尊也佛陀知者也佛覺也罽那尸棄寶髻也提洹竭然燈也毗婆尸一曰維衛也勝觀也毗舍浮一切自在也俱留孫所應斷也拘那含牟尼金寂也迦葉波飯光也袍休蘭羅大寶也即多寶佛阿彌陀無量壽也又為無量清淨阿閃無動也剌那伽羅寶積也提和羅耶天人王也盧舍那光明徧照也釋迦能仁也牟尼寂默也瞿曇純熟也姓也剎帝利王種也秦言田主須陀洹入流也斯陀含一往來也阿那含不來也菩薩菩提薩埵自覺覺眾生也文殊師利妙德也邲輪䟦陀普賢也阿那婆羅吉低輸觀世音也摩訶那鉢大勢至也迦陀妙義也阿迦雲藥王也達磨法也乾陀訶提不休息也維摩羅詰淨名也彌勒燕氏也提婆達多天授也阿差末無盡意也般若拘羅智積也那羅延金剛也阿羅漢總名殺煩惱遠離諸惡堪總供養不受三界生也舍利弗身子也又曰鶖子摩訶迦葉波大龜氏也阿那律無滅也須菩提善吉也又無染賓頭盧不動也難陀善歡喜也離婆多星宿也拘絺羅大膝也提婆犀那天軍也嗢呾羅上也迦留陀夷無光也優陀夷出現也須䟦陀羅好賢也耶輸陀羅華色也阿濕縛窶生馬鳴也那伽曷樹那龍猛也言龍樹誤訶梨䟦摩師子鎧也求那䟦摩功德鎧也阿僧伽無着也婆藪盤世親也言天親誤賓伽羅青目也及毗吠伽清辨也達磨波羅護法也達磨法也尹濕伐邏自在也那剌拏圓滿也尸羅跋陀羅戒賢也曷利他如意也鳩摩羅什婆童壽也佛陀耶舍覺明也曇摩耶舍法稱也曇摩讖法豐也曇無竭法勇也菩提流支覺孝也波羅末陀真諦也波頗智光也地婆訶羅日照也多羅救也波利護也宣灑弟子也比丘乞士也上乞法下乞食也芘蒭香草以喻僧也沙彌息慈也優婆塞優婆夷清淨士女也僧伽眾多也又和合也沙門本名宣摩那拏功勞也和尚本名即波遮迦于闐翻為和尚此去生又近誦也闍梨本名阿遮梨邪軌範也頭陀抖數也又修治也羯磨事也鐸曷攞小師也阿夷怡新學也提多羅咤治國主也忉利本名多羅夜大梵西音此名離欲又淨行也尸棄火也首陀羅淨居也摩利支陽炎也耆婆命也蘇利耶日神也蘇摩月神也印度日月也盎我羅迦火星也部陀水星也勿哩訶婆䟦底木星也沙乃以宣折囉土星也戌羯羅金星也阿那婆達多無熱也夜叉勇健也伊羅息氣也羅剎連疫鬼也乾闥婆香陰也天樂神阿脩羅無端正也又非天迦樓羅金翅也緊那羅疑神也波旬本名波卑夜惡也魔登伽本性也阿斯陀無比也又端正羼提忍辱也婆藪天慧也魔㝹舍喃人也摩菟賖意也僕呼繕那眾生也逋沙丈夫也迦羅越居士也婆羅毛道也鄔婆弟鑠父母也波帝夫也婆棃耶婦也鳩那羅惡人也拘摩羅童子也般咤黃門也扇提羅石女也䭾索迦奴也旃陀羅嚴熾也即屠者羯恥那煑拘人也須達多善施也耆婆能活也婆羅門淨行也梵志淨裔也娑毗迦羅金頭也又黃髮蘇氣怛羅善星也彌戾車惡見也薩遮尼乾離繫也琰魔亦曰閻羅靜息也又雙生闍黎哆祖父也鳩槃茶甕形也是魘鬼毗舍闍顛鬼也烏芻瑟摩火頭也惡祖尼火神也婆庾風神也鉢健提堅固也婆里旱力士也地㗚伽長大也兮那柯滿也底栗車畜也那伽龍也宮毗羅蛟也叔叔邏虬也僧伽彼獅子也迦耶象也瞿摩帝牛也婆蹉富羅犢子也朅伽犀也阿濕婆馬也蜜利迦羅鹿也𫹯伽羅野干也摩斯咤稱猴也舍舍迦兔也迦陵頻伽妙聲鳥也嘶那夜鷹也臊陀鸚鵡也僧娑鴈也迦頻闍羅雉也鳩鳩咤鷄也所迦羅婆鴛鴦也舍羅百舌也迦布德迦鴿也摩由邏孔也阿棃耶鴟也姑栗陀鷲也揭羅闍雕也毗囉拏羯車婆龜也摩竭鯨也失収摩羅鰐也泥犁耶無有也地獄名阿鼻無間也三摩耶假時也因陀羅天主也帝也遮閱那王也摩訶三摩阿羅遮太平寺王也薩縛達一切施也尼毗也與也䯉剎惡也波斯匿和悅也阿闍世未生也阿育無憂也尸羅阿迭多戒日也祇陀戰勝也摩訶摩耶大術也末提希思惟也索訶一曰娑婆能忍也閻浮提勝金也單越勝處也羅閱祇伽羅王舍城也拘尸那角城也伽耶山城也𦋺賓賤種也烏仗那苑也赭時石國也颯秼建康國也屈霜你迦何國也史有何國人弭秼賀米國也屈支龜茲也脂那一云支那文物國也蔑戾車邊地也蘇迷慮即須彌妙高也耆闍崛鷲頭也屈屈咤播陀鷄足也補陀落迦海島也今定海中山有此名優留曼陀大醍醐也蘇達梨舍那善見也額溫縛拏篤耳也阿濕麼石也阿迦水也阿耨達無熱惱也殑伽天堂也婆竭羅城海也賀邏駄池也提洲也婆那林也畢利叉高顯也阿輸迦無憂花樹也娑力叉樹也軻梨羅苦梗木也多羅舊名息多岸也尸多婆那一名尸陀寒林也鐸佉嚼楊枝也頗羅果也菴羅柰也頻婆相思也訶梨勒天主持來也播囉師胡祧也鎮頭迦柿也篤迦栗也居陵迦李也布瑟波花也弗把提天花也末利花柰花也曼陀羅雜色也優鉢羅黃白色花也婆羅羅重生也分陀利白蓮也漚鉢羅青蓮也鉢特摩赤蓮也拘某陀黃蓮也乾陀羅耶香也栴檀離垢也瞻博一曰瞻蔔黃色香花也迦箄藿也咄嚕瑟劍蘇合也杜嚕薰陸也突婆茅香也羯布羅龍腦也薩闍羅婆白膠也莫莫訶婆伽麝香也多揭羅芸香也阿伽嚧沉香也拙具羅安息也茶矩磨金也蘇伐羅金也䟦折羅金剛也阿路巴銀也鉢擺娑福羅珊瑚也阿濕摩揭婆琥珀也牟婆洛揭拉婆車渠也摩羅伽隷瑪瑙也牟尼珠名離垢也鉢摩羅伽赤色珠也甄叔迦赤寶也吉由羅瓔珞也彌訶金帶也曷剌怛那揭婆寶臺也洛叉十萬也俱胝百億也那由它萬億也阿僧祇無央數也佉梨斛也婆訶篅也受二十斛摩偷又宰唎翻酒也毗嵐迅猛風也差羅波尼灰水也朱利草賊也薩裒煞地蛇藥也優檀那印也婆利曲鈎也亟縛屣𩍣也舍樓伽藕根也俱蘭吒色也伊尼延金色也蘇樓波妙色也尼羅青也阿羅那赤也盧醯坦迦又迦沙野同叔離白也訖里瑟拏黑又迦茶里也健陀羅黃也羅差紫也氷伽羅蒼也修多羅又素怛纜經也毗柰耶善治也又為毗尼減也律也阿毗曇無比法也又奢薩怛羅論也俱舍藏也祇夜重頌也和伽那授記也尼陀那因緣也阿波陀那譬喻也伊帝目多伽本事也闍陀伽本生也毗佛略方廣也阿浮達摩未曾有也阿含本阿笈多教也又法歸也首楞嚴健樹也楞伽本𤦫沙不可往也薩達磨芬陀利妙法蓮花也般舟佛立也摩訶袒持大秘要也盂蘭倒懸也本名烏藍婆拏救倒懸也脩䟦拏婆頗婆多摩金光明也曇無德本曇摩毱多法密隱覆又法藏也薩婆多一切有也摩訶僧祇大眾也犍度本婆犍圖法聚也瑜伽師地相應也毗婆沙廣解也鼻婆沙種種說也毗勒篋藏也毗婆闍婆提分別論也波羅密木叉解脫也三昧調直定也又正定也正受也末底慧也檀那布施也尸羅清涼也羼提安忍也又忍辱也毗梨耶精進也禪那精進也般若智慧也阿羅密遠離也波羅密度彼岸也波羅伽同豆佉苦也三牟提耶集也尼樓陀滅也末伽道也奢摩它止也毗婆舍那觀也憂畢叉平等也毗䟦耶斯四念處也摩奴是若如意也娑羅力也尼坻願也薩婆迦摩樂欲也浮曇未至誠也懺摩本叉摩忍也地底迦有媿也波娑提伽即梵摩清淨也羯摩業也又事也布薩淨住也鉢剌婆剌拏隨意也唄匿止也又梵唄梵音音敗讚嘆也婆闍尼娑婆啉聲音也鉢底婆辨才也槃那𥧌訛曰和南我禮也那謨悉羯羅禮拜也南無或那謨或南摩歸命也又恭敬也歸命覺也信從也彌羅慈也迦樓那悲也阿檀或阿捺摩無我也阿蘭那無諍也又寂淨也䭾那演那靜慮也毗怛迦尋也毗遮羅伺也三跋羅護也三跋致發趣也達嚫財施也摩訶般涅槃那大滅度也又圖寂也涅言不生槃言不滅阿耨多羅三藐三菩提阿無也耨多羅上也三藐正徧也等也菩提覺也又道也阿娑磨無等等也目帝羅解脫也阿䟦致不退轉也膩地依也陀羅尼能持也又持也薩怛多般怛羅白傘盖也蘇盧都訶決定也胡蘇多除一切蒸熱惱也密奢兜金鼓也呾你也他所謂也娑婆訶善說也又解去也爾焰所知也多伽稍根智也漚和俱舍羅方便也阿提初也阿耨波陀不生也羅闍垢也波羅末陀第一義也遮梨夜行也那不也邏求輕也陀摩善也婆陀縛也茶闍它不熱也沙六也和波陀語言也多它如也夜他跋實也吒婆障碍也迦邏作者也娑娑一切也磨磨迦羅我所也迦陀底也闍提闍羅生也䭾摩法性也賒多寂滅也叉耶盡也若那智也阿施義也婆伽破也伽車提去也火夜喚來也未嗟羅慳也伽那厚也歌大眾也遮羅地動也彼茶必也便善那文身也那摩名也波陀句也跋渠品也都羅喜也摩訶羅無知也喝薩訛也娑度善哉也阿呼奇哉也闍維本茶毗焚燒也陀阿燒也僧柯慄多弭有為也般遮于瑟五年一大會也似以三字釋五而以一字貫三四義四毗舍羅無慳義也麗毗細滑也烏瑟膩沙佛頂也母陀羅結印手也迦私光也舍利骨身也頻娑帳者身影也離佉書也毗伽羅也攝拖苾䭾聲明也韋陀智論也僧佉論本僧企耶數術也崽無勝也勒沙婆苦行也路伽耶順世也又善論也逆路伽耶陀左世也又惡論也殺三摩娑離合也達梨舍那見也尼延底深入也羯吒斯愛也參何癡也何耆毗伽邪命也阿羅伽欲也奢陀諂曲也質多耶心也污栗䭾草木心也紇利陀耶肉團心也末那意也阿陀那執持也菴摩羅清淨識也乾栗陀耶真實心也塞健陀蘊也鉢羅味奢入也䭾都界也歌羅邏凝滑也頞部曇胞也蔽尸凝結也健男凝厚也鉢羅奢佉形位也娑路多羅戌縷多能聞也迦羅尼羯羅拏能嗅也砥若時吃縛能甞也鼻鼓迦種也攝提假也優陀那丹田也阿那遣來也入息般那遣去也出息烏波有也薩迦耶薩無常也作那生也末剌諵生死也生死總名又曰闍提闍迦摩羅黃病也阿薩闍不可治病也珊若娑癈風病也剎摩本掣多羅丈田也剌瑟胝竿也即幡柱也羅摩院也招提本名招鬪提奢四方僧物也訛為招提翻作別房施又對而施阿蘭若遠離處也一作閑靜處僧伽藍眾園也那爛陀施無厭也林微尼解脫處也阿奢理貳奇時也窣堵波方項也又員塚又高顯也梵名塔婆發訛為浮圖浮圖者聚相也支提可供養處也舍磨奢那塚也健陀俱胝香室也滿茶邏壇也脫闍幢也拘吒迦小舍也揵推磬也又鐘也舍羅籌也隙棄羅錫杖也軍持瓶也本名捃稚迦甆瓦淨用銅鐵觸用鉢里薩羅伐拏濾水羅也鈴塞莫數珠也鉢多羅應器也即鉢也徤𨩲淺鐵鉢也俱夜羅隨鉢器也震越衣服也袈裟去穢也一云不正色一云離染服僧伽梨合也重也又重複衣多羅僧上著衣也即七條安陀會中宿衣也鉢吒縵條也一幅褥成尼師壇坐具也僧祇支掩掖也泥縛些那裙也舍勒內衣也迦絺那功德衣也憍奢耶蠱衣也蠶所成屈眴大細布也睒婆木綿也迦波羅劫貝也即木綿迦隣陀衣細綿衣也兜羅綿細香也一翻楊華欽䟦羅毛也頭鳩羅細布也芻摩麻衣也那波吒絹也摩羅蔓也逋沙他齋也烏䀯沙它受齋也蒲闍尼正食也佉闍尼不正食也半者蒲善尾五噉食也半者珂但尼五爵食也佉陀尼可食物也鉢和羅自恣食也分衛乞食也但鉢那也迦師錯麥也
