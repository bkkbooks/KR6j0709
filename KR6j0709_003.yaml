body:
  text: 大佛頂如來密因修證了義諸菩薩萬行首楞嚴經第八阿難如是衆生一一類中至具足如斯虗妄亂想孤山曰元是真具具無具相一切皆空如是了知始可議道溫陵曰以一一類心妄種皆具一則現起名事造餘則冥伏名理具以妄本無體元是真心溫陵曰十二顛倒即動顛倒欲顛倒至殺顛倒也以是妄擾真心而成八萬四千亂想各具即互具汝今修證佛三摩地至三者增進違其現業吳興曰除去毒蜜喻除其助因及刳其正性也湯水如正行灾香如助行甘露辟所證之理長水曰前問至何漸次得修行目今此二正行故云真修孤山曰言漸次者事漸理圓不同偏教之漸也問此三漸次於天台六即中屬何位邪答名字中修能成觀行及發真似也云何助因阿難如是世界至第一增進修行漸次吳興曰食甘等舉段食之損益欲除五辛之助因也以五辛能發淫恚猶毒死之食焉孤山曰五辛者楞伽經云𦵇蒜韭薤興渠也應法師云興渠梵音訛也正云興宜慈愍三藏云根如蘿蔔出土辛臭慈愍冬至彼土不見其苗則此方無故不翻也溫陵曰四食者人間段食謂所餐必有分段鬼神觸食但歆觸而飽禪天思食食至或但思之而飽識天識食既無形色但以識想此直明衆生皆衣食住而因食戒斷五辛不必他引也五辛內發淫故名助因也恚外引邪魅云何正性阿難如是衆生至第二增進修行漸次泐潭曰清淨戒律即四棄也吳興曰不淫故無相生乃至不妄故不還宿債以大妄語貪其供養故約位言之此應在外凡觀行之中資中曰此如法華現身所得六根清淨即相似位也溫陵曰欲刳淫殺正性必持戒律不飲酒防亂之至也不噉生防殺生至也律中五果皆須火淨示不噉生氣也淫如毒蛇怨賊者能害法身殺慧命故也執身使無犯也執心使無思犯也淫殺相襲偷劫相負由無禁遏故禁戒成就二業永無業性刳盡則妙性圓明云何現業阿難如是清淨至第三增進修行漸次泐潭曰三種漸次以戒為體長水曰世界清淨皎如琉璃則真空之體現矣所謂清淨奢摩他如鏡現諸像也吳興曰此中別指初住以上名為聖位若下文云以三增進故能成五十五位真菩提路則通取十信也補注曰密理也圓智也淨妙行也即法身等三德携李曰孤山以瓔珞五十二位對今辨之有一合三開之相一合者合十信為乾慧地也三開者開初住為十信心開十向為四加行開等覺為金剛乾慧也說惟四則道溫陵曰流逸奔塵起現前業由戒禁制得不流逸斯能違遠因不流逸由斷客塵煩惱也旋元自歸漸入如來藏理也塵既不緣下此又進破根本無明也前屬以位但云不多流逸今取真證乃是根塵泯亡逆無明流純一真性微細生滅六用不行故國土身心妙圓清淨與如來合故一切如來密圓之心淨妙之性皆現其中也華嚴十忍第三曰無生法忍謂不見有少法生不見有少法滅離諸情垢無作無願安住是道名之曰忍言法忍者即乾慧地無間道也業淨性明乃可發行升進聖位五十七位各隨行相立名使觀其名義知所修進也吳興曰上三漸次且約粗細前後分別若圓修者豈不以違其現業為創心發觀之本歟故第一漸次即云修菩提者永斷五辛也當知菩提無漸次漸次取菩提辟如滄溟太霄詎有涯量由操舟舉翮之異而里數生焉此下乾慧地等即後二漸次之所階也阿難是善男子欲愛乾枯至乾有其慧名乾慧地吳興曰是善男子指圓教外凡之人也吳興曰人法二執了無實性故曰執心虛明即惑成智體具寂照故曰罃十方界大品十地初名乾慧天台於圓教十信前立五品位且曰義推如大品乾慧地也噫智者隨時此經未至而所立名位懸契佛心非聖人孰能是哉溫陵曰欲愛潤惑根境造業生死相續唯此而已故欲枯境謝則殘質不續無所汩雜故執忍虗明純是智慧然初入位未與如來法流水接則乾有其慧而已聖位始於十住而以信為初因又於信前立乾慧地前立四加妙前立金剛乾慧者此三為轉位關要升進方便初從凡發迹慧性不圓不能入信成賢賢行既成不加功用不能登地成聖聖位既終非金剛慧斷不能造妙成佛也欲習初乾未與如來至中道純真名信心住吳興曰以觀行心緣中道理相續無間流入初信真際曰言圓妙開敷者即見惑先落三諦似顯也從真妙圓等釋成上句謂從乾慧真妙圓心重發此位真妙信心心與理冥故曰妙信常住長水曰捨欲愛超乾慧猶在凡地未入法流故須於如來薩婆若海中中流入無所偏滯則圓妙之性於是開敷然猶餘妄習非真妙圓又須從真妙圓重發真妙而常住妙信使一切妄想滅盡無餘中中之道純真無妄故名信心住餘皆由此增進更無別法真信明了一切圓通至得無遺忘名念心住真際曰心真而明則一切圓通而陰等不礙故能洞照宿習憶治無遺泐潭曰能習氣名為念心陰處界三即世間生處習氣也吳興曰捨身受身即分段生死也一切習氣即思惑正使也故下文明五不還天所斷欲惑亦名習氣又應通指二死為捨身總名五住為習氣妙圓純真真精發化至進趣真淨名精進心孤山曰前雖憶念習氣未融此則精明故得發化吳興曰化變也變諸妄習純成真明言其精也惟以下示其進也溫陵曰妙圓通性既純既真則妄習皆化唯一精明而進乎真淨行無雜糅故名精通心精現前純以智慧名慧心住携李曰由精進而智慧則純明矣溫陵曰妄習既盡故心精現前而進趣云為純智無習矣執持智明周遍寂湛寂妙常凝名定心住孤山曰有慧無定至德不凝故以定凝慧溫陵曰慧既純明須定以持之吳興曰周遍寂湛謂定之用寂妙常凝謂定之體定光發明明性深入惟進無退名不退心長水曰定久生光湛極而動故能進也溫陵曰以定持慧至於寂湛故性也發明而深入於道心進安然保持不失十方如來氣分交接名護法心吳興曰久進涉動失於安然故須保持長水曰既能深入又能保持使道同十方氣合如來是謂護法吳興曰按圓位至此斷三界思盡即六根清淨之正位也配瓔珞屬七住將大品當佛地約婆沙齊三十四心智者云三藏佛位望六根清淨位有齊有劣同除四住此處為齊若伏無明三藏即劣既是真斷惑之大節故持示云十方如來氣分交接覺明保持能以妙力至重重相入名回向心資中曰由護法心進合如來得妙覺明護持不失故能妙回向回佛慈光則回果向因也向佛安住則回因向果也因果交參體用互攝故譬雙鏡云云吳興曰覺明保持即護法心也上氣分交接則自他心佛相應相冥今回佛慈光向于佛境則與智明相對相照故曰猶如雙鏡等又約十方如來對照亦然故曰其中妙影等携李曰回佛慈光向於己身回己身心向佛安住己身佛身彼此回向故如雙鏡心光密回獲佛常凝至得無遺失名戒心住吳興曰回向既成同佛常寂常寂之體即是無上妙淨明心安住此心正防無明微細之患故得戒名溫陵曰由回佛心光而得之於我故曰獲佛常凝無上妙淨常凝則對鏡無動妙淨則涉塵不染而戒心成矣住戒自在能遊十方所去隨顧名願心住興福曰戒不能拘故所去無礙吳興曰準天台圓教未斷無明生同居者名為願生正符此文也又說十信出假利益衆生今遊十方亦合其義真際曰對境無動涉塵不染是謂住戒自在無動無染則無適不可故能遊十方所去隨願也修行之初必枯絶欲愛使心性虗明然後能入法流開妙圓性真性明圓細習乃現遂發行治之使純智無習又持之以定使寂湛發光深入於道護持不失斯能回佛慈光獲佛淨戒而涉塵不染所去隨願此十信之序也阿難是善男子以真方便至圓成一心名發心住携李曰十種妙心圓成為一故得安住名發心住吳興曰真方便者謂真家之方便又真即方便皆以道心修故泐潭曰真方便妙慧也十心十信也十心頓發圓成一心住佛智地名發心住聖位以十信為初因信者真純無妄之謂以十住十行十願十地為漸次而終於等妙皆相攝而設欲令行人從信趍入住佛智地而依智起行濟行以願由是超三賢入十聖登等妙此修證之序也住者依無住智永不退還之謂心中發明如淨琉璃至履以成名治地住吳興曰能證心如琉璃所顯理如精金履治也依前心地以觀治之携李曰心中發明內外精瑩牒心精發暉義也履是妙心以為真基名曰治地如將築室必先治地乃可興作也心地涉知俱得明了遊履十方得無留礙名修行住泐潭曰由內外精瑩治成心地故所涉所知俱得明了則任運修進得無留礙吳興曰上治地由境得名此修行從智受稱境發於智故云心地涉知等以智遍修故云遊履十方等真際曰以心住境以境住心心境無奪故得明了行與佛同受佛氣分至入如來種名生貴住溫陵曰妙行密契則妙理冥感將生佛家為法王子故名生貴中陰喻冥感之理也現陰已謝後陰未生之中名曰中陰孤山曰分真智與究竟智等名行與佛同分證理與究竟理等名受佛氣分如中陰下以喻顯之究竟權智如父實智如母任運相合名自求父母密齊果德如陰信冥通斯即稟佛遺體初託聖胎也既遊道胎親奉覺胤至人相不缺名方便具足住孤山曰此喻雖在真因而自行利他之相同佛不缺也溫陵曰同妙行之氣分冥妙理之中陰是遊道胎奉覺胤也道胎既成故妙相不缺而修行方便具矣容貌如佛心相亦同名正心住孤山曰容貌喻應用心相喻理智溫陵曰容貌外同心相內異非正心也身心合成日益增長名不退住溫陵曰同佛之德有進無退孤山曰色心互融不相妨礙故曰合成十身靈相一時具足名童真住溫陵曰具體而微故以童稱十身者菩提身願身化身力身莊嚴身威勢身意生身福身法身智身也資中曰十身靈相即盧舍那也聲聞身緣覺身菩薩身如來身法身智身國土身業報身衆生身虗空身此十種身如隨色珠顯現自在菩薩雖未如佛分得此相形成出胎親為佛子名法王子住孤山曰出胎喻破第九住無明義從理起用亦如之紹隆佛種故云佛子溫陵曰自發心至生貴名入聖胎自方便具足至童真名長養聖胎至此長養功終故喻出胎王子表以成人如國大王至陳列灌頂名灌頂住孤山曰表以成人堪行佛事也陳列灌頂者華嚴云轉輪聖王所生太子母是正后身相具足坐白象寶妙金之座張大網縵奏諸音樂取四大海水置金瓶內王執此瓶灌太子頂是時即名受王職位菩薩受職亦復如是諸佛智水灌其頂故名為受大智職菩薩興福曰大國王天子也嫡嗣曰太子剎利王諸王也嫡嗣曰世子將付國位取大海水灌頂表為王當承用衆智今此位衆德潛備堪任佛事故表以成人陳列灌頂也言以國事分委則非正付國位特表成人而已蓋此方極十住若十地行滿乃堪正付故華嚴十地菩薩受佛職位此輪王太子受職夫發心必治地治地乃修行修行然後生如來家而具覺相同佛心長道體圓十身為佛子任佛事此十住始終之序也阿難是善男子成佛子已至一切衆生名饒益行長水曰行者住之增進以十度為體歡喜即檀度十方隨順約自行為歡喜故饒益即戒度戒無惱害能饒益故溫陵曰具佛妙德故能十方隨順無適不可自他利備機應俱喜故名歡喜善推妙德益以利人故名饒益自覺覺他得無違拒名無瞋恨行溫陵曰瞋恨生於違拒由無違逆故無瞋恨長水曰自覺故無明不能違智覺他故有情不能拒化二利兼成故無瞋恨種類出生窮未來際三世平等十方通達名無盡行携李曰觸類而長隨機而應利行無盡無盡行名無屈撓孤山曰種類出生者化十界身化復作化也窮未來際益物庶盡竪遍三世橫周十方一切合同種種法門得無差誤名離癡亂行携李曰於法不了曰癡於行紛錯曰亂今能一合於法得無差誤故離癡亂孤山曰妙智了達塵妙法門異名別說同歸一理故離癡亂則於同中顯現群異一一異相各各見同名善現行泐潭曰善現即慧度理能顯事名同中現異事能顯理名異相現同孤山曰同中現異達理即事故異相見同達事即理故溫陵曰由無癡亂故能於種種法門互現隨應圓融自在所謂善現也如是乃至十方虗空至不相留礙名無著行孤山曰方便以權為事塵中現界即權智所顯溫陵曰此由善現行充擴圓融也塵中現剎名現界不壞塵相名現塵種種現前咸是第一波羅蜜多名尊重行吳興曰智慧輕薄般若尊重故此名焉溫陵曰種種所現皆是般若性德無作妙力自在成就故名尊重金剛稱第一波羅蜜即般若也如來圓融能成十方至性本然故名真實行吳興曰上善法行全性起修故成法則此真實行全修是性故皆無為溫陵曰十方諸佛以是成道以是利生故名善法總括前行無非真性本然妙用相雖萬殊體惟一真故名真實如是十行乃至後位不離前法而皆相攝別設者一使行人隨位增進開擴性覺淨治惑障而成熟佛果也阿難是善男子至救護一切衆生離衆生相回向溫陵曰前十住十行出俗心多大悲行劣此須濟以悲願處俗利生回真向俗回智向悲使真俗圓融悲智不二是名十回向亦名十願也泐潭曰滿足神通至遠諸留患牒前現塵現界不相留礙等事謂此行滿足當修回向行也回向之行悲願最深故職在度生然見有可度即涉有為背涅槃路故須滅除度相回無為心向涅槃路也壞其可壞遠離諸離名不壞回向吳興曰壞其可壞從所壞境說遠離諸離約能壞智論不見可壞之相是名不壞溫陵曰壞其可壞謂遠離一切虗妄境界也遠離諸離謂離遠離幻亦復遠離也得無所離即除諸幻而證不壞矣本覺湛然覺齊佛覺至名至一切處回向吳興曰上覺言智此地言理皆因果體同故云等也至也溫陵曰無壞不壞無離不離乃湛然齊佛覺湛故精真發明地如佛地前覺等一切則真如體遍也此地至一切則真如界遍也世界如來互相涉入得無罣礙名無盡功德藏回向補注曰準吳興解則世界即理如來即智也吳興曰真界真體二俱圓遍故涉入無礙任運發揮德用無盡於同佛地地中各各至名隨順平等善根回向携李曰約一多回向於同佛地一也各生清淨多也此二相涉故得平等長水曰同佛地即前地如佛地也於一切處各起淨因取涅槃道是謂平等善根孤山曰於諸佛理地起萬行真因依此真因發越揮散周遍法界以取究竟涅槃之道行從理起名隨順平等能生道果名為善根真根既成十方衆生至隨順等觀一切衆生回向孤山曰依因發生故曰真根皆我本性回衆生若己也不失衆生泯己同他也溫陵曰平年善根性真圓融周遍法界故十方衆生皆我本性我善既成故能成就一切衆生善根無有遺失無有高下故名隨順等觀即一切法離一切相至名真如相回向資中曰如故即真故離有即有離是假真如二無所著乃真真如也孤山曰即一切法假也離一切相空也二無所著中也真得所如十方無礙至名法界無量回向携李曰以真如如境境亦如如故十方無礙十方所也無礙如也真如故非縛有所故非脫孤山曰三德妙性於此圓成不見十界高下差別故云法界量滅溫陵曰初證性德以為齊佛以為如佛以為至一切處等皆存量見則法界性未離有量及乎性德圓成乃滅量見乃得無量此總治前位限量情見此性圓成可入十地矣阿難是善男子盡是清淨至次成四種妙圓加行興福曰加行以尋思為體印持為性依四尋思故為四加溫陵曰四十一心者乾慧一信住行向各十小乘通致皆有四加而非妙非圓故此特標妙圓加行即以佛覺用為己心至欲然其木名為暖地孤山曰依明得定名之為暖長水曰佛覺果智也補注曰前之佛覺雖曰能齊未能正證今將趨聖果故即用佛覺為己因心復加功行以求正證初入因位未即德果故辟鑽火方得暖相又以己心成佛所履至下有微礙名為頂地吳興曰依暖地心修佛果智智觀於心故如足履地心相垂盡故若依非依高山喻當位之心虗空喻一依之理無明未盡故下泐潭曰前以佛覺為己心以此己心成佛行則因心果覺已鄰極矣故譬如登高山身入虗空但因果未融心迹尚滯故有微礙然到頂地少需㩳進則微礙除矣心佛二同善得中道如忍事人非懷非出名為忍地吳興曰忍取信順之義今心佛二同等即信順僧中辨事忍則默然既不懷疑亦不出說也溫陵曰己心佛覺融為一體曰二同因果兩忘二邊不立曰中道而此中道將證未證故如忍事人非懷非出數量銷滅迷覺中道二無所目名世第一地孤山曰世第一法者漏故名是最勝離有漏名世第一法吳興曰若迷中道及覺中道皆是數量即世間義也今既消滅二無所目當出世間然猶未入初地故名世第一也溫陵曰若進十地極乎妙覺乃出世第一也阿難是善男子於大菩提至盡佛境界名歡喜地孤山曰總攝功德為勝依持故令得長生故名為地以入見道親證真如自知不久證大菩提生歡喜故孤山曰覺通如來智同佛智也盡佛境界理齊佛理也三諦圓融名佛境界比前曰盡其實未盡以初得法喜故名歡喜溫陵曰十地者蘊積前法至於成實一切佛法依此發生故謂之地也自十信已還位皆躡迹相資直趨妙覺於中不無斷證是皆不斷而斷不證而證也異性入同同性亦滅名離垢地真際曰由前於大菩提善得通達名異性入同同性亦滅者若見於同即為垢矣泐潭曰通大菩提盡佛境界一切障礙即究竟覺衆生國土同一法性是異姓入同也然見異見同還是情垢至於同性亦滅乃名離垢華嚴云辟如真金置礬石中如法鍊已離一切垢淨極明生名發光地明極覺滿名𦦨慧地携李曰成就勝定大法總持能發無邊大慧光故前地明生此地覺滿發慧光也溫陵曰發光者情見之垢淨則妙覺之明生也𦦨慧者明極覺滿如大火聚一切緣影悉皆爍絶故也一切同異所不能至名難勝地吳興曰登地智名同地前智名異至猶及也溫陵曰由前焰慧爍絶故一切同異所不能至至尚不能孰能勝哉無為真如性淨明露名現前地盡真如際名遠行地孤山曰同異既遠真如自露吳興曰盡真如際者斯是無際之際理既無際行豈近乎溫陵曰同異不至則真如淨性明露現前矣真如現前分證則局盡際乃遠回超極造故名遠行一真如心名不動地溫陵曰既盡其際乃全得其體一真凝常故名不動孤山曰真如之性本不動故發真如用名善慧地資中曰此菩薩具四無礙智演說何僧祇句義無有窮盡故名發真如用溫陵曰既得真體斯發真用凡所照應無所不真無所不如故名善慧阿難是諸菩薩從此已往至亦目此地名修習位問後位既無修習復有斷障之事何邪孤山答此明智悲功終得十地果而已若論斷障則等覺之位猶是修習故至妙覺乃名無學溫陵曰此結前顯後也聖位總束有五一資糧三賢也二加行四加也三通達初地也四修習即此也五無學妙覺也自初發信至超賢入聖皆修習之事而此位已超八地無功用道智悲並圓則修習之功終畢於此故名修習以結十地之因也次後乃十地之果無復修習矣華嚴十地以金剛藏表因解脫月表果亦以因地有修果地無修也慈陰妙雲覆涅槃海名法雲地吳興曰以無緣慈普蔭衆生本涅槃相如雲覆海孤山曰蔭蔽一切充滿法身故溫陵曰慈陰妙雲十地果德也涅槃海妙覺果海也十地果滿智悲功圓無復自利純是利他故大慈之陰充偏法界無心無緣而應彼心緣施作利潤而本寂無作稱合如來大寂滅海故云覆也如來逆流如是菩薩順行而至覺際入交名為等覺吳興曰理無逆順由權實智而得二名如來權智下隨機感故謂逆菩薩實智上合覺心故謂順瓔珞云等覺照寂妙覺寂照即其義至此二智相交故名等覺溫陵曰十地菩薩混俗利生與如來同但所趨逆順與如來異蓋如來逆流出同萬物菩薩順流入趨妙覺已至覺際故名入交與佛無間故名等覺即解脫道前無間道也此雖齊等未極於妙蓋能順能入而已須於大寂滅海逆流而出妙同萬物乃名妙覺也阿難從乾慧心至等覺已至金剛心中初乾慧地吳興曰瓔珞有云等覺性中有一人各金剛幢慧故知金剛乾慧不可別開也言初乾慧者由此菩薩以大願力住壽百劫修于三昧今既始獲豈非初邪應知今之乾慧以障妙覺無明初乾未與究竟如來法流水接故也溫陵曰此明等覺後心妙覺伏道妙覺之道無別行相但從初乾慧至等覺已復起金剛心從初重歷諸位破斷微細緣影最後無明使纖塵不立乃可入妙為其復從初位以始故名金剛心中初乾慧地識陰盡者能入菩薩金剛乾慧即此也前名乾慧以未與如來法流水接此名乾慧以未與如來妙莊嚴海接名雖乍同義乃迥異如是重重單復十二方盡妙覺成無上道吳興曰十信十住十行十地即單十回向即復十以四加行只是十回向後心耳并前乾慧及等覺位故有二也溫陵曰獨由信心以歷諸位曰單兼金剛心重歷諸位曰復十二者乾信住行向暖頂忍世地等金是也十二為因妙覺為果故單復十二方盡妙覺成無上道是種種地皆以金剛至清淨修證漸次深入携李曰金剛三昧不住不起不滅不壞不斷不異不脫不變入明慧性不見身心法然後成阿耨多羅三藐三菩提長水曰奢摩他以照了自性為體以分別境界為緣溫陵曰此教其用金剛心成就妙覺之方也種種地單復十二位也十喻者幻人陽𦦨水月空華谷響乾城夢影像化也了法如此則頓忘情解纖塵不立故曰清淨修證奢摩他毗婆舍耶云心觀言如來者揀異小乘阿難如是皆以三增進故至五十五位真菩提路吳興曰三增進者即漸次也前三文下皆結示云是名增進修行漸次又云從是漸修隨所發行安立聖位或指金剛奢摩毗婆為三者非也五十五位者除前乾慧由信至等覺是也溫陵曰三增進三漸次也聖位皆資之以成就也信住行向地為五十并乾慧四加等妙有五十七位獨指五十五為菩提路者等妙乃菩提之果由是路以趣證也或指金剛觀察及止觀為三增進作是觀者名為正觀若他觀者名為邪觀吳興曰五十五位既由三增進故而得成就今簡邪正所以約觀言之携李曰圓教之外三乘所修皆屬邪觀爾時文殊師利法王子至我及衆生云何奉持孤山曰此經發起為救阿難是故先開圓解次顯圓行行成入位極乎妙覺乘範來世有始有終於是文殊請問經名及奉持法也溫陵曰上明證果竟自此以下名結經分正宗未終而遽結經者由初示密因次開修證而卒乎極果則經之正範畢矣結經後文尚屬正宗而名助道分者特助道而已故於後別列乃正助之辨也佛告文殊師利是經名至十方如來清淨海眼真際曰此經實大事因緣非小智之法故以文殊請問而揭之溫陵曰大佛頂白傘蓋無上寶印者體極含覆超情離見即如來藏之心印也證佛心要必契於此十方如來清淨海眼者照窮剎海淨絶纖塵即爍迦羅之法眼也開佛知見必資於此亦名救護親因至亦名如來密因修證了義孤山曰亦名如來下謂如來正果藉此為因權乘修證皆不了義溫陵曰阿難為親摩登為因舉斯二者明有緣皆度也無上正覺由此經得一切智海由此經入亦名大方廣妙蓮華王十方佛母陀羅尼呪溫陵曰因果同彰染淨不滯於法自在名妙蓮華王出生十方一切諸佛總一切法持無量義名十方佛母陀羅尼呪吳興曰大方廣所說之法也大方是體廣是其用即空如來藏具不空之用也又常遍曰大軌持曰方包博曰廣如次配法身般若解脫亦如來藏之三德也亦名灌頂章句諸菩薩萬行首楞嚴汝當奉持長水曰結經分竟下為助道分而有二科一曰別明諸趣戒備失錯始下文終于第九卷中二曰詳辨廣境深防邪誤始第九卷中如來將罷法座處而終于第十卷末溫陵曰菩薩由此受佛職位故名灌頂章句也吳興曰此經從天竺灌頂部中流出蓋約密言名灌頂章句有誦持者則如來智水灌其心頂亦如剎利之受職也菩薩萬行以首楞嚴為本又修此定者於一心中具足萬行故涅槃云首楞者一切事竟嚴者堅固一切畢竟而得堅固名首楞嚴說是語已阿難即從座起至為是衆生妄習生起吳興曰前阿難問位後佛言妙性圓明離諸名相本來無有世界衆生因妄有生因生有滅生滅各妄滅妄名真等於是先約因妄有生明二種顛倒後約滅妄名真明漸次諸位然於世界顛倒中所說十二類生一往且示欲界因果之相其實界趣說而未周今答位既終故躡前妙性之義領其庶彙皆是真如發起如來委談諸趣溫陵曰前說真淨妙心本來遍圓則法界一真萬動一體宜無諸趣之異其如方今現有乃常情所疑故或執諸趣而迷妙圓之體或執妙圓而撥諸趣之業以致失錯墮落故特請問冀行人詳明而知所戒備也佛告阿難快哉此問至自然從隊此名內分問憐由情愛生水可然恨由怨憎何以流淚吳興答曰此中內分悉約情論以愛為情且言少分如喜怒哀樂愛惡六者皆人之情也是故怨恨亦屬于情情則悲悲乃成淚內外之義當文難曉須取下文外分顯之且外分云心持禁戒舉身輕清心欲生天夢想飛舉等應知從持戒善及修禪定有人天乘者即屬外分降斯已還皆屬內分真際曰心動於內曰情故情為內分情人之陰氣有欲者也故因諸愛染而起以陰積故能生愛水潤業潤生輪回不斷職皆由此諸愛不一皆能感水結惑故曰流結是同水性沉下故情積之業多從輪墜阿難外分即是衆生分外至自然超越此名外分溫陵曰想能生勝而卵以想生者由染淨異也吳興曰且指人天想心名為外分非出世三乘之智也何者前文因阿難問於地獄乃至人天等道於是佛說妄習為二分次約二分以辨諸趣諸趣之後總結示云此等衆生不識心受此輪回等故知外分不出三界也真際曰意緣於外曰想故想為外分想人之陽氣有冀者也故因渴仰而發以陽積故能生勝氣如輕清雄毅等事皆勝氣也想能生勝而卵以想生者由染淨異也諸想不一皆能輕清飛舉故曰輕舉是同以輕舉故多能超越阿難一切世間生死相續至死逆生順二習相交孤山曰生從順習死從變流者以一切衆生皆愛生而惡死也是故生則順其習死則逆其習故復云死逆生順二習相交此乃文辭互略耳未捨暖觸謂現陰之末中陰之初也溫陵曰人之情習好生惡死以生為順以死為變逆順相交謂方死方生之間也一生善惡之業即於是時隨其情想輕重而感變焉純相即飛必生天上至一切淨土隨願往生吳興曰必生天上者據下情少想多但在四天之下驗今純想所生應是忉利以上若單修善禪則惟生上界若兼諸福則隨往十方携李曰想體輕舉故純即飛升然此特純善故止於生天若兼修福慧淨願則二習交時感變倍勝溫陵曰於飛心中旁論福慧故皆云兼情少想多輕舉非遠至是等親住如來座下真際曰情少想多此通舉也理宜等降四類分之一情九想即為飛仙二情八想為大力鬼王三情七想為飛行夜義四情六想為地行羅剎携李曰持戒護法出世淨想則能親住如來座下溫陵曰勝想不純少滯邪情故感此類其中下謂雖滯邪情而有善願斯感善緣即天龍八部類也情想均等不飛不墜生於人間想明斯聰情幽斯鈍興福曰由所習情想各在強弱致有聰鈍之異孤山曰由昔情想感今聰鈍是知言均等者總報之業也言幽明者別報之業也情多想少流入橫生至重生無間二種地獄真際曰情多想少亦合分四六想四想流入橫生七情三想墜為餓鬼八情二想生有間獄九情一想生無間獄溫陵曰橫生者情多故淪變帶想故飛舉而業重不能但為毛羣耳俱舍說大地最下有金水風輪有八寒八熱地獄在三輪之上此文說沉下水火風輪又似地獄在三輪之下疑此所指非地下三輪乃地獄三輪也言水輪火際即寒獄第八也受氣猛火謂受火氣以為身故常被火燒或得水飲亦化為火故曰水能害己也下洞火輪即八熱獄也身入風火二交過地謂超寒獄入熱獄也熱獄第八名五無間有間即餘七也孤山曰只就七地地獄自有輕重而此無間非五無間阿難此等皆是彼諸衆生至造十習因受六交報補注曰六交者如造業因眼而餘五為助至受報時亦遍及也携李曰從識造業從根顯報業報相會謂之交溫陵曰前略明情想感變此詳明根境搆造也十習本於十惑以習成惡業六交因乎六根而交起惡報云何六報阿難一切衆生至所招惡報從六根出真際曰所名亡交報者師云因與果交今則不爾但是時六根與惡報相涉也吳興曰造業招報根識必俱今以識為業而報從根者蓋業並由心報多約色故也云何惡報從六根出至星火迸灑鼓空界吳興曰一者下標示臨終下釋相先見猛火等即現報也亡者神識等即生報也發明下就眼根明二相如是見火者根明交報他皆放此然一根惡報而五根遍受者雖可了知理而推之必申六識造業之時性中相知用中相背從業受報法爾如斯以相知故六報互通以相背故諸相差別惟識發現信其不誣溫陵曰見覺屬火故感猛火畏見於境恐藏於心六交皆直入無間者就重言耳成論云極善極惡皆無中陰所以直入聞聽屬水故燒聽能為鑊湯洋銅鼻嗅生氣故燒息能為黑烟紫焰舌主味丸糜味類也身主觸灰炭觸類也心正屬火燒之轉熾故迸灑煽鼓二者聞報招引惡果至則能為電為雹摧碎心魄溫陵曰聞聽屬水故觀聽旋復則水不能溺依之造業則能感波濤注聞發聲故為責罪詰情之事注見能為雷吼者聞波屬陰見火為陽陰陽相薄而成雷故也注息為雨霧水隨氣變也注味為膿血水隨味變也注觸為畜鬼水隨形變也注意為電雹意出於心水火交感也一切物理莫不因五行乘陰陽以變化故此隨根轉變之事皆不出此吳興曰上云見火凡云聞波今以近義詳之如易云離為目為火坎為耳為水將恐見聞本乎水火之性故發燒注之相也又其聞波所注諸根循業各變難盡銷會如注見則能為雷為吼等似非眼根所入之相乃至下文多此義例聖言叵測也三者嗅報招引惡果至為飛沙礰擊碎身體孤山曰魚敗曰餒羮敗曰爽溫陵曰質礙也履通也嗅業所依不離通塞故衝息能為質履也衝見為火炬衝聽為沒溺得沸則見覺屬火聞聽屬水明矣飢餒乖爽由味隨氣變也綻拆爛壞由體隨氣變也衝思為灰沙依土感也資中曰鼻根造業貪嗅諸香故招毒氣以受其報四者味報招引惡果至則能為飛熱鐵從空雨下溫陵曰舌噉生命使彼承忍故歷嘗發苦使己承忍依見貪味故能為燃金石依聽發惡故能為利兵刀依嗅恣貪籠取群味故能為大鐵籠觸味傷物故感弓箭以自傷緣味思物故感飛鐵以充味孤山曰準眼耳鼻云見聞嗅此應云嘗報言味報者從所嘗為名也貪味則網捕燒野以取禽獸故見鐵網猛𦦨之相為承為忍謂發言承領忍聲甘受也五者觸報招引惡果至則能為隊為飛為煎為炙溫陵曰大山來合及鐵城火狗等皆惡觸雜感也觸業所依不出離合屠裂即離相也道趣獄路也觀獄王門關兩觀也廳按皆治罪之處皆身觸所依也括袋所以收氣也思業飄蕩故感飛墜之事剚插刃於肉也剚射𦒱縛則相因旁舉也孤山曰合山刀劍並由貪著男女身分而感也六者思報招引惡果至萬生萬死為偃為仰携李曰思必有所故結思則為受罪方所見能鑑證故結見則為證罪人事結聽則能為大合石等水土交感也車船攬乃息氣乘亂思所變也嘗即舌根聲所自發也大小已下皆言其身乃觸業乘亂思所變也溫陵曰思屬土而飄蕩故先見惡風吹壞國土等事思業所依不出迷覺荒奔迷思也知苦覺思也阿難是名地獄十因六果至人不及處有十種仙吳興曰此總結上十因六果也孤山曰抱朴子云求仙要當以忠孝和順仁信為本若德不修而但務方術終不得長生也溫陵曰仙遷也人之形神能遷而不死者也故曰存想固形然終歸敗壞比天為劣比人為優故別開也阿難彼諸衆生堅固服餌至覺悟圓成名絶行仙行簡子曰此皆絶世離俗熊經鳥伸者携李曰津液內潤綽約的潔是名天行吸取精粹引生光色是名通行携李曰明鍊精思念心獨照曰照行携李曰坎離水火自相交遘此修煉之士也溫陵曰以藥餌駐一期之壽而不能輕舉者地行仙也行去聲功行也餐黃精松柏之類久而身輕者飛行仙也煉金石還丹之類化骨易形撮土點石以遊戲人間者遊行仙也乘陰陽運正以調氣固精遺形涉空者空行仙也鼓天池咽津液氷雪婥約不交世欲與天無異者天行仙也吞吸精色服虹飲霧粹氣潛通者通行仙也能以術法述道自然者道行仙也澄凝精思久能照應者照行仙也或存想頂門而出神繫心濟輪而煉丹皆思憶圓成也內以坎男離女匹配夫妻外即採陰助陽攝衛精氣者精行仙也存想化理心隨邪悟能太變化其行絶世者絶行仙也阿難是等皆於人中煉心至報盡還來散入諸趣長水曰言人中者以仙趣無別總報即於人心總報之上加於前來十種修煉轉成仙也吳興曰山海經云崑崙之山廣都之野軒轅之丘不死之國氣不寒暑人皆數千歲此亦衆私同分非無定處若但固形而不煉心便希千歲是猶見卵而求時夜不太早計乎阿難諸世間人不求常住至如是一類名四天王天携李曰六天由修五戒十善而致今約欲微增勝者愛欲為輪𢌞根本前明淪墜始此此明超騰亦始此意使初心未能成就禪定智慧旦疾斷根本輪𢌞可出溫陵曰未能離欲且能窒欲使愛水不流則湛性澄瑩故能初天託生也於己妻房淫愛微薄至如是一類名忉利天孤山曰忉利此云三十三帝釋焉溫陵曰此愛薄於前故報居其上後𮞏然也淨居謂清淨自居之時未全清淨之味為有微愛故也日月居須彌腰忉利居頂以澄瑩增明故能超之逢欲暫交去無思憶至如是一類名兜率陀天欲心不作故動少靜多六欲下二名地居天上四名空居天不須日月常明以蓮華開合分晝夜故名時分真際曰兼修禪定粗住細住所謂兜率天業也溫陵曰一切時靜下言雖靜心愈多亦未免應觸此能少欲未能無心也兜率天有內院外院三灾至三禪而此言不及者約內院言之精微不接皆內院之事也我無欲心應汝行事至如是一類名樂變化天真際曰諸天皆有報境而此天樂自變化以受用越於下天故名越化溫陵曰此無心而境自至曰橫陳嚼蠟言未甚薄也無世間心同世行事至如是一類名他化自在天溫陵曰了然超越言全無味也化即第五天無化即下天也諸欲樂境不勞自化皆由他化而自在受用名他化自在也吳興曰準天台說六欲天業皆以十善為本若兼護法心是四天王業若兼慈化人是忉利天業若兼不惱衆生善巧純熟是𦦨摩天業若兼修禪定粗住細住是兜率天業欲界定是變化天業未到定是他化天業今經止約欲事輕重而分六天者應有二義一是阿難發起之緣故二是欲界受生之本故阿難如是六天形雖出動至自此以還名為欲界携李曰雖出塵擾未能絶欲故通名欲界吳興曰形雖出動此對人仙二趣得出動之名心迹尚文謂欲心事迹猶有交合之相故俱舍頌曰六受欲交抱執乎笑視淫此言地居兩天則形交𦦨摩則勾抱兜率則執手變化則對笑他化則相視須知彼文各據六天受欲而說今經只就人中辨欲事輕重用顯六天感報不同也大佛頂如來密因修證了義諸菩薩萬行首楞嚴經第九阿難世間一切所修心人至如是一類名梵衆天溫陵曰前明六天雖出塵擾而未能絶欲故通名欲界自此而下明十八天雖離欲染尚有色質故通名色界又通名梵世為已離欲染也通號四禪為已離散動也欲天但十善感生此天兼禪定感生然特有漏禪觀六事行耳溫陵曰六行者厭欲界是苦是粗是障欣色界是淨是妙是離此則凡夫伏惑超世間道也不假禪那等者言雖非正修真三摩地無正智慧但修六行伏欲使愛染不生則不留欲界粗惑不染淨報現前故即生梵世初名梵衆則衆庶而已次名梵輔乃大梵宰輔而終於大梵其進有序欲習既除離欲心現至如是一類名梵輔天携李曰戒定相應名定共戒溫陵曰初天但能執身伏欲此天又得定共戒以順律儀行梵德故超之也身心妙圓威儀不缺至如是一類名大梵天孤山曰上三天不顯言修禪惟言持戒者蓋此經扶律以勵未來故也溫陵曰由前淨心威儀戒行而進至於妙圓清淨又加以明悟超達則盛德之至故為梵王資中曰大梵天劫末後去劫成先來外道不測故執為常也阿難此三勝流一切苦惱至諸漏不動名為初禪孤山曰禪有四類一有漏禪即今四禪也二無漏禪謂九想八背等三亦有漏亦無漏禪謂六妙通明等四非有漏非無漏禪即今經首楞嚴王中道理定真際曰莫非流也有無明流生死流欲流勝流四果流涅槃流皆各隨流類而趣也欲流則趣於生死雖至六天未足為勝此天已出欲流皆生死趣勝淨故四禪皆稱勝流也已離欲界八苦故曰苦惱不逼已離散動欲心故曰諸漏不動此名離生喜樂地謂離欲界雜惡生得輕安樂也阿難其次梵天統攝梵人至如是一類名少光天資中曰二禪已上無有語言但以定心發光光有勝劣分其高下泐潭曰前初得定未能生光此則寂湛故名少光長水曰身境俱無故十方變成琉璃真際曰映十方界者約其定光隨所受用東西等言之非遍十方世界也溫陵曰此躡大梵之行升進具戒定慧故曰圓滿以圓滿故能澄疑其心不隨境動而寂湛生光然此初能脫粘復湛其光尚劣故名少光光光相然照耀無盡至如是一類名無量光天溫陵曰定力轉明妙光迭發境隨光淨遍成琉璃吸持圓光成就教體至如是一類名光音天孤山曰教以言音為體故曰光音溫陵曰諸世界中教體不同故娑婆以文字香積無文字說但依衆香此天以圓光成音而發宣化法故名光音阿難此三勝流一切憂懸至粗漏已伏名為二禪吳興曰地持論目第二禪名喜俱禪此定生時與喜俱發故今說云一切憂懸所不能逼懸或作愁字之誤也溫陵曰二禪離憂得極喜樂故云憂懸不逼初禪方得漏心不動而未能伏此天已伏粗漏則業漸劣行漸勝也俱舍云此名定生喜樂地謂有定水潤業憂懸不逼也阿難如是天人圓光成音至如是一類名少淨天興福曰發成精行入寂滅樂不事言音故曰少淨溫陵曰由上圓光教體披露妙理發成精行離前喜動而生淨樂是樂非境乃出乎淨性恬泊寂靜名寂滅樂而淨猶劣則能通而已未能成也以猶劣故少淨也淨空現前引發無際至如是一類名無量淨天吳興曰望上未遍聖下則多故名無量資中曰淨境無量即心二行俱得輕安故名無量溫陵曰淨空者離諸喜動不緣物境之定相也由是充擴使淨相無際協乎妙性故身心輕安而性樂成矣以無際故名無量淨也世界身心一切圓淨至如是一類名遍淨天泐潭曰身境俱圓勝託現前故名遍淨吳興曰上身心輕安且言其內今世界等者總攝於外溫陵曰淨空無際故世界身心一切圓淨淨德成就則性樂歸託於是矣以一切圓淨故名遍淨阿難此三勝流具大隨順至歡喜畢具名為三禪吳興曰地持論目第三禪為樂俱禪此定功德與遍身樂俱發故前二禪雖有樂支為喜支所障今滅喜純樂故得其名溫陵曰具精行性樂名大隨順故安隱無量也歡喜畢具者此名離喜妙樂地謂心雖離喜而喜樂自具也阿難復次天人不逼身心至如是一類名福生天溫陵曰以捨苦樂名粗重相滅捨念清淨故淨福性生也自此而下明四禪凡有九天然四禪報境但有三天第四無想乃第三廣果別開皆凡夫報境此四之上有五不還天乃聖賢別修靜慮與凡夫不同吳興曰復次下結三禪之德樂非下顯三禪之過苦樂下正示復生也三禪無下界苦因雖名為樂樂久必壞壞亦成苦今既捨樂苦則不生特名此為捨俱禪其義同矣真際曰前之禪行止於自利未能利他至四禪乃勤修慈悲喜捨利他之心捨心圓融勝解清淨至如是一類名福愛天吳興曰得妙隨順即隨順下文二支路也由此淨福體性無遮愛樂修習勝妙之法是則福資二路非止當天故云窮未來際溫陵曰苦樂二忘故捨心圓融心無所纍故勝解清淨繇是福無遮礙而得妙隨順自有漏禪定而發無漏行至於究境故曰窮未來際定福如此為可愛樂故名福愛天阿難從是天中有二岐路至如是一類名廣果天資中曰此廣果天以四無量心熏禪福德離下地染廣福所感名廣果天溫陵曰從福愛分二岐也一直往道趣廣果一迂僻道趍無想若於先心不帶異執直修禪定使自無量光天至福愛所修福德圓明而住此天定福彌廣故名廣果若於先心雙厭苦樂至如是一類名無想天資中曰是人不了妄性體空乃執生滅以為勞纍厭此生滅求不生滅非真不生也但見第六識不行如水夾無不知微細生滅妄謂涅槃溫陵曰先心雖能伏惑修禪而涉妄帶異以有心為生滅以無想為涅槃於是雙厭苦樂專研捨心以趣無想由物洎身以至心想一切皆捨名圓窮捨道心慮灰凝即無想定也以是感報生無想天壽五百劫俱舍說初生此天未全無想經半劫始無及報將盡復經半劫有想然後報謝阿難此四勝流一切世間至功用純熟名為四禪溫陵曰四禪不為三灾所動名不動地然彼器非真常情俱生滅雖非無為真境而有為功用至此已純熟已泐潭曰想念之心粗曰尋細曰伺初禪二天兼之大梵無尋唯伺二禪無尋伺有喜樂三禪離喜樂有出入息尋伺感火喜樂感水出入息感風四禪并離之阿難此中復有五不還天至衆同分中安立居處資中曰俱舍云雜修靜慮有五品不同故生五淨居雜修者以有漏無漏間雜而修也靜慮者定慧均等之謂也五品者下中上上勝上極也溫陵曰第三果人斷欲界九品修惑盡即生此天不復欲界受生故曰不還亦名五淨居謂離欲淨身所居也習氣惑也與現行皆滅故曰俱盡此指欲界無續生業也苦樂雙忘兼指四禪已下無續業也故云下無卜居此五天自四禪別立通名捨念清淨地故曰捨心同分阿難苦樂兩滅𩰖心不交至如是一類名無熱天溫陵曰前於苦樂有捨有厭心與境聞不能無煩惟心境兩釋煩惱斯斷真際曰無熱謂心境得清凉義携李曰盛熱曰煩微煩曰熱上雖𩰖心不交疑若猶有交地方滅粗相得無煩而已此復增勝心機無對斫交無地能滅緣影故得無熱也十方世界妙見圓澄至如是一類名善現天曰塵像沉垢即定慧之障也定慧精明融鍊自在故云陶鑄無礙真際曰能滅緣影故妙見圓澄而染心塵像纍性沉垢於是皆無也圓見十方故名善見精見智照也向滯塵垢不能發化今既澄圓猶如明鏡隨緣顯現名陶鑄無礙陶鑄者造作之義由機發自然故名善現究竟群幾窮色性性至如是一類名色究竟天泐潭曰機括允終無復流動色性窮極與空為鄰入無邊際故曰究竟長水曰幾者色之微性者相之本未能究了則局於色相自為限礙此能究而窮之故出乎形礙入無邊際名色究竟吳興曰究竟研窮之義也幾者動之微也研窮多念至於一念故曰究竟群幾以名窮色性性者窮亦究竟變其文耳心能熏多至少色亦窮粗至微粗細不同故曰性性入無邊際即色界與無色界二邊之交際也俱舍云從此向上無復所居此處最高名色究竟阿難此不還天彼諸四禪至世間粗人所不能見溫陵曰下天修有漏凡定此天修無漏聖業粗細有異故不能見阿難是十八天獨行無交至自此已還名為色界孤山曰此無色界天無業界色有定果色無方所無色蘊也孤山曰獨行無交俱無情欲故未盡形纍尚有色質故復次阿難從是有頂至名為回心大阿羅漢吳興曰色究竟天第三果人根有利鈍故分二路其利根者發無漏智斷盡修惑即出三界其鈍根者復由定心欣上厭下生無色界應知慧光圓通且約盡無生智圓滿而言入菩薩乘正約出三界後勝進而說斯亦今經破定性之明文也溫陵曰色究竟天居有色頂與無色鄰名色邊際二岐一出三界即此科也一入無色即次科也四禪皆依捨念修定此言捨心指有頂因心也因心能發無漏智慧斷盡塵惑至於圓明即出三界不住小果入菩薩乘是名回心名為回心者圓師指同涅槃五人發心之義今謂不爾彼是界外發心即入初住此是界內回心方成四果安得五人為同年邪若在捨心捨厭成就至如是一類名為空處長水曰捨心有二一者若於有頂用無漏道伏惑入空即樂定那含也二者若於廣果用無漏道伏惑入空即凡夫外道也溫陵曰自此而下明無色界四天也無色者無業果色有定果色依正皆然乃滅身歸無定性聲聞所居或捨厭天人雜處其類不一皆無色蘊也四天皆依遍空修進初厭色依空二厭空依識三色空識等都滅而依識性四依識性以滅窮研而不得真滅是皆有為增上善果未出輪回不成聖道者也今此初天厭己形礙堅修空觀滅身歸無即厭色依空者也名空處定故報生空處也諸礙既銷無礙無滅至如是一類名為識處長水曰賴耶第八識末那第七識也而末那所緣色空色三此位厭色空而依識則色空粗緣已無故惟全半分微細也溫陵曰諸礙既銷而無則不依於色無礙之無亦滅則不依於空唯留阿賴末那既厭空依識者也名識處定故報生識處空色既亡識心都滅至如是一類名無所有處真際曰此雖仁識心未仁識性今多滯於此雖能洞了色空灰滅心慮逮無所有而終於識性不能自脫生死窟穴溫陵曰前位雖亡空色而未滅識心此則都滅故十方寂然迥無攸往以寂無攸往故名無所有識性不動以滅窮研至名為非想非非想處泐潭曰識怪寂然見無攸動便以為滅是以滅研窮也孤山曰識性寂然有似於滅故曰若存而實非滅故曰若盡溫陵曰識性者識性幽本也不動者寂無攸往也既能不動復研窮使滅然依識滅之竟非真滅是強於無盡中發宣盡性所以似存不存似盡不盡似存不存故非想也似盡不盡又非非想也此又幽幽綿綿至微之相也此等窮空不盡空理至迷漏無聞便入輪轉幻師曰其那含天除其利根回心羅漢其餘鈍根貪寂定者修空空增勝入四空處其凡夫禪次第修者成四禪後次從廣果入四空處然則根本天中第三廣果能攝無想及五那含今云有頂色邊際通指廣果聖凡雜地也四空凡聖通修故從不還六窮故屬聖流從無想者屬外道外道窮空自無想始也吳興曰此等窮空通指凡聖欣厭未盡故云不盡空理縱是聖人修八聖種觀亦有四陰細惑未亡以未得滅受想定故從不還天下明聖人有生此處者是鈍根那含耳言羅漢者約後為名也若從無想下明外道有不生此處者謂窮空不歸也外道窮空凡有二種一窮至四禪以無想為極二窮至無色以非想為極今既入無想則迷於有漏無聞四空故五百劫滿自當輪轉有解此文作外道從無想天來者非也請觀不歸二字歸猶來也豈非無想窮空不來乎阿難是諸天上各各天人至回向聖倫所修行路携李曰彼之天王華嚴謂初地菩薩多則閻浮提王二地輪王乃至六欲三梵天王是也此竪論已終故通結指溫陵曰通指欲色無色天也其衆乃隨業感報未出輪回其王乃隨行權應寄位升進阿難是四空天身心滅盡至補特伽羅各從其類補注定果色者顯揚論名定自在所生色謂由勝定故於一切色皆得自在即以定變起五塵境也數取趣者能取當來諸趣即中有也涅槃云中有五陰非肉眼見天眼所見溫陵曰身心滅盡者無色蘊及粗識也孤山曰無業果色者顯有定果色也補特伽羅此云數取趣謂諸有情起惑造業隨諸趣受生也復次阿難是三界中至因濕氣有畜生趣攝問此四修羅既為四趣所攝應無別報同分之處耶答雖屬四趣非無別報今云卜居鄰於日月等即同分之處也又長阿含云南洲有金剛山中有修羅宮所治六千由旬欄楯行樹等然一日一夜三時受苦苦具自來入其宮中是知此趣且取一分善報謂之人天若論受苦實在人趣之下故正法念經惟以鬼畜二種收之良由於此溫陵曰修羅此云非天福力等天而無天行為多瞋故也隨業輕重而有四生之異水穴即尾閭也問法華所列四種修羅與今四種為同為異答資中曰同今謂彼四只可攝在此四之中不可次第分屬其類阿難如是地獄餓鬼畜生至云何更隨盜淫事孤山曰有無二無無生死之俗也無二亦滅滅涅槃之真也尚無於善況隨於惡亦應云尚無無二云何隨二中道無著其有惟明補注曰有無相傾者鬼趣業盡或修善而升天趣報衰或轉惡而墜此名相傾起輪𢌞性也溫陵曰前問妙心遍圓何有獄鬼人天等道故此結示由殺盜淫三為根本有是業則名鬼倫言必墜也無是業則名天趣言必升也出生無殺盜淫即天趣也七趣舉二以善惡通攝也因有而墜因無而升故曰有無相傾起輪回性若得正定則妙性常寂無復輪回矣有無二無言相傾業斷無二亦滅言分別情忘也業斷情忘則三種忘本名迹雙泯矣故欲斷妄輪須修正定也阿難不斷三業各各有私至生妄無因無可尋究携李曰三業即殺盜淫也溫陵曰前問地獄為有定處為復自然彼彼發業各各私受故此牒答汝勗修行欲得菩提至若他說者即魔王說溫陵曰殺盜淫為惑業之本故名三惑上明諸趣戒備失錯而終於勸斷三業勸除三業乃戒備真要也縱得下即助道分中第二科名詳辨魔境深防邪誤也真際曰魔即魔羅此云殺者亦云奪者能殺慧命奪善法開之有五曰五陰魔煩惱魔死魔天魔鬼魔合之惟陰魔天魔而已陰魔即生死煩惱依五陰而起者也天魔因修邪定好害正道者也未發心者常與隨順則無寇敵惟正修者違而不順遍致煩惱害故須辨識也即時如來將罷法座至歡喜頂禮伏聽慈誨溫陵曰前法既終當機無問故將罷法座而又攬寶几回金容無問自說者真止觀中微細魔事非一切智莫能辨識能隳寶覺破法王家故須特告乃最後深慈也長水曰四禪無聞者比丘無多聞慧但勤小行得生四禪便謂已證阿羅漢及乎天報將畢見有生處遂謗佛妄說阿羅漢不受後有因此墜墮乃邪誤之咎也佛告阿難及諸大衆至所有國土而不振裂或曰有漏空界乃衆生同感云何一人而能銷殞矧古今發真者衆空界依然安在其銷殞曰同業所感不離晦昧發真返明故可銷殞然衆生不可盡世界不可盡雖一人發真衆復感紹所以依然使同業之人同能發真則山河器界應念化成無上知覺為淨妙佛土矣補注曰迷則轉覺體為虛空悟則全虛空是覺體故一人發真歸元則一人所見虗空悉皆消殞而為覺體矣即所謂心精通㳷當處湛然彼之未見消殞者是其未能發真歸元也溫陵曰覺圓心體所謂真元由迷理背真化迷立妄成有漏界為魔所依化迷者隨迷轉變也空生大覺中如海一漚發又喻片雲以明世界虗幻微芒易以銷殞也惟真元之體本自廓然而虗空國土皆是迷頑妄想安立若汝等一人發真不迷則無安立者故自殞裂也此并下文皆敘魔所起蓋有漏空界為魔所依今若殞裂則魔不安矣汝輩修禪飾三摩地至於三昧時僉來惱汝溫陵曰魔以晦昧為依今修禪飾定妙心精明故能振裂魔界遂致惱害也凡夫天魔王天也問大地無情水陸異類何以同魔亦皆振懾孤山答三昧威神不可思議如大樹緊那羅王絃歌一動聲震大千須彌山為之踊沒況菩薩首楞嚴力豈以情無情異而為責邪溫陵曰飾猶莊嚴也謂修禪定功德莊嚴本有真三摩地以修飾故彼菩薩羅漢所證心性通同㳷合此動魔之由由三摩地將出其境故魔等宮殿自然崩裂斯亦歸元之前相也凡夫昏暗不覺遷訛者此釋伏疑也恐疑者曰魔及諸天既見其相凡夫何事都不覺知故此釋云然彼諸魔雖有大怒至宛轉零落無可哀救長水曰此言妙覺真體無動無壞正力所鑠邪氣自消泐潭曰正定勝邪邪亦勝正是成就破亂皆由心中五陰主人孤山曰以淫女比天魔人眇劣也以一戒比全身事眇劣也舉劣况勝最彼深防初果道共戒力自然無犯故云心清淨等籍沒漢書云除其屬籍是也宰臣藉沒喻成於覺位而淪惡也溫陵曰五陰主人真心也陰消入明指發真者登伽眇劣只毀戒體諸魔熾惡能隳寶覺固宜深防阿難當知汝坐道場至堅固妄想以為其本補注曰離念精明心未發光等色陰未破之相孤山曰謂在名字位中則似抑之太低溫陵謂得元明覺無生滅性則似升之太高當依吳興指屬觀行此蓋禪那得力之處塵勞暫息之時也泐潭曰消落諸念者以湛旋其虗妄生滅也離念精明者得元明覺無生滅性也湛寂故動靜不移離念故憶忘如一定力雖爾而色陰未破故如明目暗處雖精性妙淨而心未發光此色陰之相也陰以蔽覆為義區局性真故曰區宇補注曰前解五濁云劫濁依於色陰故今色盡則能超之餘四例此溫陵曰五陰盡相非滅身歸無乃觀力洞照不為迷礙而已故譬若目明朗十方洞開也色陰始因父母己三妄倫交結故曰堅固妄想為本五種妄本經未自釋阿難當在此中精研妙明至若作聖解即受羣邪孤山曰凡諸境發雖是善相取著成邪任是惡相若不取著邪亦成正以境隨心轉故泐潭曰十魔皆依境起身能出礙由觀照力故使精明心與四大身兩不相涉故能出礙前境指所因也形體即精明心內徹於身故蟯蛔可於溫陵曰此中者定中也妙體本融由妄質成礙故精窮妙用則四大不織而身能出礙也然此特定力所逼使精妙流溢暫而不常故非聖證阿難復以此心精研妙明至若作聖解即受群邪溫陵曰真精妙明流溢前境則外無所隔流溢形體則內無所障故能身內恰出蟯蛔此亦暫爾又以此心內外精研至若作聖解即受群邪溫陵曰前之精研初能外虛次能內徹此復內外精研俱虛徹故其魂魄等失常迭互相涉故夙昔聞熏自能發揮而忽有聞也今夫刻意凝神討論之極則奇文麗藻往往煥然得於夢寐精研激發神者偶現類可知也資中曰若修念佛三昧斯境現前與修多羅合者名為正相若修餘觀設見佛形亦不為正以心境不相應故況觀真如不取諸相而有所著者豈非魔邪吳興曰除執受身餘皆涉入謂除其色身而內魂魄等六互相涉入也互為賓主者餘五入魂則魂為主五為賓乃至入神則神為主餘為賓也遞相離合即精離本位而合於魄或魄離本位而合於精等又以此心澄露皎徹至若作聖解即受羣邪吳興曰抑按降伏制止超越應對四分煩惱或如下文排四大性此名等從略而結也溫陵曰淨穢之境常隨心感故澄徹之極則心魂染於靈悟佛境現於心光又以此心精研妙明至若作聖解即受群邪孤山曰觀察過越精明遍徹故十方虗空重重現色溫陵曰精研妙明抑伏雜想制心勝託力用過越故妙用逼極煥散而現也又以此心研究澄徹至若作聖解即受群邪泐潭曰定心澄徹精光不亂故暗能見物不除滅皆實境也溫陵曰人固有不明自發暗不能昏者惟微細定心澄使不亂而後能見暗物不除言皆實境不隨定變也又以此心圓入虗融至若作聖解即受羣邪真際曰由排擯力故四體虛融故刀火無損所謂入火不難入水不溺者溫陵曰定力虗融則五塵併消四大排遣純覺遺身故無傷觸定力所持故火不燒也世之端居喪我者尚能使形槁木心死灰況真定之力哉又以此心成就清淨至若作聖解即受群邪溫陵曰厭粗濁之質礙欣妙淨之虗融名成就清淨凝想日深久而自化故能洞觀得無障礙也真際曰厭想日深淨心功極故見十方皆成佛土又以此心研究深遠至若作聖解即受群邪真際曰由觀照力功用深遠迫心飛出故多隔見溫陵曰研心窮遠逼迫精神遺身而出冥有所至故能見聞遠方事也上皆未離色陰徒因定力而能出礙見聞遠及若色陰盡則十方洞開無復幽暗六通縱任無為山璧由之直度固無疑矣又以此心研究精極至若作聖解即受群邪資中曰此人曾有邪心種子合外魔境相因而來此則非善境界純是魔嬈不同前九皆稱善境起心作證方乃成魔者溫陵曰所見知識乃魔變現也前九但明定力獨此乃明魔事者定力未成不能動魔研究精極乃漸發魔事也故下文魔事愈甚阿難如是十種禪那現境至保持覆護成無上道泐潭曰五陰各為十魔種子所依共五十重皆在觀行初心所發故有退墮若入相似墮久不成故佛次第細辨相狀令初心識其所發氣分譬如色陰未破之中或現天魔此即想陰氣分之所發也吳興曰用心交互者用禪那心與色陰堅固妄想交互故現斯事乃至識陰例此明之何則以五妄想各於本陰區宇之中為禪所觀將破未破如燈欲滅其光復熾乃與定力交戰其功故成之敗之則魔佛之道於是乎辨阿難彼善男子修三摩提至虗明妄想以為其本孤山曰受有邪正正受屬定邪受屬魔故失其正受則當淪墜真際曰妄起見覺汩擾湛性名見濁即受陰之體也故受陰盡即超之溫陵曰受以領納前境為義已破色陰內外虗融故見諸佛心如鏡現像諸佛心即我妙覺明心也如鏡現像謂清淨虗凝了非形礙也雖具妙體而未能運用蓋為受所覆故如魘寐人支體宛具六根明了而不能運動此受陰之相也溫陵曰色除盡者已離形礙然為受所魘而未能用故受陰消歇即能離身反觀去住無礙也因違順之幻境生損益之妄受則受陰無體虗有所明故名虗明妄想阿難彼善男子當在此中至失於正受當從淪墜長水曰此中受陰定中也興福曰大光耀者即正之心明白之境也吳興曰其心發明即下文見色陰消受陰明白也有以狂慧釋之者非溫陵曰既破色陰無復幽暗故得大光耀知受陰為咎故內自抑伏而破之抑伏太過失於慈柔故多悲愍以致悲魔附焉阿難又彼定中諸善男子至失於正受當從淪墜真際曰由前色陰皆依境起此獨依心故生悲含受泐潭曰勇猛精勤生於功用陵率吳興曰陵率謂勇心高率也溫陵曰色盡受現為定之勝相因喜成功故感激勇動以為佛果可齊功行易致陵率之過故狂魔附焉今夫以少為足驕狂犯分自視無前者皆陵率之過也又彼定中諸善男子至失於正受當從淪墜溫陵曰凡修觀行須定慧等持乃能無失今此定強智微而受陰未盡故進無新證色陰已消故退失故居進退之間杳無所依名中隳地以無依無見故枯渴沉憶而憶魔附焉憶心妄系故如有撮懸也又彼定中諸善男子至失於正受當從淪墜溫陵曰前以定強智微此又慧力過定皆互有所失故欲等持也長水曰定力微故亡失恆審慧力過故溺於知見又彼定中諸善男子至失於正受當從淪墜溫陵曰進退失守故心生觀險以成邪憂自致患害也又彼定中諸善男子至失於正受當從淪墜吳興曰輕安七覺支中其體屬定定若兼慧正道可通今所發者既無慧自持則定翻成散魔得其便喜樂附焉又彼定中諸善男子至失於正受當從淪墜溫陵曰慢名有七恃己淩他名我慢同德相傲但名曰慢於同爭勝名過慢於勝爭勝名過慢未得謂得名增上慢以劣自矜名𢍉劣慢不禮塔廟等即邪慢也今之妄人不禮不誦皆慢魔也携李曰疊花寶巾類也又彼定中諸善男子至失於正受當從淪墜吳興曰輕安者名雖同前其義則異以云因慧獲諸輕清故此由受陰於諸塵境無重濁之惑便言成聖得大自在也溫陵曰以色消為精明以精明為圓悟遂以為得大隨順輕清自在皆得少為足無聞之儔也又彼定中諸善男子至失於正受當從淪墜溫陵曰因得虗明誤執斷空成諸邪咎凡為此者皆空魔也資中曰此從邪見種生引此空魔入其心腑大般若云魔能入一切衆生心令歸依魔如膠如漆斷手臂不以為難又彼定中諸善男子至失於正受當從淪墜溫陵曰愛心多因順起故定境順心即邪愛成咎吳興曰此如天台止觀煩惱境欲發之相智者去生來欲色抑制可停今所發者其惑熾盛若見外境心狂眼暗如睡師子觸之哮吼若不識者則能牽人作大重罪今文既云魔入其心則是煩惱與魔二境俱發阿難如是十種禪那現境至保持覆護成無上道泐潭曰愛相有三諸境中發為悲哀衰微憂懸者即苦違境也發為勇猛大喜我慢貪欲者順樂境也發為輕安空心疑慮者中容境也溫陵曰諸陰結文皆云保持覆護等即深防邪誤助道之意也阿難彼善男子修三摩地至此則名為想陰區宇長水曰未破想陰故如熟寐寱言也有成聖位分故如音韻倫次也令不寐者咸悟其語如證聖人則知彼有聖位之分故般若云如來悉知悉見是人皆得成就阿耨菩提携李曰想者心慮浮相識情妄習能覆妙明障聖道故雖得受陰盡其心離身去住自由已為成就聖位得意生身之因然尚為想陰所覆故譬熟寐寱言也雖未即得而因已成就故譬無別所知而已成音韻也如是因相惟想盡者能知故譬不寐者咸悟其語此想陰之相也若動念盡浮想消除至融通妄想以為其本孤山曰覺明如鏡浮想如塵想盡心明猶居相似首尾猶始終也若悟真常無始終生死之異故云圓照溫陵曰想能融變使心隨境使境隨心如想酢梅能通質礙故名融通妄想長水曰浮動塵消故無覺明垢無動則生滅想亡覺淨則始終念滅故一倫生死首尾圓照也憶識誦習發知現塵名煩惱濁即想陰之體也故想盡則超之想能融變使心隨境使境隨心也阿難彼善男子受陰虗妙至汝當先覺不入輪回吳興曰飛精附人斯必附其可附之人亦修定習者耳溫陵曰得受陰盡曰虗妙已無受魔曰不遭圓定等者想陰定中也愛圓明求善巧者因其虗妙生愛思於圓明之體以發漚和之用也天魔變現教化者示漚和善巧也附人附他人也其人所附人也彼人是人皆指修定人也想陰十段皆初舉天魔次明鬼魔而舊科不分今按經分之前總敘云或汝陰魔或復天魔或著鬼神或遭魑魅後總結曰是十種魔或附人體或自現形魔師淫淫相傳邪精魅其心腑如受陰中舉悲等十魔即陰魔也想陰初舉十類即天魔也阿難又善男子受陰虗妙至汝當先覺不入輪回携李曰愛遊愛遊歷異境也又善男子受陰虗妙至汝當先覺不入輪回溫陵曰愛綿㳷者密契妙理也希契合故魔與開悟自開悟下皆密契事也資中曰夫亡機寂照理自玄會若希求契合擬心即差於是天魔得其便也又善男子受陰虗妙至汝當先覺不入輪回溫陵曰愛穹萬化之本故爽其心以辨拆將佛涅槃等者以肉身為果德以幻生為常住而撥無淨土報體皆因其辨折化元而妄為混融之說也以穢染為真淨亦意引媟欲也又善男子受陰虗妙至汝當先覺不入輪回吳興曰懸應在聖冥感在己於未證理前求其休驗也又善男子受陰虗妙至汝當先覺不入輪回溫陵曰愛深入幽靜以證養通力也吳興曰陰寂靜謐即深入之功下各知本業即深入之念又善男子受陰虗妙至汝當先覺不入輪回溫陵曰好知潛匿異事及宿命也吳興曰宿命者六通之一也小乘修成大乘發得今進不待變退不從修作念求之故招魔事又善男子受陰虗妙至汝當先覺不入輪回溫陵曰化元萬化之本也欲乘之以發神變携李曰神通即變化之事化元即變化所由也又善男子受陰虗妙至汝當先覺不入輪回溫陵曰欲入滅定以趣空寂也孤山曰薄蝕者經史皆作食常昭云氣往迫之曰薄虧毀曰食又善男子受陰虗妙至汝當先覺不入輪回孤山曰變易者斷見思盡生法性土故受變易今頓欲變粗身為細質易短壽為長齡從此分段延入彼土也自在天即欲界第六天上別有魔王居處亦他化自在天攝溫陵曰三界惑盡方離分段生死得變易生死今功未成妄希即惑矣研幾謂研窮幾微以深求也細想云者欲變粗為細求久住世也阿難當知是十種魔至失正遍知墮無間獄溫陵曰涅槃經云末世魔屬現比丘羅漢等像混壞正法非毀戒律儀意同此也汝今未須先取寂滅至保持覆護成無上道孤山曰末世魔現比丘等像混壞正法非毀戒律故於篇終戒勗修證溫陵曰始以阿難起教終復囑令弘宣足知大教源流浚發遐被無非阿難之力則示遭魔事徵心辨見皆為末法起大慈悲令不著魔得正知見也當知昔雖四派示滅今之法化常存與夫在處影響無非留願之身也大佛頂如來密因修證了義諸菩薩萬行首楞嚴經第十阿難彼善男子修三摩地至此則名為行陰區宇携李曰夜之夢寐晝之想像想陰盡則覺寐一塵影滅故山河如鏡無所分別即虗應而已孤山曰雖未下謂雖未能別相見彼衆生修因趣果因由端緒已能總相見彼生類俱由行起名此行陰為同生基野馬陽焰浮埃也熠熠光耀閃爍之貌清擾即下文幽清擾動是也孤山曰行想二魔見思為體行中諸見有六十二即六十二化也溫陵曰通敘想滅行現也浮動妄習晝明則想夕瞢則夢汩亂性真莫得而一擾動覺明莫得而靜故想陰盡者夢想消滅寤寐恆一覺明虗靜猶如晴空也五陰前粗後細故想盡則無粗重影事雖觀萬象而無想念故如鏡鑑明無粘無迹虗受照應了無陳習惟一精真明極如此故幽隱行陰於是披露也行為萬化生滅根元故其相披露則十二類生之元無不殫見各命由緒識也同生基行也擾動幽隱故譬野馬乍生乍滅故曰熠熠無復粗影故曰清擾根塵運止皆本于此故曰究竟樞穴若此清擾熠熠元性至幽隱妄想以為其本真際曰想滅則此心為澄空行現則游塵清擾識為立命由緒其性元澄行破還元則流習頓滅故為澄本溫陵曰行陰習擾成性故稱元性元習能滅擾習則歸元澄之本而遷流相盡矣故如波瀾滅化為澄水也生滅不停業運常遷名衆生濁故行陰盡則超之行陰密移曾無覺悟故曰幽隱妄想阿難當知是得正知至是人墜入二無因論溫陵曰夢想消亡寤寐常一故稱正知奢摩他又稱凝明正心皆想盡之相也携李曰既見此已遂以一切生滅皆圓於此而不進窮識陰本末遂立二無因論泐潭曰外魔皆因心召故想盡凝明則天魔不至從此惟是修禪失趣狂解妄計是即陰魔也生類本即同生基也於本類中生元露者於同生基見己行元也幽清動元即行元也一者是人見本無因至墮落外道惑菩提性孤山曰生機既破則根離區穴而眼清淨故能洞見業流灣環者隨業流轉如水在灣回旋其處不能自出也未脫識陰定力有限故八萬劫來冥無所見無所見故計本無因也不知本因存乎妄識此所謂亡正遍知吳興曰生機全破者機喻擾動即行陰也不為想陰所覆故云全破眼根八百功德既約三世四方論之今見本無因即乘過去功德下見末無因即乘未來功德斯由定中發宿命通乃令眼根彰此力用業流灣環行陰流轉也冥無所觀外道冥諦也夫善惡業緣惟識變造是人八萬劫外尚不見行何況於識故從此來起無因計二者是人見末無因至一切物象皆本無因吳興曰無復改移者此見一分人畜之類有經長時業果未轉故起斯計如智論明舍利弗觀鴿子身前後皆八萬劫不改其類今行陰中既見此相乃執一切自然而然此即不知十二類生各命由緒等明能末未觀八萬劫以外同聲聞故溫陵曰謬執生根不達此理以人竟為人乃至黑竟為黑無復改移因而例我本不見道末亦無成是末無因也結文本字合是末字由此計度亡正遍知至第一外道立無因論長水曰一無因有想中來自憶無所有二智觀察是計謂諸見有定心出智二相以依根本後得二境故吳興曰肇師云外道末伽梨謂衆生苦樂不因行得皆自然耳前經云末伽梨等都言此身死後全滅今計無因雖不云死滅必至劫滿亦同其倫當知諸見不出四句謂斷常雙亦雙非也上二無因即斷見下四遍常及一分無常一分當乃至死後俱非即後三句餘之所計皆源流于此阿難是三摩中諸善男子至是人墜入四遍常論長水曰行陰生滅相續不失故名常所計四種一切法故名圓孤山曰遍常曰心者一觀心境二觀四大三觀八識四觀想滅總計為常名四遍常溫陵曰前言圓擾動元此言常擾動元者以生滅之元皆圓於此遂執為常而起遍常論遍即圓也故此標名遍常後結名圓常一者是人窮心境性至不曾散失計以為常真際曰心境二處雖則無因二萬劫來相續不斷故計為常泐潭曰由妄計行陰為生滅圓元遂于心境四大八識等皆起妄計或撥生滅而計常或存生滅而計常或認識神而計常或起邪見而計常今此窮心境性本自無因謂無生滅故以十方衆生生滅之理皆則循環本無散失此撥生滅而計常也想陰盡者依心境二法修觀故功力能知二萬劫事後四萬八萬例此二者是人窮四大元至窮不失性計以為常溫陵曰衆生依地水火風生滅而四性元則常住則諸生滅法咸皆體常真際曰言六根者舉所依根顯能依識也既云心意識中故知觀八識也溫陵曰六根及末那執受即八識也心意識中本元即識性也八識元由惟佛與入地菩薩能窮若真能窮盡則入智境離心意識今此唯得心意識中本元由處謂其本性恆常衆生依之循環而住不曾散失此認識神而妄計也四者是人既盡想元至因心所度計以為常吳興曰前指本元為常即于生滅計不生滅如見細流謂之止水也今取理中為常乃于不生滅計不生滅如見虛空謂之常住也斯亦妄認行陰為理耳溫陵曰想元想陰也生理行陰也妄謂流轉生滅皆屬想心今已永滅則不生滅理自然屬行不知行陰即生滅元也長水曰此于生滅計不生滅故執為常由此計常亡正遍知至第二外道立圓常論吳興曰此四遍常所窮之境從廣至狹而成次第携李曰初通五陰二局色陰三惟行陰四但是行陰不生滅理若言第三計八識第四復計行陰其義既失所次亦非又三摩中諸善男子至一分無常一分常論携李曰四顛倒者一由自及他二離心觀土三別觀心精四謬於四陰各起分計故也孤山曰於自他境妄起倒見其類有四各計一分無常一分有常一者是人觀妙明心至則我心性名之為常長水曰此以湛寂之理為常生滅之性無常携李曰妙明圓湛離我我所而外道于此妄立神我從是計我遍凝不動而諸衆生于中生死遂計自為常計他無常吳興曰觀妙下重舉觀行湛然下正明起計亦由不了行陰生滅妄謂此處心性湛然以為神我言神我者外道名主諦謂一切法皆是我所悉以此神而為其主二者是人不觀其心至劫不壞處名究竟常吳興曰謂二禪以下終為三災所壞名無常種性四禪以上灾不能壞名究竟常溫陵曰前依心觀此依土觀種種遍計一法既邪萬法皆倒矣三者是人別觀我心至從我流出名無常性長水曰此觀心精細流轉即細相生滅溫陵曰不能即身即心故作別觀微塵喻精微也謂由心精密運令身生滅而心不壞滅前于一法作二計此于性作二計也四者是人知想陰盡至今已滅盡名為無常長水曰此以陰行流性為常色受想為無常携李曰幻陰一體遷流一相而且執是而迷非見今忘昔故以流者為常遷者為滅由此計度一分無常至第三外道一分常論溫陵曰以理為真以相為幻於理則融于事則礙不免墮此四種分計泐潭曰此四顛倒初觀神我及一切衆生即正報也次觀國土與劫即依報也此二對他明常無常三觀我身及心四計陰等此二約自色心明常無常亦從廣至狹也又三摩中諸善男子至是人墜入四有邊論長水曰此分位計度一三際二見聞三彼我四生滅是名四邊計溫陵曰分位有四謂三際分位見聞分位彼我分位生滅分位一者是人心計生元至計相續心名為無邊興福曰此以觀過未有分位為有邊相續無分位為無邊溫陵曰生元流用行陰也因遷流計三際以過者已滅來者未見故名有邊現在相續故名無邊不知真際本非有邊非無邊也二者是人觀八萬劫至有衆生處名為有邊孤山曰無見聞處其境叵則有見聞處其境可了故名有也吳興曰後八萬劫亦合如前今恐存略溫陵曰前以不見為有邊此以無聞為無邊乃回互倒計也三者是人計我遍知至不得無邊之心但有邊性泐潭曰觀我遍知之性其知無涯故名無邊彼所觀者其境有極故名有邊真際曰我知彼性乃與同體今曾不知是彼與我異則我得無邊彼但有邊矣孤山曰我曾下謂但見彼人現我知中而不能知彼人性遍故計彼性以為有邊四者是人窮行陰空至一半有邊一半無邊資中曰此于密移中觀造化性故計一身半生半滅以生為有邊以滅為無邊溫陵曰因窮行空昔有今無遂以一陰為半生半滅而內根外器一切皆然以生為有邊滅為無邊由此計度有邊無邊至第四外道立有邊論吳興曰此四有邊初惟約自二單約他三具自他四重計他一切依正斯則前狹後廣以成其次携李曰諸皆窮道失趣展轉妄計所謂禪那狂解迷謬至此又三摩中諸善男子至不死矯亂遍計虗論溫陵曰以邪倒故於知見中狂解不决遂矯亂其語也今之邪人妄謂得道而中無主心矯惑于人者多類此孤山曰四種矯論由分別境相立知見名字資中曰準婆沙論釋外道計天常住名為不死計不亂答得生彼天若實不知而輒答者恐誠矯亂故有問時答言祕密言辭不應皆說或不定答佛法訶云此真矯亂故名不死矯亂虗論也一者是人觀變化元至今彼前人遺失章句長水曰于一生滅行陰分為八義別見謂變恆生滅增減有無也答中略舉六義以不能定其道理但兩楹而答故云亦生亦滅等携李曰總觀八境知見多端報答不定此觀化迷理矯亂溫陵曰此觀萬化見其不齊遂生異解用心別見即異解也于是不能決擇矯亂其語二者是人諦觀其心至除無之餘無所言說孤山曰此二節觀心執無執有矯亂遍觀一境故唯見一義溫陵曰互互無即念念滅相也得證者悟一切法皆無也三者是人諦觀其心至除是之餘無所言說真際曰此觀境亂心矯亂蓋有無兩觀者溫陵曰各各有即念念生相也言無言是皆不明答四者是人有無俱見至一切矯亂無容窮詰溫陵曰枝如樹枝差互不一由此計度矯亂虗無至不死矯亂遍計虗論資中曰今之邪人妄謂得道而中無主正矯惑于人者多類此吳興曰從二至四於前入中有無分出也二三單計第四兩亦有即是無如水是水也無不是有如水非氷也四句之中但涉三句未見雙非其計猶慶又三摩中諸善男子至如是循環有十六相携李曰十六相者一謂終後生有色有想二者生無色有想三者生亦有色亦無色有想四者生非有色非無色有想五者生有邊有想六者生無邊有想七者生亦有邊亦無邊有想八者生非無邊非有邊有想九者生有樂有想十者生有苦有想十一者生亦有樂亦有苦有想十二者生非有樂非有苦想十三者生有一想十四者生苦于想十五者生有少想十六者生有無量想資中曰無盡流即行陰也由見無盡故言死後有相溫陵曰或自下心顛倒故固執色身以色是我又謂我體圓遍則色為我有前緣即目前之色也行相續相亦色也於色作此四計於受想行亦然故成十六相皆計死後復有也携李曰不言識陰者所計之我即識陰也吳興曰不爾外道六法我與識異今行陰未彼識未當情故不言耳從此或計畢竟煩惱至死後有相心顛倒論泐潭曰有為無為諸法也畢竟並驅者計煩惱菩提不皆後有也吳興曰上四陰與我既死後有相或復妄計煩惱菩提理亦如是煩惱由陰而生菩提由我而證言畢竟者即兩性不相陵滅入未來際此皆後有也言五陰者通結五陰王在前四又雖在前四義惟行陰耳又三摩中諸善男子至如是循環有八無相長水曰諸陰滅計度真際曰于未劫未見生無想論是為八見溫陵曰陰性消散謂色受想滅也生理即行也謂無受想則行亦滅也此約四陰現在因亡未來果滅因果合論故成八相從此或計涅槃因果至死後無相心顛倒論長水曰前旁計諸法後有此旁計諸法後無吳興曰涅槃因果依現陰而修後陰而證陰既恆則修證何有耶又三摩中諸善男子至死後俱非起顛倒論吳興曰此存滅計度吳興曰雙計有無至死後俱非者此有二義一亦有亦無二非有非無下文先計雙亦次計雙非溫陵曰行存則有相也受想滅則無相也以前後相例則存者終無雖有非有滅者曾有雖無不無四陰雙計故成今非色受想中見有非有至皆言死後有相無相吳興曰此計雙亦也見有非有謂色受想無也觀無不無謂行陰有也如是循環等例立雙亦謂三陰無亦如行陰之有行陰亦如三陰之無四陰各二故名八俱非相言俱非者對前遍計有無得名文意且在雙計有無耳故總結云有相無相泐潭曰三陰為滅相故見有非有遷流為存相故觀無不無隨得一緣者于四陰隨舉皆生計執八俱非論謂于末劫末見生非想非非想生有色非有想非無想有生無色非有想非無想有生亦有色亦無色非有想非無想有生非有色非無色非有想非無想有生有邊非有想非無想有生無邊非有想非無想有生亦有邊亦無邊非有想非無想有生非有邊非無邊非有想非無想是為八見又計諸行性遷訛故心發通悟有無俱非虗實失措資中曰諸行一切遷流法也因見行陰遷訛不定遂生邪悟謂一切法有無俱非不可定指吳興曰此計雙非也色受想等皆名諸行悉有遷訛下文云甲長髮生氣消容皺及念念不停即其相也於前四陰雙計有無亦有八俱非義此見既細所以的就行陰言之由此計度死後俱非至死後俱非心顛倒論真際曰今人惑于俗論而疑死後有無者多矣皆八俱非類也溫陵曰昏瞢無可道者不能明知死後之事也又諸摩中諸善男子至是人墜入七斷滅論溫陵曰見行陰念念滅處名後後無由是忘計設生人天七處後皆斷滅此後無計度為七斷滅論興福曰婆羅門于末劫末見起斷滅論總有七見或計我身從因緣生必歸磨滅或計我于欲天斷滅或計我于色天斷滅或計我于無色界空處斷滅或計我于識處斷滅或計我于不用處斷滅或計我于有想無想處斷滅是為七見見行陰念念滅處名後後無由是妄計設生人天七處後皆斷滅也或計身滅或欲盡滅至死後斷滅心顛倒論溫陵曰身滅即欲界人天二處也欲盡初禪也苦盡二禪也極樂三禪極捨四禪也及無色也是名七際謂七際事相皆現前消滅更無復生終歸斷滅也吳興曰此計應從第七外道流出但前約橫論今約竪說若攝橫歸竪則前無相屬今身滅又三摩中諸善男子至如是循環五處究竟携李曰此後有計度為五涅槃論孤山曰婆羅門於末劫末見入四十四見中或于本劫本見盡入十六見中或于本劫不見末劫末見盡入六十二見中此六十二見世尊亦如是知如是見但不執著耳蓋外道以知見立知故成見網如來以知見無見故成菩提溫陵曰見行滅復生名後後有妄于五處計涅槃果轉依者轉生死依涅槃也或于欲界悟圓明理遂以欲界即轉依處或以初禪離憂二禪離苦三禪極喜四禪極捨即轉依處是謂五涅槃也迷有等者不知此天皆屬有漏非無為果非究竟處也由此計度五現涅槃至五現涅槃心顛倒論携李曰此計應從第六外道流出橫竪攝屬亦如七九之類吳興曰前標後後今結五現者影互其文也阿難如是十種禪那狂解至作大覺王清淨標指溫陵曰前云禪那現境乃天魔候得其便此云禪那狂解乃心魔自起深蘖泐潭曰凡見道不真多岐妄計皆即狂解是謂心魔最宜深防也汝等下令弘宣人將如來語遍為羣生保持覆護使魔不侵孽不作不墯邪岐不取小證而直登覺位是謂作大覺王標指也吳興曰此云心魔後識陰云見魔心見不出見愛二惑即煩惱魔也阿難彼善男子修三摩地至此則名為識陰區宇孤山曰此識陰十魔為受命之元行窮識現故深達命元行陰遷流不出根境之法由感應懸絶故內外湛明諸類不召故入無所入吳興曰受命元由者識息暖三和合成命受生之際識陰為先也溫陵曰通敘行滅識現也行為世間遷流之體性擾動生機之綱紐補特酬業之深脉能隱晦性天馳逸六根汩擾內湛為浮根塵究竟樞穴故行陰盡者生機綱紐倐在隳裂補特深脉感應懸絶而性天將大明悟六根無復馳逸以不馳逸故內外湛明以無驅穴故入無所入反動而靜深之又深故曰內外也涅槃性天為五陰所覆昏如長夜前三陰盡如雞初鳴雖為曙垂猶沉二陰精色未分此行陰盡如雞後鳴惟餘一陰故將大明悟也受命元由識陰也以行滅識現故深達無樞穴故可觀無遷流故可執無生機故不召遂了十方依正皆識所變故已獲其同性天精色雖未明徹而幽祕之想已漸發現此識陰之相也資中曰識為還元之地故諸乘于此妄立因依而取果證總成十魔若於群召已獲同中至顛倒妄想以為其本吳興曰六用不隔皆悉通鄰即法華所明六根清淨也孤山曰罔象亦倣象皆不實貌溫陵曰群召同中即十二類之命元識陰也若於此中以定慧力消磨六門使根合而不分界開而不隔則見聞圓通六根互用由是外之世界內之身心無復留礙此識陰盡之相也性本一真由塵隔越性用之間同異失準名為命濁故識盡則越之識乃妄覺影明元無自體由顛倒起故名罔象虗無顛倒妄想阿難當知是善男子至背涅槃城生外道種携李曰此因非因執吳興曰覺知通㳷能入圓元者示觀中所發之相也斯亦功用暫得如是不生勝解名善境界由起邪執故墮外道種類溫陵曰識由行流故行空則還元既空行陰故已滅生滅尚依識元故寂滅未圓而能漸破識陰消磨六門故己六知根㳷合無隔諸類覺性通融不二故能入圓元圓元即融根隔通諸類之識元也若以此為真所歸地而立為真因則墮因所因執蓋真因非所有所皆妄娑毗外道認阿賴耶識未形之前冥然初相為所歸真因正同此也以心有所得果有所歸即因即果皆墯所妄所以違圓通背涅槃也孤山曰阿賴耶識是諸聖人現法樂住三昧之境人天等趣諸佛國土悉以為因常與諸乘而作種性即此義也阿難又善男子窮諸行空至生大慢天我遍圓種携李曰此能非能執計我生彼成遍圓種長水曰大慢天即摩醯也不能謂能故名大慢也遍圓者計我體圓遍空界也溫陵曰執識元為自體而謂一切衆生自此流出遂執我能生彼而實不能故曰能非能執摩醯首羅即色頂魔王也妄計我能現起無邊衆生亦能非能類也能為心能事果者計我能為彼依能成彼事也又善男子窮諸行空至背涅槃城生倒圓種吳興曰從彼流出者此指所歸識陰為彼非指他人也携李曰此常非常執計彼生我成倒圓種溫陵曰以識元為所歸依故疑彼能生我及一切法遂計生起流出之處為真常無生之體此則在生滅中妄計常住既惑真不生性又迷現生滅法以非常為常故名常非常執既計彼能生我即與計自在天能生一切者同矣由依識元妄計常住故曰立因依心成妄計果前計我圓生物此計彼圓生我故名倒圓又善男子窮諸行空至背涅槃城生倒知種資中曰常住真心一體無二用諸妄想依正乃分是故衆生草樹悉如空華當知草樹山河皆是有情自心所變故說有情有佛性時即草樹有性說有情成佛時即草樹成佛以心外無境故華外無空故波不離水故執不了乃謂一一草木各各有知遂說木死有人人死為木未明一體謬計遍圓也溫陵曰所知即所觀識陰也謂識有知而一切法由知變起因計知體圓遍諸法遂立異解謂無情遍皆有知無所簡擇故曰無擇遍知此以無知為知故名知無知執婆吒霰尼二外道也執一切覺謂執一切有知也此謬計圓知以為因心則果終虗謬矣以無知為知是倒知也又善男子窮諸行空至背涅槃城生顛化種吳興曰園化者謂觀中所見園融變化惟識之境也一功發生即四大之相也觀塵成就別名地大以此群塵通指四大既見此時並由園化乃計終圓證果不出火之見明水之清淨等故曰發作本因立常住解迦葉波亦婆羅門別姓下所并者總攝其類溫陵曰識陰盡者消磨六門諸根互用今此未盡則才得隨順而已因隨圓互于是計一切法皆能圓化發生勝果謂火能顯發光明乃至塵能成就器界遂則邪求邪觀而勤心崇事執為能生勝果而實不能故名生無生執即三迦葉波諸外道之儔也既迷真心從物求冀則因果皆妄顛倒化理名顛化種又善男子窮諸行空至背涅槃城生斷滅種吳興曰非滅群化非尤破也群化即四大等携李曰歸無歸執計永滅依成斷滅種溫陵曰觀理不諦誤墯虗無故于圓明性中計皆虗無於是絶滅群化歸於永滅而不知其非名歸無歸執舜若多云空言無想舜若即執斷空外道也以執斷空故圓虗無為因心成空亡之斷果永滅依即外道之涅槃也又善男子窮諸行空至背涅槃城生妄延種溫陵曰阿斯陀此云無比即長壽仙也彼雖延長終歸壞滅今此欲固妄身以求常住則空長勞耳妄延耳長水曰長勞果者應侔牢聲之誤耳吳興曰依識陰觀圓常執識元為圓精遂欲固保其身與之並存妄貪堅久不知其非名貪非貪識陰精明湛不搖處名之為常今見其常乃執色身同此精圓也身本無常實不可貪以為長久今堅貪著故云貪非貪執又善男子窮諸行空至背涅槃城生天魔種孤山曰真非真執謂留欲固命成天魔種携李曰吒枳迦羅能化欲境自娛溫陵曰以識陰為命元互通三際識陰若盡我命亦盡誰證其常故便于定中化諸欲境以留塵勞不令銷盡也依此邪思欲證真常而不知其非名真無真執吒枳迦羅即欲頂自在天類也因其邪思感生天魔惟恣塵欲名熾塵果媛美女也又善男子窮諸行空至背涅槃城生纏空種孤山曰背清淨解卷十道者既發小解乃背圓融常樂我淨之道今於四德略舉一耳携李曰定性聲聞曰明經謂畏若厭身志存泥洹墮阿羅漢者溫陵曰命明者因窮識陰深明衆生受命元由也以生滅猶識精粗由業故依四諦分別決擇以苦集為粗僞以滅道為精真於是專修道因求感滅果以少為足故居滅即休斯特定性聲聞上慢之儔也此則圓精應為因心成趣寂之小果精應者即決擇粗業惟求精應證于偏真纏空趣寂而已又善男子窮諸行空至生覺圓明不化圓種携李曰圓妙真體思習俱盡名清淨覺明于寂妙中極其本真發研深妙以此為果名定性辟支長水曰識陰總統入識而入識者是根本故通敘聲聞諸修證法溫陵曰融淨覺明即識精也雖無惑習圓融清淨而未離于識故名覺明若以此為深妙立為果證則定性緣覺獨覺而已此則圓覺㳷為因心成湛明之滯果爾覺㳷如心精通㳷覺知通㳷之㳷謂僅與正覺通㳷而不前進也湛明即圓融覺明也所覺止於圓明識精而定性不回故名覺圓明不化圓種也阿難如是十種禪那至從始成就不遭岐路吳興曰大妄語者別指前八也前八通名外道邪魔亦可別指七是外道八是邪魔俱未斷惑故云墮獄二乘異此故云不進言見魔者見以違理為名前八違真中二理起界內邪見后二違中道理起界外邪見以二乘智即無明故又前八中七純是見八具見愛以留塵勞生勝解故溫陵曰窮道失趣故中途成狂轉遭枝岐曰因依迷惑所愛先習即邪傳謬解也祕為真得遂即休心將為畢竟所歸寧地適足自誤故邪魔依之終墮惡道二乘依之不成增進最宜深防也邪見錯解為妖為孽顛蹶身心謂之見魔心為內韄見宜外鍵故前防心魔此防見魔則助道之要盡矣如是法門先過去世至圓滿菩提歸無所得真際曰先聖乘此心開得道后學固宜勉究也識盡則消磨六門故諸根互用從互用中入金剛惠發圓明心即心開事也直超信等入如來海歸無所得即得道也金剛乾惠為等覺后心十信諸位為進修漸次此能直超不歷者諸位修進為治惑習今識盡無習故能超之等覺圓明歸無所得者自初乾惠至等覺未為圓明尤有所得為識未盡也至獲金剛心破盡細識乃能圓明入妙覺海歸無所得此真修之盡道吳興曰如是法門且指識陰禪那現相過去諸佛無不覺了入佛知見故曰乘此心開也能入金剛乾惠者從相似位超入等覺后心也天台明圓教利根一生有超登十地者與此符合圓明下至寶月示後心所證有法有喻有體有用金剛乾惠是妙覺無間道轉入解脫道即妙覺也故云入於如來等也妙莊嚴海是福究竟圓滿菩提是智究竟歸無所得是理究竟福即解脫智即般若理即法身不縱不橫三德祕藏於茲具顯遠討其因實由初心修奢摩他三摩禪那三止之功也溫陵曰妙莊嚴海者統衆德合異流不嚴而嚴無證而證之果海也前稱首楞萬行為妙莊嚴路則起此而已阿難即從座起重復白佛至如演若多迷頭認影携李曰此問有二想心以上問生起因緣緣此以下問還滅因緣溫陵曰生死妄業塵垢妄緣真淨性中既無所留全因妄起猶如迷頭則五陰相中五妄為本從可知也吳興曰精真中道也妙明寂照也寂故即假照故即空三諦融通元無塵垢總名本覺圓淨此單論真性也乃至下單論妄想生起諸法斯元下合明真妄發生世間所以爾者無前單論則不知離義無後合明則不知即義妄元為因於妄想中至五陰本因同是妄想長水曰破因緣自然之情因謂能生緣能長養因由攝助因方能生生已相續緣力長養或因惟一緣乃衆為又自然者或名自生或名自相或名自體或名自法自覺也溫陵曰明妄無因不容計度也知妄所起可說因緣不知所起因緣何有況推自然得非妄計邪汝體先因父母想生至名為堅固第一妄想携李曰體因想生心因想起命因想傳諸想交固以成色陰故名堅固妄想溫陵曰想為虗妄影象欲愛深脉遺體自想愛流出故曰體因父母想生陰中乘想愛冥求故曰心於想中傳命酢物等說以驗體用妄結故與妄理相應若非妄倫則妄不能感也即此所說臨高想心至名為虗明第二妄想真際曰虛明妄想為違順因緣吳興曰由因受生者因想故受生也去動色體即形受酸澀也當知色受想三陰妄想相由而起必不相離溫陵曰臨高空想而酸澀真發違順皆妄而損益現馳則受陰為體虗有所明故名虗明妄想由汝念慮使汝色身至名為融通第三妄想真際曰融通妄想為形取因緣溫陵曰念慮虗情也色身實質也虗實不倫而能相使者由想融之也心生虗想形取實物心形異用而能相應者由想通之也至於寤寐搖變使心隨境使境隨心皆融通妄想也化理不住運運密移至名為幽隱第四妄想真際曰幽隱妄想為體遷因緣密移非汝云何體遷若即汝體自應有覺長水曰初標行陰幽隱之相阿難下牒辨虗妄之理吳興曰此若非汝此指化理不住等也云何體遷詰其甲長髮生等如必下若為體迂實是汝者何不覺此相代之相以不覺故行陰生滅名為幽隱又汝精明湛不搖處至念念受熏有何籌算真際曰此陰通收八識用動體常見聞精明同一識陰何因下示妄習想念念受熏者以昔覩奇物納種在識若不受兄覆覩前異必無記憶之想既不忘失則知中間常為無明念念熏習兄習即妄何精真之有乎携李曰精湛不搖指識體也見聞覺知指識用也非真常而執常曰名恆常者精真不容妄習今能藏昔宛不遺失即妄習也則湛雖不搖而念念受熏其容妄多矣阿難當知此湛非真至第五顛倒細微精想吳興曰六根互用等如破見思故妄想滅即粗垢先落也問上文受熏約無明說今妄想滅何止見思耶答無明所熏亦見思種子故前指見物有憶有妄正是粗相今種現雖盡根本尤存非謂六根得真互用溫陵曰湛非真湛特幽潛不覺耳故譬急流之水幽潛流注不可測知此真憶想之元容妄之體也直須消磨六門使妄習無寄然後可滅也串常習也幾微也似無曰罔似有曰象其體精微故名罔象虗無顛倒精想阿難是五受陰五妄想成至湛入洽湛歸識邊際携李曰受陰亦名取陰佛果報身有為無漏以非惑業所生故取以惑業為取陰從取生故名取陰溫陵曰五受陰亦曰五取蘊由一念迷妄故此取此以自蔽藏也言因界者本無有界由妄想因也故色不自色因空有色故成色邊際乃至滅不自滅因生有滅故成行邊際識稱湛了而湛不自湛因行不流逸性入元澄而合乎湛了成識邊際此五陰元重疊生起生因識有滅從色除長水曰五陰生起從細至粗由迷智有識乃至由受有色也滅則從粗至細必破色而後受現乃至破行而后識現也孤山曰約生則由內造外從細至粗如著衣也故迷理有識乃至有色約滅則由外至內從粗至細如脫衣也故悟理色盡乃至識盡理則頓悟乘悟併消至何所不明再此詢問吳興曰所指前說亦有頓漸二義巾體是一以喻其性悟則成頓也巾結有異以喻妄想除則成漸也真際曰識譬則劫波巾也色譬則最後結也結依巾有故生因識有解因次第故滅從色除理則頓悟乘悟并消者知巾本無結亦不有也事非頓除因次第盡者巾根頓悟必假漸修也若因悟忘修則有解無行執理迷事適墮偏邪終非正修真三摩地資中曰原夫天巾由次第而結亦次第而解所譬六根及以五陰生之與滅一往相類再研有殊何者以六根義橫五陰義竪故且如六根迷真起妄因妄成根必無先眼次耳等異至於返妄歸真亦無從粗至細之理豈非義橫邪前以解結次第為喻者但取六根差別及選圓通謂之次第也今明五陰亦迷真起妄因妄成陰既云生因識有滅從色除豈非義竪邪若以結解喻之則二番次第宛有倫緒當知前文舉喻不可以喻難法此引例不可以根難陰適時之說須曉大綱汝應將此妄想根元至知有涅槃不戀三界孤山曰上明助道分竟正宗大分文終于此下乃流通分也不録溫陵曰令以此義自覺覺他永斷妄元齊歸正果也佛說此經已比丘比丘尼至皆大歡喜作禮而去吳興曰初發心者圓教外凡或內凡也皆大歡喜通該凡聖也溫陵曰皆在會聽衆也聖仙童子即天仙類也大力鬼神諸護法者隨所證量皆得法喜也楞嚴經後序行簡蓋如來瑞世無非為一大事因緣而究竟堅固為誓首談四諦次說空有斯經肇為慶喜遭魔所攝假以因依再敷重重啓請婆伽至尊頂放百寶之光舌吐一乘之談七處徵心而入還見性破根塵之非相明七大之有歸至於根根塵塵周遍法界而事事物物渾成教海仍徵諸聖會一真則諸漏頓圓契一機則精明密證返聞思修則觀音豈容外覔一門超出則圓通盡在吾身十九說法自知不在他弘四不思議由來一心變現阿難重請斷除四禁以業果無生潔淨五蘊而冤魔不復十二類之受生悟之弗有二十五有之出離達之即無至哉玄教攝盡群機而至有言首楞嚴之決定誠一代之宏規地上地前未臻斯定則事法差殊大智大聖不入斯宗無由決擇故玄言一成於當世則大法益闡於末運壽梓流通冀人人各悟本心剎塵遍謹言
