body:
  text: 大佛頂如來密因修證了義諸菩薩萬行首楞嚴經第四爾時富樓那彌多羅尼子至次第遷流終而復始資中曰從初至第二卷破心見二執以顯人空從汝猶未明一切浮塵至第三卷破陰處界等以顯法空故知前破人法二執顯空如來藏今顯不不空如來藏故富那有此問也長水曰如來藏心不空不有即性即相名第一義是佛所證決定無妄審實名諦然清淨則宜無諸相本然則宜無遷流又如來說地水火風至宣流大慈開我迷雲真際曰富那首問何生諸相欲得續因以斷輪𢌞也此問四大各遍云何相容欲窮幻相也溫陵曰二問皆攝前四科七大之文起疑也意以性相相違理事相礙實常情疑滯故致此問佛言富樓那如汝所言至我常聞佛宣說斯義補注曰性覺妙明本覺明妙此蓋佛意欲顯山河大地由妄覺生故且先標真覺體用互顯而初無能所者以立本也下文乃舉真妄二覺詰其所解方便勾引以顯妄覺耳孤山曰性覺妙明本覺明妙者萬法體用異稱也能性一切曰性覺性覺之妙顯乎明即自體而出見於萬法者也性之所本曰本覺本覺之明藏乎妙即自用而反冥於一真者也了斯二義則體用一覺物我一妙無復諸相之異矣佛言汝稱覺明為復性明至為覺不明稱為明覺溫陵曰促舉前義問之定其解惑也夫汝所謂覺所謂明意作何解長水曰為復性本自明靈然不昧故稱之為覺邪為復性自不明用心覺之故稱之為明覺邪靈然不昧者真覺也用心覺之者妄覺也富樓那言若此不明名為覺者則無所明補注曰上文兼舉真妄二覺以詰富那性明者真覺也覺不明者妄覺也不明即是無明若謂覺了無明稱為名覺則有能覺與所明矣既有能所非妄而何泐潭曰富那未解詰意乃以覺不明者為是故此答云若此不明名為覺者則無所明意謂必有所明方名為覺殊不知才有所明即墮明覺無窮妄業由是而生故下文云覺非所明因明立所所既妄立生汝妄能佛言若無所明則無明覺至無明又非覺湛明性一說覺離能所故有所非覺照了諸相故無所非明若果非明又不得謂之覺湛明性當知有所無所是明非明皆為妄度終非妙明明妙之真也此說未妥補注曰若無所明則無明覺者如云若得果無所明則無明覺矣豈不幸哉蓋明覺之妄由所明起也孤山曰有所非覺者若有所明則非真覺以真覺之性離能所故無所非明者若無所明則無妄明以因妄明立能立所故非明之明指妄明也無明又非覺湛明性者無明即妄明也以無覺湛之真明故曰無明性覺必明妄為明覺一說妙明則真必明則妄所以妄為明覺未妥吳興曰本性之覺必具湛明之性以不了故妄為能明之明所覺之覺覺非所明因明立所所既妄立生汝妄能此一節且指無明也一說真覺本無能所因必明故妄見有所究竟以必明為惡道非也吳興曰性覺之體本非所明但因妄明對能立所此即因惑立所見之相也所見之相既立能見之相即生能所同時前後異說耳無同異中熾然成異至因此復立無同無異此一節謂因上無明而成世界虛空及衆生也吳興曰此明所立境界後文虛空為同世界為異者顯示其相也溫陵曰能所既立心境互分故無同異中熾然成異即轉相也以彼熾然之異為異復因異相立同又因其有同有異故復立無同無異一真體中本無是事皆由能所對待妄立如是擾亂相待生勞至由是引起塵勞煩惱此一節躡楞前義而且隱然示三種之情狀也携李曰覺明立所逐起妄情故於無同異之真空起熾然之虛妄既有能所立之分別復立無同異之是非相因擾亂而煩惱勞塵生矣吳興曰指前因明立所動雜真性故曰擾亂所既妄立生汝妄能即相待生勞無同異中熾然成異等即勞久發塵自相渾濁也上言勞者且屬無明下云塵勞正謂見思煩惱塵即世界衆生由世界衆生而有業果故復云由是引起塵勞煩惱起為世界靜成虗空至彼無同異真有為法携李曰此一節乃牒合上異同等義而顯示三種之名相矣吳興曰妄覺動則勞擾發塵故起為世界妄覺伏則頑然冥漠故靜成虗空法界一空曰同情器萬殊曰異此乃於無同異中熾然成異故曰彼無同異真有為法補注曰此章問答良有以焉前佛舉地水火風空見識以該萬法則世界虗空衆生業果皆在其中矣惟其談七大之相則曰如來藏中循業發現談七大之性則曰周遍圓融本如來藏富那至是未達其循發遍融之義因此二疑而興二問問清淨本然即如來藏性也山河大地即世界虗空也諸有為相即衆生及業果也以其未達循發之義故曰云何忽生此四字為要緊問也如來遂指性覺之中妄為明覺者喻之而斷之曰因明立所此四字為要緊答也蓋明即妄明妄明即無明也所即山河大地諸有為相發現之由也要而言之因明立所者即是因無明而生起世界虗空衆生業果也然則循業發現之疑云何忽生之問一答俱銷不勞餘說立所以後雖復隱顯發揚總別開示特不過鋪陳世界衆生業果之說以終其說耳然此猶是總顯自覺明空昧以後始別開三節詳敘三種之相續詳敘既終復云如是三種顛倒相續皆是覺明明了知性因了發相從妄見生山河大地諸有為相次第遷流因此虗妄終而復始者此又總結一章答意以牒示之也第二問答後文別釋覺明空昧相待成搖至以是因緣世界相續孤山曰四輪持世其實土輪金輪水輪風輪也此不言土者土與金同是堅性俱屬也大故此但言四大則已攝四輪矣然此四大風金則由妄心而起水火復由風金而起或曰愛心外感於水者則違經文𮞏相為種者如覺明空味相待成搖為風輪種因搖立礙為金輪種風金相摩為火大種金火復為水大種火水又為海洲種水土復為草木種應了此諸妄法於一真性如空中華華處空處本無有異故觀妄具惟見真具具無具相彼此誰名世界相續既然下二相續其旨亦爾溫陵曰萬法自五行變化五行由妄覺發生故世界起始肇於覺明而依乎風金水火以生成萬物也真覺妙空本非明昧由妄為明覺遂有昧空明昧相傾則不覺心動故曰覺明空昧相待成搖故有風輪世界最下依風輪住故曰執持世界因空生搖等者因空昧動念覺明堅執而立礙感金也大地最下依金輪起故曰保持國土堅覺寶成等者因堅覺妄搖觸起傾惱而感火也內外二界革生為熟化有為無皆火大所變故曰為變化性寶明生潤等者由堅覺生識而蒸以煩惱積情發愛而感水也世界居大海內故曰含十方界火騰水降等者妄覺煩起妄識橫流交結立礙而感土也地性堅礙故曰立堅其高為山其深為海皆土也水阜曰洲沙汀曰灘諸皆肇於妄覺感於五行故曰交妄發生𮞏相為種也土水生木木土生金金木生火火金生水水火生土世界初由覺明發識為水空昧結色為土相待成搖為風為木即土水生木也又因空昧之土生搖為木而堅明立礙即木土生金也餘文甚明土由水火所生君子受父母氣分故海中火起灘中水注也五行以我尅為妻夫劣然後陰陽和而生子故水劣火為山土劣水為木焰融明水火氣分燒絞明土水氣分也此世界相續之由也吳興曰諸有情業增上力先於最下依止虛空有風輪生風輪上次有水輪水輪上方有金諸有情業增上功起大雲雨澍風輪上滴如車軸積水成輪復有別風搏擊此水上結成金此與彼異者彼約安立世界自下升上以成其次此約生起世界由內感外以成其次然大小義別不須會通復次富樓那明妄非他至同業相纏合離成化孤山曰今但言所妄既立即前文云因明立所由妄明之性非局而局故曰明理不踰聽不出聲等示不喻之相也下文云元依一精明分成六和合吳興曰明妄即妄明也非他者言此妄明之體更非他法所成全是真覺起於妄明而為過咎覺明為咎所妄既立遂成隔礙故明理不踰故聽見六根於是妄局色香六塵於是妄染覺知六識於是妄分根塵識三為業性故發起妄業於是同業相纏合離成化此六道四生之始也同業即胎卵類因父母己三者業同故相纏著而有生合離即濕化類不由父母但由己業或合濕而成形即蠢蠕也或離異而託化如天獄鬼等類也見明色發明見想成異見至以是因緣衆生相續孤山曰妄心見妄境故云見明色發即於中陰見其父母也明見想成者依妄境起惑也異見謂父是所增境同想謂母是所愛境女子託胎反此流愛為種者注愛於母識託其中故涅槃明十二因緣無明有二一潤業無明謂過去煩惱也二潤生無明即託胎時於父母起憎愛也納想為胎者有福之人想其母胎如華林殿堂薄福之者惟棘樹圊廁交遘發生謂男女會合染心成就吸引同業謂吸引過去同業而入胎也溫陵曰妄見所明而顯發妄色曰見明色發此由心生境也因明起見而因見生想曰明見想成此由境生情也見異則境違故成憎想同則心順故成受三受交注曰流三想相投曰納受為輪回根本故流受為種想為傅命之媒故納想成胎藉交遘而發生由同業而吸引此受生托質之始也胎中五位七日一變羯羅籃華言凝滑初七日之相也遏蒲曇云皰二七日之相也以至鉢羅奢佉等也四生之類卵應於想胎應於情濕應於合化應於離故曰隨其所應也亂思曰想結愛曰情氣附曰合合濕而生也形遁曰離離此生彼也情想合離有生皆具此以多分言耳卵生居首者想念初動情受後起又兼胎濕故也此文論想乃內分染想非外分淨想論化乃轉蛻業化非意生妙化也情想合離更相變易者或情變為想合變為離無定業也卵易為胎濕易為化無定質也故所受業報或升或沉無定趣也此衆生相續之由也富樓那想愛同結至是等則以盜貪為本吳興曰欲貪通乎四生今正約胎生言之又胎生復通今多就人倫辨之以其易見故也以強殺弱因食成貪不滋口腹則屬瞋患以人食羊下問此此與殺貪何異答殺貪未論酬償先債今約過去於身命財非理而取故互來相噉以責其盜也長水曰父母子孫非愛不聚非欲不生胎卵濕化以弱遭食緣貪起教不與而取曰盜又陰取曰盜以人食羊不與取也羊死為人互來相噉取也世間相噉陰取也世間相噉皆盜貪也淫殺盜三為業果根本汝負我命我還汝債至以是因緣業果相續補注曰命債二句文義互見如云汝負我命汝還我命我負汝債愛憐二句亦應互見此即相續之由也溫陵曰上明業果之本此明相續之由負債殺盜由也愛憐欲貪由也惟殺下結顯也富樓那如是三種至因此虗妄終而復始携李曰欲存諸境愛屬乎心由有諸欲助愛發性故能令死生相續溫陵曰總牒前文結答世界衆生業果皆覺明為咎也覺明明了知性即妄為明覺者也了發相即因明立所者也妄見即生汝妄能者也此虗妄指覺明也前問云何忽生大地至終而復始此全牒其辭而指覺明以答也富樓那言若此妙覺至有為習漏何當復生溫陵曰衆生覺體與佛無別無端忽生諸有為相則如來既證空覺何時復生諸有耶此固常情所惑故富樓那特反難也孤山曰無狀猶言無故也資中曰妙覺指無真妄之體也本妙覺明依真起妄者也佛告富樓那譬如迷人至覺迷迷滅覺不生迷携李曰衆生如來之迷悟習漏前后之有無世界始終之生滅清淨忽生之相反良由邪疑為絆繆起惑因故邊見斷常之見突然而興此覺體中細惑不可不問吳興曰聚落村市也聚落喻性分南北喻迷倒然南北初不易則性分本無倒故曰迷本無根悟非生迷補注曰昔本無迷似有迷覺謂本無有迷亦無有覺覺即悟也然今既因迷而得悟則似有覺迷之覺矣覺乃始覺也覺至始本不異惟一妙覺則不復生迷此顯既覺不迷亦如翳人見空中華至何當更出山河大地泐潭曰迷人既悟悟不生迷凡等譬喻舉究竟證覺無妄山河也溫陵曰翳喻妄見華喻山河空華滅地喻妙空明覺佛言下謂既了所喻何復前疑又如金礦雜於精金至菩提涅槃亦復如是資中曰既已成金不復為礦如來圓覺亦復如是溫陵曰金喻菩提果覺無變灰喻涅槃果德無生果至無變無生則習漏不生可知矣前以聚落喻既不迷復以空華喻妙空無習然四喻之意前二明習本無迷迷由妄起後金灰二喻明習漏妄緣證乃永斷若但舉前二恐謂妄不妨真惑能自滅成撥無執但舉後二恐謂覺本非淨性本有生成雜染見所以四喻兼舉使知迷悟雖妄而不廢修證也補注曰此卷之初富那有二問一問清淨本然何生諸相二問四大各遍云何相容此下答第二問也富樓那又汝問言至而不拒彼諸相發揮吳興曰譬前如來藏性本非七大而不拒彼七大發生携李曰一切種種幻化皆生如來圓覺妙心是體相雖空無妨幻相真際曰虗空非諸相而諸相依空而發真體非四大而四大由真而成先非水火故不相拒所以者何富樓那至云何復問不相容者真際曰謂明若生日則與目同色不應於空更見圓日明若生空則中霄無日其空應明補注曰諸相之妄既無可指何況更詰相陵滅義是猶邀空華而結空果也溫陵曰所以下示諸相於意下明相容也觀相元妄陵滅亦妄觀性一真無不容者隨處而發故曰殊方彼指日雲等也真妙覺明亦如是至若俱發明則有俱現資中曰以真如不守自性隨緣所現有種種相溫陵曰此如虛空非相而不拒發揮也泐潭曰汝以空明等者以事言之如鑿井出空照燧生火是也以業言之如起為世界靜成虗空風金相摩故有火光是也以心言之妄起空見則有空現地水火風亦復如是故曰各各發明則各各現各各謂前後也俱謂同時也云何俱現富樓那至宛轉虗妄無可憑據孤山曰日喻真性水喻妄心水中之日喻妄境兩人喻妄業各行則循業俱發隨去則妄境俱現同觀是一知二是虛各行既二驗一是妄故云宛轉虛妄溫陵曰釋俱現之相也日影隨人不一如七大隨緣成異先無準的不應詰難富樓那汝以色空至故發勞有世間相吳興曰色攝四大對空成五前滿慈問地水火風本性圓融疑水火性不相陵滅即相傾也虛空大地不合相容即相奪也溫陵曰迷失真體分別緣影名背覺合塵了相元妄觀性元真名滅塵合覺我以妙明不滅不生至故發真如妙覺明性資中曰色空世間妄相也妙明真加妙性也皆如來藏所現元一圓融特由衆生背真合妄故局促世相之中諸佛滅妄合真故妙得真如之用所以一多互應小大相容現寶剎於毛端轉法輪於塵裏事事無礙法法如如蓋由觀相見妄無可指陳觀性元真故無不容者吳興曰妙明謂寂照之智不滅不生謂智體真常此皆能合如來藏即所合也而如來藏牒所合之理惟妙覺明牒能合之智圓照法界示鑑物之用以譬言之如來藏如鏡之體妙覺明如鏡之光圓照法界如鑑現像雖三而一雖一而三一為量等皆顯此義也一為無量無量為一小中現大大中現小者總別四義不動下別示其相不動道場遍十方界者一為無量也身含十方無盡虗空者無量為一也於一毛端現寶王剎坐微塵裏轉大法輪者小中現大也毛端現剎即正中現依塵裏轉輪即依中現正也滅塵合覺等者總結前義也而如來藏本妙圓心至非常非樂非我非淨孤山曰非心至非意識界總非六凡界也非明無明等非緣覺界也非苦非集等非聲聞界也非知非得者非二乘理智得即理也非檀那等非菩薩界先非能趣行非波羅蜜多者總非所趣理也非怛闥阿竭下非佛界先非能證人三號是也次非所證法涅槃四德是也怛闥阿竭云如來阿羅訶云應供三耶三菩云正遍知即十號之三也涅槃是總四德是別溫陵曰雖滅塵發真於一多小大能一切如而本妙圓體初無變異故非心非空乃至非世出世法也非心至非火謂非七大五陰也心即識大而攝五陰也非眼非耳至非意識界謂非十八界亦攝十二處此上為世間法也非明無明至非老死盡謂非緣覺法也緣覺觀十二緣有生起相有修斷相此兼舉之自緣覺至涅槃皆為出世法也以是俱非世出世故溫陵曰結上起下也孤山曰世結六凡也出世結四聖也藏理即空無有十界故並非之即如來藏元明心妙至即常即樂即我即淨孤山曰上文俱非約真諦示如來藏此文俱即約俗諦示如來藏以藏理即無而有十界宛無故也溫陵曰體雖無變用乃如如故即心即法即法即心也以是俱即世出世故至離即離非是即非即資中曰且法界一如本無名相因迷有妄對妄說真上妄相形名言不息隨名執相顛倒何窮是故因言遣言以至無遣初且以非遣相次乃以即遣非終帶名言未極一真之旨離即非即無非不非言語道斷心行處滅方顯一真法界如來藏溫陵曰既非而即即即而非妙絶心言不容測度矣此文似乎矯亂而各有所主初曰本妙圓心自體言也次曰元明心妙自用言也終曰妙明心元合體用言之也本妙圓心是本非末是圓非遍是心非物乃真淨妙體故非一切法也元明心妙是元非本是明非體乃如如之妙用故即一切法也妙明心元是妙之明是心之元徼妙並觀故離即離非是即非即妙造乎此則體用圓泯情塵斯絶而藏心妙姓廓無瑕玷矣長水曰本妙圓心非心非空等約非相以明真諦也元明心妙即心即空等約即相以明俗諦也妙明心元離即離非是即非即者約遮照以明中道諦也此約二門不二惟是一心雙遮真俗故曰離即離非雙照真俗故曰是即非即三諦一體故皆云即如來藏補注曰是即非即者加云不離即不離非也如何世間三有衆生至用世語言入佛知見孤山曰但斥凡小不言菩薩者對滿慈是二乘故其實偏教菩薩亦不能測法華云不退諸菩薩亦所不能知泐潭曰結妙絶心言責其妄度蓋為擬心動念即乖法體也譬如琴瑟箜篌琵琶至愛念小乘得少為足長水曰琴等喻衆生妙音喻藏性妙指喻實智發喻起用汝與衆生合前琴等寶覺真心合前妙音按指即智契於理發光即大用現前汝暫舉心等合前無妙指也資中曰海印者大集云閻浮所有色像大海皆有印文此喻如來法身性海普現一切世間之相也真際曰琴音雖具非指不發人心雖圓非師不悟前之多方顯如來藏即佛之按指也身心萬法當處照然即海印發光也而富那等隨語生解疑慮紛紜是塵勞先起也此由不求無上覺道愛念小乘之咎也今夫宗師扣擊直下歷然學者因之競生狂解皆由情塵易起故動涉疑妄使知無上覺道則一唱一酬足以廓清天地何復塵勞之有閻浮萬像皆現海中故名海印富樓那言我與如來至自蔽妙明此淪溺補注曰近則躡上遠則躡前蓋前文未達循業發現之義遂有云何忽生之問如來乃以妄為明覺因明立所等答之富那既知其妄但未知何因有妄故有此問也溫陵曰躡上各各圓滿之言發問也既悟無二益顯妄淪而不知妄之所由故請窮其因佛告富樓那汝雖除疑至是人心狂更無他故孤山曰照鏡喻妄心推畫分別愛鏡中頭喻取著妄境妄事易著如眉目可見真理難知如瞋責己頭等背悟向迷如無狀狂走也四趣則背善向惡人天則背苦向樂二乘則皆有向空菩薩則背邊向中悉名狂走心狂者喻九界取舍悉由妄心溫陵曰演若達多云祠授從神乞得故也愛鏡中頭責己狂走喻因執影明遂迷本真妄隨流轉補注曰引達多照鏡為喻而言其無故狂走使知狂走無故則知妄元無因矣佛言妙覺明圓本圓明妙至妄性如是因何為在資中曰自諸妄想展轉相因者如初一人忽然妄說遞遞相承乃至多人及推其本了無所實携李曰生死涅槃猶如昨夢所謂寤人說夢中事也溫陵曰妙覺明圓指我與如來無二圓滿者本圓明妙言本無虧缺本無迷妄此人人本來面目也奈何以妄二之虧之遂分物我強起憎愛諸妄相因迷輪不返識迷下因富那自恨昔遭妄想而稱世尊諸妄圓滅似謂迷有所因妄有可滅故告以此如彼城中下牒喻重顯令了妄無因無可滅者汝但不隨分別世間業果至何藉劬勞肯綮修證吳興曰三緣即業果中殺盜淫也三因即殺等三種貪也即指此因名為狂性也補注曰汝但不隨分別世間業果衆生三衆相續三緣斷故三因不生者三緣三因即指三種相續之因緣也相續因緣即無明能所等也無明能所即微細惑結也即肯綮之所喻也此之因緣既斷則菩提心得矣溫陵曰世間業果衆生皆妙心影明如鏡中頭分別則妄故不隨分別則狂性自歇也以世間業果衆生為三緣者妄心緣之而起也以殺盜淫為三因者妄心因之而有也所謂自諸妄想展轉相因故斷而不生則狂性自歇也歇即菩提等者所謂但離妄緣即如如佛骨間肉曰肯內結處曰綮莊子技經肯綮之未嘗今以肯綮譬微細惑結蓋劬勞修證只為妄惑妄因既息惑結自除故不勞肯綮修證也譬如有人於自衣中至方悟神珠非從外得溫陵曰得珠之喻亦喻妄息真現不勞修證也吳興曰衣喻五陰珠喻藏性由無明故不覺乏妙用故窮露佛界如本國九界如他方求人天樂取偏小益猶乞食馳走妄情暫失真性本圓猶雖貧珠在佛如智者教如示珠證理起用則致大饒富方知真性不從外得即時阿難在大衆中至我從因緣心得開悟泐潭曰富那之後復以阿難問難者諸法既明則進修無滯將示修證之門故又以當機之人發起人溫陵曰𮞏躡上文起難為後學決疑也上稱緣斷而因不生斯正因緣之義何前言頓棄邪今棄因緣則外道自然之說為當也佛告阿難即如城中至因緣自然理窮於是携李曰迷頭認影皆由狂性因緣若影滅憤亡則本性菩提豈從外得溫陵曰狂因既滅則自然性出不狂之前二皆本無由是觀之凡所謂因緣自然本皆不有悉因狂妄而立故曰理窮於是阿難演若達多頭本自然至何因緣故怖頭狂走溫陵曰此以因緣破自然也泐潭曰自然者本自天然不假因緣也若本自然則或狂不狂無所然而非自矣夫何又假照鏡因緣而後狂走此自然之計墮矣若自然頭因緣故狂至曾無變易何藉因緣補注曰達多不見己頭將謂失其頭矣故狂走今頭本在初不曾因照鏡而失又況他又照鏡亦不曾狂然則汝自然狂非關因緣矣溫陵曰此以自然破因緣也若本自不狂假因緣故狂則本自不失盍假因緣故失頭既不失特由狂妄則因緣之計墯矣本狂自然本有狂怖至頭本無妄何為狂走携李曰此破因緣自然之說也溫陵曰若狂怖本於自然則是本有狂怖然既無所潛非本狂矣若狂怖不本於自然則頭本無妄何為狂走非本不狂矣既非本狂非不本狂足知自然因緣之說皆妄立矣若悟本頭識知狂走至此句方名無戲論法孤山曰若悟本真則知諸妄了不相關真見性人一切妄緣豁然蕩絶得大解脫者以此資中曰前文佛說緣斷狂歇歇即菩提阿難疑菩提從因緣得若棄因緣即屬自然故佛重舉狂喻反覆破之而復若悟本頭識知狂走因緣自然俱為戲論是故我言三緣斷故即菩提心如云戲論斷故即菩提心也菩提心生下復與詳示無戲論法溫陵曰菩提心中本無生滅亦無自然若謂菩提心生生滅心滅此但生滅非菩提也若謂滅生俱盡無功用道有自然者因是則明自然心生生滅心滅此亦生滅非菩提也而又反指無生滅者名為自然皆則戲論譬如因有雜和故說和合而又反指非和合也稱本然性皆是對待妄立戲論之法直使然與非然合與非合一切遠離亦無遠離之心乃真無功用道無戲論法也菩提涅槃尚在遙遠至如恆河沙只益戲論泐潭曰至此乃責其妄計戲論戲論未斷即狂心未歇難契菩提故云菩提涅槃尚在遙遠苟非歷劫修證雖持多經妙理只益戲論也補注曰此責阿難之妄計也汝雖談說因緣自然至遠離世間憎愛二苦孤山曰令汝解脫得離淫室也孤山曰修無漏業者圓修止觀則不漏落二種生死亦不漏失三諦義理無漏既深憎受非淺捨妄即真去事就理悉名憎愛泐潭曰因緣自然有益於辨無益於道多聞第一有益於名無益於實故雖積劫熏持不如一日修無漏業無漏業者首楞真定也得此定者永滅諸漏故離憎愛苦如摩登伽宿為淫女至如何自欺尚留觀聽資中曰以智遣情還沉欲海以滅滅滅復滯功能乃至遣無可遣道合無功則體訂理窮還源之至吳興曰依諸師以解行分經前開解竟後示行也然則上根利器隨聞獲證楞嚴大體亦已備矣其有中下之器更俟談行思而修之故假阿難等請入華屋於是廣示三摩提路溫陵曰如摩登伽下明熏無漏業之速效也宿因即歷世貪愛苦因也出纏登伽也授記耶輸也如何下結責阿難令捨苦本修無漏道無以貪愛存於心目也自初決擇真妄發明覺性乃至深窮萬法決通疑滯使其信解真正為因地心因心既真斯可圓成果地修證故前經為見道分者止此下文別起為修道分也蓋雖見性真非修莫證故即前了義示修行門阿難及諸大衆聞佛示誨至引諸沉冥出於苦海吳興曰疑惑銷除心悟實相者第三卷末說偈述益若作證悟此則增道也設作解悟今豈無證乎故知請行權為發起耳吳興曰惑銷心悟身意輕安謝發明覺性決通疑滯之益也多方誨示為無上大悲洗我塵垢為清淨寶王世尊我今雖承如是法音至得陀羅尼入佛知見孤山曰法華明三陀羅尼即空假中三義也今請一心三觀攝伏想行門欲入初住三智一時開發故云佛知見溫陵曰失性如旅泊見性如華屋見性不修如獲屋不入故請如來本發心路冀入佛知見也無餘涅槃圓果也本發心路圓因也既已見性又求入佛知見者見方開示修乃悟入爾時世尊哀愍會中至由是始終無壞滅故長水曰妙三摩提即首楞正定二决定義即因心業本也吳興曰空離中皆名生滅中即空假是謂佛乘法華明聲聞緣覺不退菩薩不測佛智良决於此法皆變滅喻妄體無常空無爛壞喻真性常住携李曰先示涅槃云生滅地以為初心發覺之本不滅不生合如來藏為同以生滅心求常住果為異真際曰汝當照明諸器下使先審有為法無非幻妄例名己身即幻妄本唯湛圓真體終無滅壞是為真基也妄體無常終從變滅真性常住安有壞闌則汝身中堅相為地至汝濁五重亦復如是孤山曰由此四纏至五疊渾濁者四大纏縛總成五陰也以四大成五根而心王居中能令眼視耳聽鼻舌身覺心意則察因隨色聲而有受想行識故成五陰色為識為終五陰翳彼湛圓故有劫等五重渾濁也溫陵曰四大假幻妄之身縛性為纏五疊織見覺之妄汩湛為濁纏為生死根本濁為惑業根本故應審明譬如清水清水覺湛明性也塵沙煩惱惑業也性不相循真妄染淨異也世間人非出世智也故起惑汩湛使性渾濁興福曰清水喻圓湛妙心塵土灰沙喻五陰生法五疊亂真故以五陰為獨阿難汝見虗空遍十方界至是第一重名為劫濁孤山曰此濁依於色陰夫四大五根五塵同名色陰今以眼根見空塵而說者以渾濁義顯故何故名劫濁邪以成住壞空四皆名劫故指見空名為劫濁溫陵曰覺非空色由一念不覺妄見空相以生發遍迷故空見不分以不分故有空無體為雜於見也有見無覺為雜於空也此起明初起混茫之相也故為第一重涅槃名無織織者兩物相涉經緯造作之義涅槃之體自性清淨不涉衆緣離編織故今以無空之體織無覺之見以無覺之見織無空之體乃妄見空而兩無其實即土失留礙者不渾濁真性乎汝身現摶四大為體至是第二重名為見濁携李曰真性廓湛本無見覺由四大摶結以成根隔故見覺生而廓湛壅四大旋而覺知生是謂相織孤山曰此濁依於受陰夫領納所緣名之為受而有六種謂六觸因緣生於六受六受為四大所壅故令留礙所以見不超色聞不出聲四大為六受所旋故令覺知也二法交織妄為受陰以其見境領納渾濁真性故名見濁又汝心中憶識誦習至是第三重名煩惱濁長水曰憶過去境識現在塵誦習未來境界携李曰智識誦習即智及相續執取計名之事也由是於性之內分發六知根容之外分現六塵境根境煩搆以惱湛性名煩惱濁孤山曰此濁依於想陰能取所領之緣相名為想而有六種謂取所領六塵之相為六想也性發如見謂能取六想容現六塵謂所取六塵之相也以此相織妄成想陰既取著所領則擾亂甚前既渾真性故名煩惱濁又汝朝夕生滅不停知見至是第四重名衆生濁孤山曰此濁依於行陰造作之心能趣於界名為行行有六種大品經中說為六思思即是業謂於六想之後各起不善業善業無動業也溫陵曰生滅不停為行行相遷流故曰業運妄想知見即行陰體諸行無常故國土每遷隨趣受生此所以為衆生也汝等見聞元無異性至是第五重名為命濁携李曰見聞自湛圓而分故元無異姓衆塵隔圓融之體故無端成異自性觀之同一真常故曰相知自用觀之互起生滅故曰相背吳興曰五濁從細至粗有生皆具所謂生死根本虛妄滅生者孤山曰此濁依於識陰了別所緣之境名為識識有六種即是六識也元無異姓者了別之心惟一故衆城隔越者六塵不同故牽生六識故云無狀異生性中相知釋上元無異性也用中相背釋上無狀異生也眼不別聲耳不別色是相背也同異失準者適言其同則用相背適言其異則性相知故無定準以此交織妄成識陰識住命存識去命謝渾濁真性故名命濁阿難汝今欲令見聞覺知至皆合涅槃清淨妙德吳興曰以圓湛之性旋虛妄之心斯蓋修三止觀照二諦境伏斷生滅證無生滅也伏還下因該十信然後下果通分滿靜器即止觀之心也信前猶淺入信漸深沙土自沉粗垢先落也清水現前三諦似顯也携李曰衆生之心本來清淨如水之清但為客塵所染故濁耳故曰此若無染雜一切應自脫此若無清淨功用應無果非染非不染非淨非不淨心性本淨故客塵煩惱染孤山曰一切變現即隨機所感十界現形也俱是淨用故云不為煩惱即用是體故云皆合涅槃溫陵曰見聞覺知六受用根也常樂我淨涅槃妙德也生死根本五濁業用也夫欲反妄契真先當擇去生死妄本依不生滅圓湛之性以成其功如澄濁水必於靜器以湛旋其虗妄使伏還元覺如以靜沉其沙土使清水現前也此則初伏客塵煩惱而已蓋方旋之使伏非真無生滅性也及得其本元真明之覺無生滅性則無明之根本永斷而覺湛明相於是精純一切變現不為煩惱如去泥純水一任攪淘無復汩濁乃可為因地心也因心如此則果地修證無有不圓涅槃妙德無有不合故因心不可不審也第二義者汝等必欲至云何降伏取如來位補注曰初義審因地發心故指五濁業用為生死根本即虛妄滅生者也令其擇之旋之而依圓湛不生滅性以成其功也次承令審煩惱根本兼含選擇圓根之意故下即指六根媒賊劫家為煩惱根本而繼以世界相涉之義備顯六根功德數量定其優劣次第發揚令知所擇耳泐潭曰無明發業愛取潤生六識能作梨耶能受潛為煩惱根本發為虗妄根塵知之乃可降伏降之乃可取果發業潤生指煩惱也誰作誰受推根本也意顯六根自作自受阿難汝觀世間解結之人至於器世間不能超越吳興曰外之六塵內之六識皆由眼等引發和合故云六為賊媒所起煩惱害如來藏故云自劫家寶由六根所起煩惱故發業潤生乃有無始衆生世界等溫陵曰汝觀下釋上須知其處也引空義者謂除無結則無解而孰能無結哉則汝下示虗妄根塵顛倒也眼等六媒妄根也媒引六賊妄塵也自劫真性顛倒也阿難云何名為衆生世界至各各功德有千二百資中曰此據六根了別之性是同故云各各功德有千二百下對六塵了別之用有異所以功德全關不等前文云性中相知用中相皆不其然乎慤師約三世四方具有五根五塵成百二十一一根塵熏成十類衆生為千二百沇公非之節公是之而敏又謂十二中一一皆具十善成百二十一一善中具十如是成千二百然佛旨難測人情異端亦無的據誰為至當至於資中孤山長水但合數而已皆變疊不同余雖別解亦未敢配其法相來哲無黨惟善是從補注曰上下無位者指著上下皆是四方之上下也除此別無上下故曰無位中無定方者謂四隅之中也隅以兩方交接而得名既一偶而屬兩方故曰無定方也溫陵曰衆生世界亦具四方即左右前後是也世者三際迭遷界者各從定位界位有十世數有三一身所具理自互涉故曰身中貿遷世界相涉界方雖十常數惟四三四互涉故曰宛轉三世流變故有三疊自一疊十十疊百百疊千成千二百六根各具然此權依世論以顯妙用大略耳若夫六解一亡互用圓照則何數量所及哉吳興曰此約十二遷流變易共成三重也一十百千者通舉增數之法耳謂增一為十增十為百等今且以方涉世明三疊者第一約四方各論三世共成十二也第二於東方三世變一為十成三十南西北方亦復如是四方各三十成一百二十也第三於東方三十變十為百成三百三方亦爾四方各三百成一千二百也以世涉方其例可解斯蓋如來只指凡夫六根根塵相織世界相涉從粗至細且至三疊以彰厥德大意令知現前見聞覺知剎那剎那皆涉方世粗細之相也阿難汝復於中克定優劣至當知眼惟八百功德資中曰四方各二百四隅各一百今眼所見前及左右三方已成六百併前二隅二百共成八百惟後方二百及後二隅二百不見故云三分之二也溫陵曰先顯織妄欲明根結之始次辨優劣欲明耳根圓通使知所選也如耳周聽十方無遺至圓滿一千二百功德泐潭曰前言六根了別之性同所以功德各千二百此言六塵了別之性異所以功德全闕不等溫陵曰能周聽故功全也動若等者隨彼之動則似有近遠在我之靜則周聰無邊如鼻嗅通出入息至當知鼻惟八百功德長水曰出入中交共成三分一分四百闕於中交故惟八百溫陵曰出能取香入能聞香出入之中無能故闕中交如舌宣揚盡諸世間至圓滿一千二百功德孤山曰取去言說不論嘗味若取嘗味其功則劣以合中知故溫陵曰世出世智所知之境惟舌詮顯其言雖局其理不窮如身覺觸識於違順至當知身惟八百功德孤山曰離一合雙者離中不知是闕一分合待能覺有違有順故具二分溫陵曰離闕一分合全二分曰離一合雙如意默容十方三世至圓滿一千二百功德吳興曰曰意根了境通於三世謂過去現在未來也真際曰意識獨生遍緣諸法故云默容阿難汝今欲逆生死至與不圓根日劫相倍真際曰眼耳以離中取境鼻等以合中知法離則境遠為深合則境近為淺溫陵曰流根即妙湛不動者也決之而出流逸奔境名生死流逆之而入反流全一名不生滅六受用根即上所明者循圓則合性而深不圓則離性而淺深淺相遼故遲速之功日劫相倍夫欲速返須擇圓根也我今備顯六湛圓明至彼六知根一時清淨溫陵曰得圓自在慧則十八界無非圓通然下劣初機未去圓且自一門而入一根無妄則六皆清淨不惟悟十八界塵塵剎剎皆圓通矣吳興曰六湛圓明等指六根妄明功德全是真明本性所具由真具故所以妄具阿難白佛言世尊至生住異滅分劑頭數孤山曰見諦所斷之惑即八十八使也修道所斷之惑即八十一思也生住異滅即同體無明也分劑頭數謂初住以上至于妙覺四十二品也虛習猶云妄惑也溫陵曰湛圓因惑而分一六因惑而生故將告一六之義先與辨惑之小乘見道門斷三界嗔癡等十分別惑乃證初果故曰已得陀洹已滅見惑修道門斷三界貪嗔癡慢四俱生惑亦曰思惑此乃根中纍生無始虗習三果乃斷所以阿難未知也況此根中更有生住異滅諸微細惑共分劑頭數盡此惑六湛乃圓又非阿難所知者斷今汝且觀現前六根至雖得六銷猶未亡一孤山曰金剛般若云須陀洹名為入流而無所入不入色聲香味觸法此即六銷也猶未亡一者執有涅槃也以小乘所證也是無明故資中曰不因六塵所造新業名得六銷尚迷六根而為一體故未亡泐潭曰耳不見足無語不可以為一也耳聞法而身口同不可以無六也既無定趣則一六之義非本元有由顛倒生須陀洹已斷粗惑不入色聲香味觸法是得六銷而尚滯法執是未亡一也以後文證之此乃方得人空而未能成法解脫至俱空不生乃亡一矣然小乘必銷六然後亡一大乘直亡一使六自消叔世窮道雖曰得妙竟涉離微求其真能亡一者不可多得覆尋聖言深有所發吳興曰沇師所解一體之義異乎涅槃但一義未明耳應知下文見精乃至知精元是一體如太虗空參合群器至六文用根亦復如是資中曰太虛空下喻一六義生彼太虛空下喻本非一六例合後文由明暗等至見精映色結色成根等即一六義生也汝但不循下至隨一根五粘圓脫即本非一六也即正釋阿難一入六淨之疑也溫陵曰虗空本非同異喻圓湛本非一六合器除器喻一六義生之由也知虗空之同異是非子無所立則一六併亡而圓湛不分矣一六既無而現有六根者由粘湛妄發耳故下原其妄發之源以示之由明暗等二種相形至浮根四塵流逸奔色吳興曰粘湛發見者由明暗等塵染起淨性也他皆放此溫陵曰見精眼識也色眼塵也二者妄結以成眼根此根之元攪四大而成體以未奔境故名清淨方是之時如葡萄而已蓋體雖具而識未流所謂但如鏡中無別所知者是也及乎流逸奔境則染故轉名浮根四塵而不名清淨四大由動靜等二種相擊至浮根四塵流逸奔法携李曰新卷葉有竅而已真際曰外六根內冥真性使聞見合而為一圓湛開而遍應則諸根互用虛妄全消所謂非汝六根互用開合則此妄想無時得義在斷惑滅乃知根義在斷感資中曰常性為恬奔味為變初生之月偃然舌相如之皆喻無情之物者明體雖具而識未流也長水曰覺精身識也腰鼓䫙徒有觸體未有觸用喻清淨根元也䫙喻根元則鼓喻浮根元因浮根然後流如䫙因成鼓然後觸携李曰暗室之見亦有體而已識未流也孤山曰粘湛發知者妄慮知也根元下此眼肉團心根為慮知之所託也故勝義根還是清淨四大如幽室見即浮塵根為意託附如處幽室正法念經云如蓮華開合者是也阿難如是六根由彼覺明至無滅無生了知安寄溫陵曰是以汝今下擇上因妄發故六皆虛妄苦離六塵悉無自體孤山曰由彼覺明真明也有明明覺妄明也迷彼真明故云失彼精了成此妄明故云粘妄發光汝但不循動靜合離恬變至由是六根互相為用吳興曰寄二種根覺明開發故千二百功德根根互用也孤山曰用有真似似如法華真如華嚴溫陵曰彼十二相能粘六根障湛明故一根而本明發本明一發則妄粘皆脫而圓矣粘妄則由前塵循浮根故成隔礙脫粘則不由不循特寄根而已故能互用阿難汝豈不知今此會中至圓明了知不因心念携李曰引證根之用兼舉六人以明六妄皆能圓則真精可純而獨照所謂一耳目之所知而心未嘗死者孤山曰殑伽河名此云天堂來以其自雪山頂無熱惱池流出故也那律等六人或是凡夫業報或是小聖修得斯皆妄力尚不依根何況圓脫豈無互用溫陵曰那律尊者因精進失明而能見賢喜龍王無耳能聽恆河之神無鼻聞香驕梵受牛哨報故曰異舌舜若多神主空神也其質如風而能覺觸修滅盡定得空寂者意根斯滅如大迦葉雖滅意根而能了知阿難今汝諸根若圓已至云何覺明不成圓妙資中曰失彼精了由塵起見則根境成礙故脫粘圓真光瑩發則浮塵幻相如湯消氷成一圓融清淨寶覺真智如湯妄念如水聚見於眼則圓明有見之時也急合而暗則暗成無見之時也六根頭足既黯然無見而觸之一一能辨同於明時由是驗之不明自發暗不能昏者人人具有但脫粘消塵自成圓妙矣吳興曰真智如湯妄境如冰了妄即真化成知覺前明知覺不由於根故舉那律無目能見等今示真覺不假於緣故指世人暗中有辨也彼人即指合眼之人循體謂繞他人之體知覺是同言暗中知覺與明中所見不殊凡夫尚有不假明緣而能有辨況聖人真覺何藉緣發乎緣見下指妄不明下顯真略示明暗諸緣例爾阿難白佛言世尊至欲獲如來七常住果楞伽經曰分別是識無分別是智有空如來藏有不空如來藏寶積經曰空如來藏離不解脫一切煩惱不空如來藏具河沙佛不思議法空不空如來藏隨為色空普應一切後二隨用得名獨空如來藏為其體故為果號携李曰菩提正覺性也涅槃斷德體也由無變異名真如為覺本體名佛性體本清淨名菴摩羅煩惱不居名空如來藏清淨顯照名大圓鏡皆果上妙德菩提常覺涅槃常樂真如常然伏性常知菴羅常淨空藏常虛鏡智常明皆法上真體溫陵曰離幻復真常住不壞名常住果而見聽六用離塵無體是斷滅法依斷滅因求常住果烏得相應邪此誤認緣塵迷失常性也由失常性故難契常果實修證大患故須難明也諸佛所得曰菩提寂靜常樂曰涅槃不妄不變曰真如離過絶非曰佛性分別一切而無染著曰菴摩羅識一法不立煩惱蕩盡曰空如來藏洞照萬法而無分別曰大圓鏡智菴摩羅此云無垢即第九白淨識也此已成智而名識者以能分別故世尊若離明暗見畢竟空至惟埀大慈開我蒙吝溫陵曰復揣六用疑若斷滅而反以佛說湛常為不誠而近乎戲論不得為真實語者即時如來勑羅睺羅至音響雙絶則名無聞溫陵曰此但無聲非謂無聞必再擊疊問者欲令審辨而有悟也如來又勑羅睺擊鐘至音響雙絶則名無聲溫陵曰上答為倒此答為正蓋聲有生滅聞性常在迷情不了以聞同聲是以常為斷也佛言阿難及諸大衆至令汝聞性為有為無吳興曰前阿難通疑六根離塵無體云何將此斷滅為因欲獲常果如來所以別顯聞性為常者誠欲發耳根圓通之機也資中曰欲表圓根正修方便故扣鐘驗聞以顯耳根常住為一門深入之本聞無生滅境有生滅故聲聞各問令審辨也溫陵曰聲塵或有或無聞性未嘗有無所謂聲無亦無滅聲有亦非生此即不生不滅真常性也夫知無者亦因聞根不可謂無聲則無聞也是故阿難下牒上顯常也汝尚顛倒惑聲為聞至此性云何為汝銷滅吳興曰所舉寐事妄識至昏而真性不昧也復恐惑者謂寐雖不昏死豈不滅邪故重示云縱汝形銷性非遷改溫陵曰此驗勞生雖在倒妄生死常性不昏不滅也以諸衆生從無始來至云何不成無上知覺吳興曰通別二惑俱名塵垢真似所證皆號法眼此眼具五方曰清明泐潭曰不悟性常故逐諸生滅能守常性常果可冀矣前令審擇常性為因地心而阿難牒難故此結告也常光現前根塵銷落者謂得其常心則妄塵自滅妄塵既滅法眼自明以此為因則七常住果於是可獲故曰云何不成無上知覺大佛頂如來密因修證了義諸菩薩萬行首楞嚴經第五阿難白佛言世尊至得免輪回不落三有孤山曰阿難言俱生滅者以無明果相言之佛以立知見為本以無明因相言之知見謂增損諸還等見補注曰世之瘧病隔日而發為其病根未除故爾喻有學聲聞通惑雖破而別惑病根未除也携李曰前第二義門令審業云不見所結云何如解故此牒而請諸無明通根本枝末也始無所始故名無始俱滅俱生者積迷不覺而為生住異滅妄相所遷根本之惑方能暫伏旋復旋發未能永斷故如隔日瘧由不知結解真要故也同體無明品數至多又迷境不一故曰諸生滅去來常在妄中故曰俱無明即愚癡也俱舍以瘧為無明故唯識以愚為無明故婆娑以不達不解不了為無明故身心結惑實未來若難之本解結之元實免脫輪回之要此阿難之所以復請也吳興曰將明第一義諦圓明顯德故問解結因緣而為此經發起所結之元即無明根本也此無明根本乃第一義諦中所治之惑爾時世尊以閻浮檀至亦汝六根更非他物携李曰各放寶光表同破無明也泐潭曰生死結根安樂妙常者顯無二之體也溫陵曰先摩其頂者表無上開示也六震者動起踊吼震繫表破六根妄結也諸佛頂光灌釋迦頂者示同發明無上頂法異口同告者示諸佛脫生死證菩提皆由斯要也俱生即根本無明也生死妙常同因六根者知見立知故輪生死知見無見即證妙常如下所明阿難雖聞如是法音至云何是中更客他物吳興曰根塵識三攝十八界本如來藏妙真如性故曰同源凡夫迷真故縛聖人悟真故脫迷悟雖殊始終理一故曰無二同源必兼識性虗妄必具根塵文綺互也吳興曰塵相通指六境知見略示二根根境對論攝十二處斯皆兩法相涉內無實性故喻若交蘆泐潭曰根塵相因而有故曰同源縛脫由此而起故曰無二夢識無初故譬空華物境成有故由塵發知因根有相此根塵識譬如束蘆互相依倚雖粗有相其體全空故曰相見無性同於交蘆既無自性則隨緣轉變故於知見立識知之心則結為無明之本於知見無見覺之妄則解為涅槃真淨既曰真淨豈容立知故曰云何是中更容他物此總示妄結依根塵識起但妄識不立則妄結自解是為解結真要所以學道務去識情也真際曰知見立知示無明本始也知見無見明解結之門也靈知性見本六用之菩提體本真淨故中不容也爾時世尊欲重宣此義至無起滅不實如空華無為下頌識性虗妄猶如空華上言如幻助成空義耳今云空華正顯虗妄也且識性是有為起滅之法真性反此故曰無為無起滅既云虗妄即是不實故喻如空華舊以前二句破有為後二句破無為出掌珍論吳興曰真性即根塵之源也有為即縛脫之相也若真性在迷能生九界根塵之相名之為縛若真性出纏能起十界根塵之用號之為脫此縛與脫皆即真而俗故曰有為亦即俗而真故曰空也緣生故如幻釋成有空義也有為之法皆從緣生凡夫以惑業為緣聖人以機感為緣二緣所生俱是假名故云如幻此頌根塵同源縛脫無二也言妄顯諸真至中間無實性是故若交蘆吳興曰前長行但破於妄今復恐捨妄取真故重遣之泐潭曰淨名云有為無為二若離一切數心如空虛以清淨慧無所礙者是為入不二法門即此意也携李曰起滅之法皆無則妄識元無此頌識性虗妄猶如空華也妄法既無真亦不立若言妄顯真真還同妄真與非真尚猶雙非見與所見云何復存當知俱無實體若交蘆耳此頌相見無性同於交蘆也孤山曰諸之也語助耳言根塵虗妄則顯涅槃真實對妄說曰真待對不絶真亦成妄故云二妄猶非能遣也真非真所遣也非真即妄見即是根所見即境對妄說真猶皆遣蕩云何更有妄中根境乎中間謂根境二法體中無性也結解同所因聖凡無二路至即無明發明便解脫長水曰淨名云生死涅槃為二若見生死性則無生死無縛無脫是為入不二法門吳興曰欲明解結泛舉所因所因者六根也前諸佛同告云汝欲識知生死結根乃至速證安樂解脫惟汝六根更非他物似同此義孤山曰汝觀下重牒前喻令審觀也言空則蘆有外相言有則蘆中本空以喻根境妄執似有其體元空迷晦下頌知見立知及知見無見等解結因次第六解一亦亡根選擇圓通入流成正覺溫陵曰躡前結解解之義起後圓通之文也孤山曰六解則根一亡則湛圓選得圓根則入聖流證聖果矣陀那微細識習氣成暴流真非真恐迷我常不開演深密經曰阿陀那識甚微細一切種子成暴流我於凡愚不開演恐彼分別執為我即此識也暴流即生滅性從習所生由此識性全離取舍但是自心溫陵曰陀那下頌根結初起之由也陀那此翻執持執持種子發起現行即第八梨耶含藏種子為習氣積生識浪為暴流湛由是分結由是起也此識依真如合生滅雜乎真妄之間故曰真非真也若以為真恐迷妄習而自誤以為非真恐迷自性而外求故權小教中皆不開演也自心取自心非幻成幻法至尚不生幻法云何立資中曰此頌解結入圓之要也溫陵曰一切諸法惟心所現而於中取著妄成根結是自心取自心非幻成幻法也由妄取故有幻非幻若不妄取非幻亦無非幻尚無幻法何有幻法不立則根塵頓淨圓通現前矣是名妙蓮華金剛王寶覺至一路涅槃門偈文止此孤山曰彈指超無學顯三止之功也若入地住則超小乘阿羅漢位縱入相似亦超無學以同除四住此處為齊若伏無明三藏則劣又縱在觀行亦起無學如太子處胎貴壓群臣頻伽在鷇聲逾衆鳥溫陵曰此結頌也此之法門於淨不著於染不汙名妙蓮華根境結惑擬之則銷名金剛王覺即為無為亡情絶解名如幻正受依此修進一彈指間可超無學而入圓位也阿毗達磨云無比法十方如來迥出生死速證寂常莫不由斯故曰十方薄伽梵一路涅槃門薄伽尊號具六義謂自在熾盛端嚴名稱吉祥尊貴於是阿難及諸大衆至施以法音洗滌沉垢吳興曰祇夜云應頌又云重頌即頌上長行也伽陀云諷頌亦略云偈長水曰由前偈云解結因次第六解一亦亡故此疑之溫陵曰不因長行但諷美而頌之二頌合明故云雜糅精瑩此指能詮也妙理精徹此謂所詮也溫陵曰無遮大悲言其博濟也性淨妙常真實法句則真妄兩忘稱性之談也沉垢微細結惑也即時如來於師子座至次第酬佛此名為結補注曰由阿難未達六解一亡舒結倫次故如來示一巾成六結令悟六解則一亡示綰結之有次第令悟舒結之有倫次也資中曰巾喻真體無二結喻六用妄故以六也溫陵曰涅槃僧裏衣也僧伽梨大衣也劫波羅云時分即夜摩天所獻巾也綰縈結也巾喻一性綰喻妄動結喻六妄一一詳問者使誤凡所妄動皆為結業也佛告阿難我初綰巾至畢竟同中生畢竟異補注曰此節謂六結若存則倫次不容雜亂下節言六結若解則一六俱亡吳興曰同謂一真之性理本無差辟巾之體也異謂六根之精事用有別如巾之結也泐潭曰一真如體無異無同六妄結根確然異執佛告阿難汝必嫌此六結至六解一亡亦復如是吳興曰六根之精元是一真之性以隨緣故在眼曰見精在耳曰聽精等此皆如第二月揑所成故若能隨根脫粘內伏六既融一一亦斯亡如解結已巾亦無用溫陵曰不成謂是非鋒起不成一體也願樂一成莫非解除結惑不生則同異圓泯故曰尚不名一六云何成由汝無始心性狂亂至皆即狂勞顛倒華相吳興曰知見發妄此屬能見之相勞見發塵即對所見之境惟妄與勞五住備矣如勞目精下雙喻其義一切世間下示塵勞之相狂華謂無而妄有溫陵曰前明所結惑業之理此明能結狂妄之心也狂心之結妄境如勞目之見狂華故曰皆即狂勞阿難言此勞同結至若欲除結當於結心補注曰上節心性狂亂等示其根結之由展轉虛妄此節掣巾等示其解結之方也真際曰左右喻生死涅槃二邊行人執而不結故如雙結結心者喻觀中道則二邊俱解吳興曰左右牽掣俱不能解喻觀二邊皆不能破根本無明凡夫外道以斷常為二邊二乘菩薩以空有為二邊雖曰伏斷猶存巾結若欲除結當於結心者知見立知即名為結觀知中道是謂結心結不離巾解之則一知不異道亡之則中阿難我說佛法從因緣至諸妄銷亡不真何待吳興曰既令解結當於結心欲使選根而修圓行故示佛法從因緣生反顯若無因緣佛法無由而生也如前文云辟如琴瑟雖有妙音若無妙指終不能發是則圓修定慧是今因緣若三藏中事六度等皆是世間和合粗相泐潭曰知因從緣出至雨滴皆知此明如來覺法皆盡證其所說皆誡諦語選擇六根者前文云若能於此悟圓通根與不圓根日劫相倍故令選擇溫陵曰令依出世正智審擇根結本因而解之也若得正智不惟能知根結本因雖沙界萬類皆了元由矣世謂六凡出世謂四聖知此十界皆因於心隨無明之染緣則出九界隨教行之淨緣則出佛界故法華云佛種從緣起涅槃云亦有因緣因滅無明則得熾然三菩提燈佛有權實二智實智冥理權智鑑物發明世出世法乃至知其種種元由者皆權智所鑑也既於情無情照了不昧顯今所說解結之法及選根之義悉是鑑物宜然固無差謬矣阿難吾今問汝此劫波羅巾至則結解時云何同除資中曰此示六不頓解必由其序慤師云意明六根不可齊觀但依一根入證自然六斯會經意焉吳興曰綰巾成結雖有次第粘湛成根必無倫緒故不可以喻而難於法也蓋言見聞覺知六用差別如次第綰生也選擇六根隨於一根發觀如次第而解也佛言六根解除亦復如是至從三摩地得無生忍吳興曰小乘析觀乃是作意先破人執次破法執然后會入空平等理大乘體觀人法無殊空非前後今言此根初解先得人空者亦猶前文如澄濁水沙土自沉蓋任運而然也溫陵曰了煩惱結皆由著我則於我無著離煩惱障是得人空也了所知結皆由著法則於法無著離所知障是得法空名法解脫人法雙解是名俱空而俱空亦泯心無所起是從正受得無生忍也觀音初於聞中入流亡所動靜二相了然不生即先得人空也如是漸增聞所聞盡盡聞不住覺所覺空即成法解脫也空覺極圓空所空滅即俱空不生也生滅既滅寂滅即現前即得無生忍也携李曰如是三空皆以中道而為觀體苟非此者何異解巾左右牽掣乎阿難及諸大衆白佛言至惟垂大悲慧我祕嚴長水曰此阿難問詞真際曰二十五聖於根塵七大各悟圓通是知本根冥乎萬法也佛不顯說而因衆敷陳是謂冥授也退藏密機即息慮凝心也溫陵曰慧覺圓通存乎一心已蒙開示故身心皎然圓通本根冥乎萬法猶未通達故冀佛冥授也密言即發明慧覺之言也祕嚴即圓通本根祕要也慧覺圓通我固有之故雖因密言還同本悟若不開祕嚴則與未聞無異故別求開示也爾時世尊普告衆中至從何方便入三摩地孤山曰五陰六入十八界本如來藏妙真如性佛欲題菩薩萬行故寄選根令二十五聖開衆妙中門究竟圓通真實革小乘於後心根大衍於初會又曰此下二十五聖觀十八界及以七大乃是開合之殊耳泐潭曰圓通二十五門即十八界七大也七大自十八界開故此不言夫根器萬法惟十八界七大攝盡故此備陳欲令行人於根身器界種種法上顛沛造次得真圓通無少滯也憍陳那五比丘即從座起至如我所證音聲為上携李曰從於音塵默悟圓理此依內證故名曰密即如如智證境自性也一塵密證諸塵圓契故曰圓通孤山曰妙音密圓者密悟圓理也孤山曰阿若多因聲圓悟故曰妙音密圓下云妙色密圓妙香密圓因味覺明妙觸宣明妙法開明又意同此二十五門初標聲塵者先此方教體也雞園無憂王造以迎佛也吳興曰如來說法初中後妙豈彼妙名便同法華之妙乎只如下文說緣覺聲聞云勝妙現圓及勝性現圓又說大梵善見身心妙圓及妙見圓澄豈此妙圓亦同圓覺妙明之性乎應知如來先令諸聖次第說竟後告文殊言此二十五無學諸大菩薩及阿羅漢各說最初成道方便皆言修習真實圓通彼等修行實無優劣前後差別斯則開權會實之正文優波尼沙陀即從座起至如我所證色因為上南嶽師曰觀五陰理性名性念處故雜心論偈云是身不淨相真實性常定諸受及心法亦復如是說以從不淨白骨微塵歸於虗空者由多貪欲修對治法成就九想發真破惑即壞法羅漢也九想成時得慧解脫於諸色相發明無漏故云妙色密圓溫陵曰優波尼沙陀此翻近少亦云塵性謂微塵是色之少分也因塵悟解故得此名昔多貪欲佛令作不淨觀長水曰因觀色塵本如來藏故曰悟諸色性吳興曰不然既云觀佛最初成道正是小乘無漏行法言悟諸色性者斯乃聲聞悟性念處也香嚴童子即從座起至如我所證香嚴為上携李曰非木則不住有非空則不住無有無俱非中道顯矣携李曰宴安息也晦冥寂也清靜之室謂之清齊資中曰非木等者觀性空也吳興曰凡言性空必推四性今當以木為自烟火為他和合為共空為無因此似衍門觀幻有即空之相下諸聲聞亦多是小乘觀實有滅空之義小衍雖殊所證圓通同一真諦耳溫陵曰偏觀有為而因香圓悟得童真位故名童子辭佛宴悔者宴坐晦迹齊心作觀也木烟皆非去來不有意無所緣故由是意銷而發明無漏塵氣滅故妙香密圓也藥王藥上二法王子至如我所證味因為上吳興曰由事佛故必聞正法即於味性了生無生空有謂味塵也身心謂舌識也以味從合中知故相對言之味非空故非離身心味非有故非即身心中道之性於是乎顯溫陵曰善救功成堪紹佛位名法正子曠劫為醫常善救人也言分別味因者謂了知味性而發明非空有離即之圓因乃指圓通本根非謂因之悟入也前言色因後言水因法因同此若酢等六味也衆味共成名和合味直爾采用名俱生味修煉炮炙名變異味跋陀婆羅并其同伴至如我所證觸因為上吳興曰水因謂所觸之因也塵體即能觸之緣也塵既無染體亦常淨能所如幻二邊俱空故中間覺觸之心安然契性矣泐潭曰觸具三和金翻為三德祕藏故名妙孤山曰跋陀婆羅此云賢守亦云賢護自守護賢德亦守護衆生洗塵洗體及塵體之中少有所得皆妄觸妄覺故得無所有則妙觸宣明成佛真子名佛子住以善能守護令妄不起令覺不動故名賢護摩訶迦葉及紫金光至知我所證法因為上携李曰頭陀有十二行以紫金塗佛感報如此因深果茂其理宜然孤山曰修於滅盡者即九次第定中第九滅受想定也長水曰紫金光尼在家時婦也溫陵曰摩呵迦葉大飲光也其身金色光吐日月因觀塵變悟法空寂遂修滅盡定以滅意根不緣法塵得無生滅故超百千劫如彈指頃于今於雞足山待彌勒乃入此定也頭陀新云杜多此翻抖擻以能抖擻法塵為號補注曰紫金光既同時發心則非一世眷屬也阿那律陀即從座起至旋見循元斯為第一吳興曰阿含云修禪蓋總略而示今云金剛三昧則別顯其名非謂金剛惟喻大定如阿難入電光三昧斷最後思惑亦名金剛三昧此喻小乘無漏之智耳長水曰那律即阿㝹樓馱此云無貧亦云如意乃白飯王子也過去世以一食施辟支感九十一劫受如意樂孤山曰增一阿含云佛在給孤園為衆說法那律於中眼睡佛說偈呵曰咄咄何為睡螺螄蚌蛤精一睡一千年不聞佛名字那律於是達曉不眠眼根便失因是修禪得四大淨色半頭而見觀三千界猶如掌果今云金剛三昧觀見十方精真洞然而與昔異者此經開顯故約內祕以談昔引物機乃約現小而說資中曰掌果之辟既齊精真之言何別下文明善現天尚云精真現前陶鑄無礙況今羅漢發真無漏豈不得云精真洞然邪旋見循元者旋大千之見循真空之元見盡元明圓通著矣周利槃特迦即從座起至反息循空斯為第一長水曰特迦亦云蛇奴於路所生過去為大法師祕吝佛法不肯教人後感愚鈍以宿善故遇佛出家五百比丘同教一偈經九十日不成佛令數息攝心因而了悟溫陵曰槃特此云斷道即誦帚比丘也宿以吝法報性散鈍佛令數息攝心因而了誤生住異滅諸行無常故反生滅息循無生空而得圓證憍梵鉢提即從座起至還味旋知斯為第一孤山曰了味無味名為一味雖舉味塵蓋顯於舌故即云觀水之知能知乃舌耳非體舌也非物味也內脫身心即正報解脫外遺世界即依報解脫也溫陵曰憍梵體提此云牛呞佛為遮謗賜之數珠令常念佛是謂一味心地法門能滅心緣得入正受亦因教觀舌根常味入道觀舌之知不從體生以迷淪有漏由心緣不斷故滅心絶緣即超諸漏遺器界也不著塵味不隨妄知是謂還味旋知畢陵伽婆蹉即從座起至純覺遺身斯為第一吳興曰知即覺也刺傷足時雖有能覺之心覺於所覺之痛反觀覺心本自清淨無有能所所覺屬身識能覺屬意識由身識生已次起意識分別前法故曰雙覺即上文云我念有知知此深痛也覺清淨心即是純覺無痛痛覺故曰遺身補注曰無痛痛覺者即是無所覺復無能覺也携李曰畢陵伽婆蹉此云餘習多慢習也不可樂事一切苦事也思不可樂法而觸不可樂事因而正觀為有知故知此深痛雖覺有知之心能覺深痛反覺清淨之心曾無痛覺然此存雙覺其覺未純故又思而進之至於身觸皆亡故諸漏虗盡知痛俱寂故純覺遺身也須菩提即從座起至旋法歸無斯為第一資中曰以聲聞人所得宿命能知八萬劫事今逆談所見謂之無礙也雖云在胎知空乃至令他證性猶未斷結使故蒙佛開發方成無學若爾性覺真空乃至下文深達實相皆就小宗分別無咎溫陵曰須菩提曠劫解空非唯一世了身空寂故心得無礙洞達宿命了境空寂故十方成空自覺覺他故亦令衆生證得空性然此唯小乘所證之空於性覺真空猶未圓明故逮今發明性覺真空乃能頓入寶明妙性真空之海離二乘見而同佛知見也諸相入非能所皆盡蓋融於寶明空海也旋諸有法復歸至無蓋歸於寶明空海也資中曰初以單空空於諸相故云諸相入非次以重空空其空相故云非所非盡舍利弗即從座起至光極知見斯為第一吳興曰世出世間四諦之境也種種變化生滅之相也長山曰心見眼識也識清淨故種種通利心無際故見覺圓明心見發光光極知見者由心見發明而圓照萬法也迦葉兄弟即優樓頻螺等或云遇馬說偈彼乃小乘因緣非圓通所取身子智慧第一聲德居長故稱長子普賢菩薩即從座起至分別自在斯為第一溫陵曰凡具大根修菩薩行皆名普賢之行心聞耳識也分別衆生知見者擇普賢行而成就之也孤山曰心聞發明內證也分別自在外用也携李曰行彌法界曰普位鄰極聖曰賢此非地前之賢乃是金剛喻定居衆佛之頂名之為賢孫陀羅難陀即從座起至明圓滅漏斯為第一吳興曰數息所以發識觀息所以駐識孤山曰孫陀羅云好愛妻名也難陀云豔喜佛親弟也前數息依根所以攝心此觀白依識所以駐心也息由風火而起鼓煩惱濁故其狀如煙昧者不覺唯諦觀能見六爻見火燒息能為黑煙紫焰皆煩濁所發也爭觀發明則煩濁漸消故內明外虗而煙消成白及乎漏盡無復煩惱內瑩發光故出入息化為光明也銷息即銷煙成白滅漏即心開漏盡也皆鼻識發明富樓那彌多羅尼子至消滅諸漏斯為第一吳興曰宣說下指小乘法如是下示大乘義始阿含終般若故云乃至增一稱滿慈子說法最為第一大品中轉教諸菩薩摩訶般若即其相也追敘得道若權若實如前辨之真際曰說法第一辨才無礙因以降魔滅漏皆舌識力也苦空實相者世間諸法一切無常一切皆苦一切皆空而中有真常不苦不空如涅槃四德即實相也佛以身口意三輪應物無滯音聲即口輪也優波離即從座起至一切通利斯為第一孤山曰優波離此云上首以其持律為衆綱紀故携李曰依身有識故先執身次執心孤山曰執身及心從粗至細以防身識之微也身識既滅真智現前斯所謂戒淨有智慧便得第一道真際曰優波離云近執謂親近執待於佛也言親隨親觀乃至脫欲承教皆明身識欽承也行住坐臥律儀各二百五十對三聚成三千復以三千配身口七支復配四分煩惱成八萬四千性業即殺盜淫等根於性者遮業即支末愆失因過遮上者戒律為衆紀綱親印我心言衆所印可也我以執身等者言由持戒故身與身識無不圓通也律中得度波離第一僧中得度憍陳最初故今堂置憍陳壇置波離各立本也大目揵連即座起至久成清瑩斯為第一携李曰意為諸法生因萬法緣此以通故聞內緣頓發神通吳興曰神名天心通名慧性而此心性即意識發明也大乘發如來藏小乘發根本禪六神通中漏盡通是其內證餘之五通皆屬外用孤山曰優樓頻螺此云木瓜癃胸前有癃如木瓜故伽耶山名即象頭山也亦云成城近此山故那提河名一兄二弟故身子云逢迦葉波兄弟即其人也溫陵曰因緣深義謂非世間和合粗相乃發明世出世法故因之發心得大通達神通如意也旋湛者旋意識而復妙湛故久成清瑩通力圓明清淨自在也烏芻瑟摩於如來前至登無上覺斯為第一資中曰法門精粗無二故塵勞欲火俱證圓通吳興曰遍觀四大皆是觸塵之境百骸四支地也諸冷暖氣即水火風也三昧既著故曰神光內凝以多欲人火大偏盛故變淫火而成智火成阿羅漢下謂成小果後發大願將非普現色身以執金剛神輔佛揚化者乎携李曰烏芻瑟摩云火頭即火頭金剛也多淫之人本由暖觸迫發生為欲火死為業火業力增熾故成猛火聚也遍觀暖氣者令悟火大無礙流通也諸礙既消故神光內凝成智慧火發於頭上故名火頭生大寶𦦨即火光三昧也持地菩薩即從座起至成無上道斯為第一長水曰微塵性體不相觸同於空也故悟此實性而刀兵無所觸吳興曰身界微塵乃至刀兵者以此皆是地大所造之色即因緣所生法也微塵無差空也自性不觸中也三諦具足非如來藏乎悟無生等由分證法身而權取小果故以無生忍簡之初自度後化他是謂𢌞心也泐潭曰平險防損代人濟牛無彼我相表善平心地無有高下也毗舍浮此云遍一切自在亦由平心故一切自在也我即心開下皆依地大圓悟也身界二塵本如來藏虗妄發上故不相摩觸了本虗妄即悟無生矣妙蓮花佛知見地即諸佛心地法門也行實圓契染淨兩忘名妙學華逈出三乘深造一實名佛知見地持地所持在此而已故得身界塵消無上智圓也月光童子即從座起至圓滿菩提斯為第一資中曰準華嚴經華藏海中有大蓮華其蓮華中有諸香水一一香水海為諸佛剎世界之種華藏世界在香水中故云浮幢王剎華藏二十重纍高如幢最為高大故稱王今觀身水與彼海同故曰浮幢王剎諸香水海也初成此觀但見其水者此定果色隨心所變如十遍處入定則有出定則無不同業果色共業同感不造世業方得清淨十遍處者青黃赤白地水火風空識此十一切處皆有如作青想則一切處皆青也吳興曰得阿羅漢久離病緣等按智論明諸聖人皆有身苦如舍利弗風病畢陵伽眼痛等今言已得羅漢久離病緣實難銷會此蓋過去曾取小果既無見思惑業之事是離分段病苦之緣資中曰方得亡身等初證法身分亡變易之身身中水性與香水海性同合真如空藏之性泐潭曰初成水觀復逢無量乃得亡身以明聖道長遠乃可携李曰漢州綿竹縣水觀和尚迹同月光佛陀本傳云師入火光定其室如焚亦此類也溫陵曰月太陰水精也昔師水天修習水觀水性圓明故號月光修習水精謂觀水精性也水性無奪者內之津血外之剎海水相雖異而性不相奪此即因水悟圓也浮幢王剎者世界海外諸香水海通號也我於是時至身質如初敘作觀之緣也但見其水謂專於一觀未融四大故未得無身舍利弗於恆河岸入定遭怨害之鬼所擊而出定頭痛亦未得無身故也山海自在通王即於地水諸大得妙圓通者也月光至此乃融四大故方得無身而性合真空初由水性一味流通耳琉璃光法王子即從座起至傳一妙心斯為第一溫陵曰因風大圓悟身心發光洞徹無礙號琉璃光無量聲佛亦依風大開示菩薩使知本覺無動而身界之動皆風力所轉琉璃光因是觀界觀世觀身觀心遷流運止悉惟風力故曰諸動無二由是覺了大千群動皆即狂勞猶百蚊蚋鼓於方寸耳既了狂勞乃見不動佛也東為群動之本而佛號不動乃即動而靜者也能即動而靜故身心無礙也傳一妙心者知風力無依萬動皆妄而獨證無動本覺也吳興曰界為方位故安立世為遷流故動時時即過現未也孤山曰逢佛未幾者未多也虗空藏菩薩即從座起至妙力圓明斯為第一吳興曰因觀四大色質即有無邊法身為顯此身遍融一切故執寶珠照十方等而表示之既以珠表色復以鏡表心色從心造全體是心故放寶光灌十方等華嚴云清淨妙法身湛然應一切身同虗空法也身入塵國應也說三乘法為佛事稱四悉機為隨順真際曰因證空性故性中所有一切皆空身與剎海涉入無礙號虗空藏定光即然燈佛也於定光所得無邊身者法身如空無有邊際必假心燈寂照而後發明也執四寶珠等者由觀四大無依妙力圓明而照了法界一切皆空所謂虗空無二佛國本同也又於自心現大圓鏡等者亦由四大無依妙力圓明於圓洞心內瑩發光而交徹融攝也幢王剎即華嚴法界剎名彌勒菩薩即從座起至得無生忍斯為第一孤山曰求世名心歇滅無有者相似位也得成無上妙圓識心三昧者分真位也真際曰識性不守如如而外分別名相是遊族姓而求名也吳興曰盡空者謂盡虗空界所有佛國等惟心所現也若以四土言之心即寂光變化即實報方便同居也淨穢但是三土之相互有起滅故云有無流出如來者從法身識性流出報應佛身也携李曰彌勒此云慈氏為慈隆即世非臻後劫愍物迷識故示跅發明也心重世名好遊族姓者迷識著境故外慕妄求也從燈明教而明心頓歇者了識依智則迷妄自除也然燈佛現乃成妙圓者迷妄既除心燈即現心燈既現則萬境妙圓矣得是妙圓三昧遂了三界唯心萬法唯識於盡空如來皆我心變國土淨穢亦我心變無量佛性從此發揮是謂流出大勢至法王子與其同倫至得三摩地斯為第一吳興曰母憶子如人專憶子逃逝如人專忘問前云逢不逢等此何但云雖憶何為答縱得逢見不蒙法利與逃逝無異舍衛九億家不其然乎入無生忍者以證驗修則念佛之心不可單約事相而解念存三觀佛具三身心破三惑無生忍位方可入焉資中引觀經是心是佛等釋之斯亦大要也淨土者別指極樂及寂光也都攝六根者念屬意根意根若淨諸根自攝故無選擇也溫陵曰觀經云以智慧光普照一切令離三途得無上力名大勢至又云夫念佛者不得一彈指頃念世五欲是謂繫念辟如有人下示必須繫念然後相應不專念佛則雖逢不逢雖見不見染香則襲香念佛則見佛故以念佛妙熏名香光莊嚴也大佛頂如來密因修證了義諸菩薩萬行首楞嚴經第六爾時觀世音菩薩至從聞思修入三摩地吳興曰準下文云由我不自觀音以觀觀者令彼十方苦惱衆生觀其音聲即得解脫此亦同於法華釋名之意也教即世音聞即耳根皆所觀之境也思修皆能觀之觀也然則觀由境入境實遍通而特取音聞者乃逗機之要也溫陵曰觀音者觀世言音圓悟圓應之號也於音言觀者以觀智照之不以耳識聞之也所師之佛亦名觀音者因果相符古今一道也達耳之謂聞著心之謂思治習之謂修三者圓明是名三慧初於聞中入流亡所至生滅既滅寂滅現前吳興曰舊約三慧次第銷之今則不爾節文為四一亡前塵即初於聞中至了然不生也入流亡所者流謂法性所謂音塵入之與亡通乎觀行相似之位也所入法性體既常寂是則前塵本自不動今亦無靜故云二相了然不生也二盡內根即如是漸增聞所聞盡也前塵易亡內根難盡以由亡智有疏有親故云漸增也聞所聞盡謂能聞所聞之根亦復不生也此乃舉所顯能也下覺所覺空及空所空滅例亦如之泐潭曰釋從三慧入圓通也入流亡所者不隨聲塵頓入法流而亡其所入也音聲之性由動靜顯故所入既寂則動靜不生此聞慧也既達乎耳復著於心如水之漸如土之增使能聞所聞情境俱泯而盡聞之心亦復不住以合真覺此思慧也既著於心還以治習使能覺所覺皆合妙空則空覺不二是謂極圓能空所空亦復不立乃為盡道此修慧也夫然後生滅滅生情境俱盡而真寂真滅圓通之體於是現前即所謂入三摩地也以圓覺配之入流亡所等即應當遠離幻妄境界也如是漸增等即心如幻者亦復遠離也覺所覺空即遠離為幻亦復遠離也空所空滅即離遠為幻亦復遠離也生滅既滅則得無所離即除諸幻也寂滅現前即譬如磨鏡垢盡明現也造至於此則圓通之體極矣溫陵曰三空觀智即盡聞不住覺所覺空也上句遣前盡相下句正空觀智覺謂覺照即智體也四滅諦理即空覺極圓空所空滅也上句顯重空之智下正滅重空之理蘇子由曰初於聞中一節是一彈指間遍歷三空即與諸佛無異矣忽然超越世出世間至與諸衆生同一悲仰携李曰當知衆生由悲故能感苦之力菩薩由慈故能應仰樂之機感應常冥與常顯若曉斯旨則下文三十二應乃至四不思議無忘其本乎吳興曰上云慈力者慈既與樂必能拔苦應以力字兼於悲義也下云悲仰者悲謂悲苦仰謂仰樂此非屬應蓋言其機也是故厭患苦道則以悲為機欣慕樂果則以仰為感菩薩所證圓通之理遍在衆生悲仰之中故曰與也同也世尊蒙彼如來至令我身成三十二應入諸國土携李曰幻喻三慧體不可得金剛喻摧堅之能也溫陵曰幻人作為本於無作故此言如幻三昧後言無作妙力此之三昧始從熏習訖無修證皆以決定智斷究竟堅固而為正受三十二應者現十法界身圓應群機開之有三十二惟四聖六凡攝盡群類也世尊若諸菩薩入三摩地至而為說法令其解脫孤山曰菩薩別圓機也若入相似三摩地進修中道無漏則分真勝解現圓乃至若進修金剛無漏則究竟勝解現圓大士皆現佛身為說頓法令得分真究境解脫真際曰修正定取正果曰進修無漏境智兩忘情解俱泯名勝解現圓斯可以得佛故現佛身為說果法也若諸有學寂靜妙明至而為說法令其解脫携李曰有學小聲聞也明能妙萬物以明自性故曰勝妙溫陵曰獨覺者出無佛世觀物變易自覺無生故號獨覺樂獨善寂求自然慧故曰寂靜妙明緣覺者稟佛之教觀緣悟道也知迷勝性由十二緣於是斷之自無明滅至憂悲苦惱滅則緣斷而勝性現矣性因緣斷而現故曰緣斷勝性携李曰由觀緣悟道名緣覺乘携李曰勝妙現圓者各約自乘理智將欲現前得此名若諸有學得四諦空至而為說法令其解脫携李曰三果已前賢聖位俱屬有學見道一十六心斷四諦下惑證生空理故曰得四諦空初果後進斷三界八十一品俱生皆證一分擇滅無為故云修道入滅携李曰斷四諦下粗惑名得四諦空依道諦修而證滅諦果名修道入滅此未能妙物獨證空性故曰勝性現圓也四聖不舉菩薩者兼在佛位若諸衆生欲心明悟至而為說法令其成就孤山曰梵王即色天主名為尸棄此云頂髻今言梵者應是初禪之頂以有覺觀語言之法得為千界之主說法者如金光明云大梵天王說出欲論帝釋即欲界第二天主說法謂十善也自在天是欲界頂天具云婆舍跋提此云他化自在假他所作以成己樂即魔王也大自在即色頂摩醯首羅天大論云三目八臂騎白牛執白拂者是也泐潭曰梵天超出欲界故心能明悟不犯欲塵身根清淨即得生彼也帝釋為忉利天主統三十三天解脫令離欲塵也自在遊行名自在天即欲頂他化也飛行虗空名大自在天即色頂摩醯也初舉梵王至此乃自欲天色天而超至色頂意兼無色以明無剎不現也若諸衆生愛統鬼神至而為說法令其成就溫陵曰上舉正統此舉臣輔也孤山曰天將軍為帝釋上將統領鬼神四天王臣於帝釋統領世界四天太子即那吒之類能驅鬼神者也若有諸天樂出天倫至而為說法令其成就孤山曰藥義此云輕捷乾闥婆此云香陰新翻尋香行帝釋樂神也阿修羅云無端正以女美而男醜故從男彰名新翻非天以諂詐無天行故準普門品入部此闕迦樓羅即金翅鳥也緊那羅形似人而顯有角因呼為疑神天帝絲竹樂神也小劣乾闥婆新云歌神摩呼羅伽什師云地龍肇公云大蟒腹行也長水曰有形如休咎精明等無形如空散銷沈等有想如神精靈等無想如精神化為土木金石等皆非人也溫陵曰此天龍八部等類樂人修人者此類似人而非故樂生人道諸非人指有形無形有想無想即休咎精明空散消沉類也六凡不舉獄鬼畜者此類方沉幽昏未能聞法則以施無畏力拔之是名妙淨三十二應至無作妙力自在成就吳興曰三十二應比普門品雖互有出沒大體是同總而言之無越十界於十界中兩經俱無菩薩并地獄身者聖言之略耳溫陵曰迹示同類心絶愛見名妙淨依無作智起大神用名妙力無作無為隨緣泛應名自在成就世尊我復以此聞熏聞修至獲十四種無畏功德溫陵曰由我不自觀音而彼獲脫苦由我知見旋復而彼能不燒故曰於我身心獲無畏德一者由我不自觀音至施無畏力福備衆生吳興曰聖人無已惟物是利故以觀音之智加彼觀聲之機於苦得脫不旋踵矣三者於聽言觀猶音言觀也携李曰涉入世間不壞世界即方便智方便屬權權能幹事故生於男也立大圓鏡空如來藏即屬實智實智詣理理能含育故生於女也如淨名云智度菩薩母方便以為父即其義焉孤山曰圓通本根妙含彼我無二故令持我名福等於彼當法界一多平等通則一身多身他方此界一福德一知修習得真圓無復涯名物各各圓遍異也補注曰溫陵之解觀聲在應吳興之解觀聲在機二說不可偏廢故互存之溫陵曰不自觀音者不隨聲塵所起知見也以觀觀者謂旋倒聞機反照自性也不起知見則無所妄反照自性則一切真寂無復苦惱可得此則真觀淨觀大智慧觀能破癡暗能伏灾難一也內外四大常相交感見覺屬火聞聽屬水故見業交則見猛火聞業交則見波濤今知見旋復則無見業觀聽旋復則無聞業二也三也妄想滅則心無殺害四也熏於妄聞成真聞性一根既圓則六根銷復同於聲聽無復形礙五也聞熏精明爍彼幽暗六也音性圓銷則內無所繫觀聽返入則外無所纍七也音聞兩立則物我成敵今滅音圓聞則內外無待八也衆生以欲習合塵故為色劫能以金則三昧熏聞成性遂能離塵成性則欲愛乾枯離塵則根境不偶九也瞋由違情而起對境而生音性純淨無復妄塵故圓融無違無能所對十也癡由妄塵所蔽無明所覆銷塵則無蔽旋明則無覆故外之法界內之身心凝瑩朗徹十一也融形則礙滅復聞則性真故涉入世間而無動無壞能遍十方供微塵佛稟承其法各為法子供佛足福稟法足慧而能紹繼法王有男子之道十二也六根圓通下謂圓故無二通故含界明照則大圓鏡智之質也含界則空如來藏之體也具此故能承順法門受領無失承順即坤儀柔德受領即閨門能事有女之道十三也法華亦有此之較量及觀今經方曉彼意蓋此方衆生耳根利故受道者多所以觀音化勝餘根鈍故受道者少所以諸聖化劣是知行位雖齊對機有異總彼恆河沙數但敵觀音一人故使特名二福正等據此所說已自密簡耳根圓通為未曉者更俟文殊詳擇百億日月者百億剎土也是名下總結也十四世尊我又獲是圓通至四不思議無作妙德溫陵曰現衆多容誦一一呪攝化衆生圓應所求理出於無為神應於不測名不思議無作妙德一者由我初獲妙妙聞心至救護衆生得大自在携李曰然前則現形應求獨此名不思議者前則略顯此復深明如於一身現八萬首臂固莫得而思議也補注曰從真妙圓重發真妙曰妙妙聞心旋聞脫聲獨返真源曰心精遺聞由獲妙遺聞故衆塵不隔一覺圓融而應現無滯或曰八萬四千特表法耳一身何所施乎是特以有思惟心測度菩薩圓通境界也夫身含十虗毛端現剎彼空與剎又不啻如首臂而已彼八萬四千首臂猶人之八萬四千毛孔耳未足異也聖人之言即事即理既曰不思議德無以限意思之議之爍迦羅云金剛堅固不壞也母陀羅云印各有妙印也清淨寶目離塵合覺也慈以攝化威以折伏定以復湛慧以開覺通指衆多妙容也溫陵曰言初獲者指本因也首為六用之總辟表提接之悲目表照了之智各依本數充之以至八萬四千者表依根本六用根本智悲而泛應塵勞得大自在此十一地等覺妙行也華嚴十地已前猶依本智長養大悲至十一地長養功終純是大悲為法界體與智圓現故觀音手眼通身遍身而以大悲稱也二者由我聞思脫出六塵至捨身珍寶求我哀愍長水曰密部神呪多觀音所作能安樂衆生名施無畏携李曰以聞思慧脫塵不礙故現形誦呪神變妙力一一無礙是謂妙能溫陵曰本根清淨則一切無著故能令衆生捨諸慳著也求我哀愍者哀愍受之而為施作佛事也四者我得佛心證於究竟至求大涅槃得大涅槃吳興曰此四不思議前二屬應後二對機應中備顯形聲二益初文雖云說呪而正示形益即應身功用也次文雖復現形而正示聲益即名稱普聞也溫陵曰得佛心證慧足也珍寶供養福足也福慧兩足故傍及衆生使彼所求如願也佛問圓通我從耳門至故觀音名遍十方界吳興曰按觀音三昧經及大悲經並云此菩薩過去久已成佛號正法明又悲華經說往昔寶藏如來授不瞬太子記名觀世音然則悲華與今經皆覆本垂跡之名耳今得圓通即太子後身也溫陵曰初於聞中入流亡所是從耳門得圓照也由得圓照故隨緣應化得大自在爾時世尊於師子座至梵唄詠歌自然敷奏溫陵曰前說圓通之法此顯圓通之瑞而應之也孤山曰寶光交照表自他之理互融林木演音顯依正之性不二印前所證盡契佛心泐潭曰諸佛五體同放寶光者表證性明極則寶覺圓融全體發現也互相灌頂者頂為圓極之相表諸佛證性圓極若此會中菩薩羅漢即二十四聖之儔佛光亦灌其頂者印其修證等無優劣也林木池沼皆演法音交光相羅者圓通既現前則一切聲是佛聲一切色是佛色無非悟入之處無非圓通之理也大衆普獲金剛三昧者因此皆能破惑障悟圓通也天雨寶華空現寶色地隱山河界含塵剎表證圓通性則無作妙行自然分披寶明空覺自然發現有為習漏當不復生衆塵廓然無復隔越也梵唄詠歌自然敷奏者能使法界永離衆苦常得妙樂也聖人所演圓通法門奧旨妙利詳悉若此故衆瑞詳而應之於是如來告文殊師利至實無優劣前後差別吳興曰夫如來藏性元無異乘以根有利鈍故教分大小約三諦言之則小教所詮者真也大教所詮者中也而此真中遍在一切俗諦之上即前所悟十八界及七大也溫陵曰三諦具足名如來藏俗諦不空真中俱空故二十五聖中凡聲聞所證或析俗見真或體俗見真皆分入空藏也菩薩所證或離俗顯中或即俗顯中皆全入空藏也今以藏性融會全分無差即同法華開方便門示真實相決了聲聞法是諸經之王我今欲令阿難開悟至何方便門得易成就資中曰歸元證性雖無差別隨方應機自有難易故須假大智選擇吳興曰上從證性會同圓通今為逗根令簡方便性如華屋根如入門若得其門方受其賜世人以解為證請思最初入通方便與二十五聖孰為其倫乎文殊師利法王子奉佛慈旨說偈對佛此下皆偈文也携李曰文殊既與觀音同證故奉慈旨如自來矣吳興曰此下欲簡圓通先明覺性次辨迷妄後示歸元於歸元中選耳根為易覺海性澄圓圓澄覺元妙溫陵曰此人人本來圓通者也吳興曰此類前文性覺妙明本覺明妙但法喻相參耳吳興曰真覺之性辟如大海澄湛圓融皆喻寂而常照也復牒圓澄所喻之覺示其本來照而常寂故曰元妙元明照生所所立照性亡至知覺乃衆生孤山曰元明照即上本明之性也真際曰於彼元明性上妄生照用而形所相有相當情無相即隱故照性亡溫陵曰從元妙中忽起妄明曰元明妄有所照曰生所所謂覺非所明因明立所也所明既立則照性隱矣亡非無也入亡而已性真既隱空覺遂分根器二界遂因迷頑妄想安立故妄想凝結則成無情國土妄識知覺則成有情衆生則彼澄妙者遂莫得而圓莫得而通矣空生大覺中如海一漚發至況復諸三有溫陵曰牒上以明迷澄圓而成根器融根器則歸澄圓漚滅下如云一人發真歸元十方虗空悉皆消殞等吳興曰有漏兼有情三有含情器溫陵曰大覺海中本絶空有由迷風飄鼓妄發空漚而諸有生焉迷風既息則空漚亦滅所依諸有遂不可得而空覺圓融復歸元妙矣諸三有指微塵國土中三有也歸元性無二方便有多門至遲速不同倫孤山曰觀音耳根則順餘聖諸根則逆蓋對此方之機說也吳興曰此揀六塵溫陵曰二十五聖同一圓通所謂無二所謂多門在乎聖性逆順皆通不容料揀其如初心遲速異宜故須選擇也色想結成塵精了不能徹至云何獲圓通孤山曰問陳那悟聲塵與觀音耳根其義相類何故文殊簡以為非答聲是佛語根乃自心認塵則著他語言觀根則了己心性是以聞聲亦為所簡溫陵曰憍陳那大迦葉等各因六塵悟圓而此皆揀去者彼所謂聖性無不通此所謂初心不同倫則凡所不取皆以不宜初心意取耳根獨宜也今揀六塵以色能起想結塵使精性不徹聲唯局名句味不該不遍味意味也伊猶惟也香味觸如文法塵非相獨意能緣內潛意根故稱內塵見性雖洞然明前不明後至云何獲圓通吳興曰此揀六根舌根為識所依亦名舌入今文語倒但是舌入非無端耳內身外物能所相觸方有覺觀離中則無故云各非等若謂合中有者其如物非體知成敵兩立故云涯量等湛了終無見如精了不能徹也以雜亂思於湛了性終無能見真際曰鼻闕中交故云支離舌不因味而能覺了乃為無端身與所觸各成涯異冥會者因觸知身也亂思動相故名湛了識見雜三和詰本稱非相至云何獲圓通吳興曰此揀六識論云二和生識謂根境和合識生其中今言三和者能所合說也溫陵曰三者和合窮之本自無體故曰非相也普賢用心聞故能知他方沙界外事此由修法界行大因所生非初心能入也孫陀散亂佛欲攝住其心令觀鼻端此特權機而已蓋真心無住有住則妄矣吳興曰舌識開悟乃是先曾成就音文之者如富樓那從曠劫來辨才無礙佛教說法成阿羅漢豈非開悟先成者邪然其所說名句之體且非出世無漏之法斯亦一非含一切是故簡之問波離執身次第執心俱得通利今何但云束身而已答聲聞執心亦防六聚七支之非況今言身識在其中矣目連神通由宿習所得雖云旋湛心光發宣非關於法分別而現又小乘神通皆是作意緣物則有離物則無携李曰法分別即意識也若以地性觀堅礙非通達至云何獲圓通吳興曰勢至念佛都攝六根所念之境必通三身然其母子相憶之喻多就應身而說是故指同無常生滅豈以此因而感常住不生不滅之果乎已上二十四聖皆由所得圓通本根非此土當根乃為所簡須知簡性全是簡機豈文殊之有慢心諸聖之有慚德古謂此等龍門點額寧不長吁者鄙哉溫陵曰持地平填尚涉有為非實聖性月光水觀未離想念難契如如蓋如如之理非覺觀之法故也烏芻瑟摩聞說欲火而生厭離是厭有也琉璃光觀風性動則與寂對有對非覺也晦昧為空故云昏鈍彌勒惟修識觀而所觀之識念念生滅存心觀之已妄況獲圓通耶我今白世尊佛出娑婆界至實以聞中入吳興曰教體應具聲名句文今言音聞者以聲是實法餘三是假攝假從實故但云音音即所聞之境聞即能聞之根舉所顯能而正示聞性故云欲取等溫陵曰聖人設教隨方不同或有佛土以佛光明而作佛事或有佛土以佛菩提樹而作佛事乃至或以園林臺觀或以虗空或以寂無說示如香積佛國無文字說但以衆香令諸天人得入律行而此方教體必藉音聞欲取正定必由聞入者各隨機緣故也蓋彼諸佛土無非利智故機緣默契出乎言象而堪忍衆生迷本循聲昏惑障重必藉聞熏聞修以銷塵除障然後可入然以聞為入者特得其門而已必期於遺聞反聞然後為至也夫至於遺聞反聞則佛光明菩提樹乃至寂無說示處皆可入矣離苦得解脫良哉觀世音至出世獲常住溫陵曰初聯總歎觀世言音脫苦與樂也末聯總歎衆德能救世間苦能與出世樂也長水曰此嘆觀音之妙携李曰於沙劫入塵國歎三十二應也得自在施無畏歎四不思議十四無畏也妙音觀音歎隨德之名也梵音潮音歎隨名之實也以說法不滯為妙音尋聲救苦為觀音音性無著為梵音應不失時為潮音我今啓如來如觀音所說至是則通真實孤山曰口鼻身俱合中知若將身以合方知句居口鼻上其義方順蓋語倒耳携李曰觀音所說即從耳門圓照得真圓通等事故頌其圓照真體隔坦下獨取耳通之真吳興曰此明圓通且寄耳用以顯聞性異於五根也用有時方遠近之量恐未達者謂之無常故有下文明常真實音聲性動靜聞中為有無至身心不能及吳興曰縱令下顯常性也五根皆待意思有無不常惟耳在夢能聞杵音是不為不思而無也其為覺觀乃出乎思惟勝餘根矣溫陵曰動靜有無皆屬聲塵耳根圓離不隨生滅是則常性之真也無聲號無聞指阿難聞鐘事也今此娑婆國聲論得宣明至旋流獲無妄補注曰佛命文殊於二十五行選簡當根使阿難開悟文殊說偈對佛至此簡根既舉下乃宣告阿難以及大衆發明旋倒聞機反聞自性之說後至誠如佛世尊下復結歸對佛之辭以終偈焉溫陵曰聲論者依聲論明本聞自性以覺迷本循聲妄取淪替者如阿難者徒事強記誤落邪思豈非為循聲之所流轉邪使能旋流返聞則無妄淪矣娑婆學者多徒事強記落邪淪妄不知返本故託阿難以警之阿難汝諦聽我承佛威力至何不自聞聞孤山曰將聞等謂將汝循聲之妄聞以持諸佛之言教何不反聞自性以求解脫上聞能聞之智下聞所觀之理溫陵曰金剛如幻三昧即觀音如來所受如幻聞熏聞修金剛三昧也三世諸佛皆從此出故名佛母佛佛謂佛之佛性也聞聞謂我之聞性也阿難護持諸佛祕藏而空畜多聞不能反悟故責阿難空持佛佛不自聞聞意使從聞思修入三摩地者務在反聞自性也聞非自然生因聲有名字至六根成解脫吳興曰上既警其自聞今乃略示修相先指妄聞非無緣生生必藉因因即聲教當以三慧旋此根境俱令脫粘所脫既銷則能脫之慧復何名狀吳興曰聞耳根也聲耳境也根因境有皆則妄塵故應旋而脫之而無能脫者斯返真源一源返真六皆脫妄矣見聞如幻翳三界若空華至誰能留汝形携李曰見聞為根三界為塵聞復則翳根自除塵消則覺心本淨溫陵曰見聞幻翳通指妄根也三界空華通指妄境也以皆妄故聞復則翳除塵銷則覺淨所以一返源而六解脫也淨極光達寂照含虗根解脫也却觀世間猶如夢事境解脫也然則摩登正為夢境了不可得誰能留汝使不解脫哉如世巧幻師作諸男女至諸幻成無性吳興曰幻師辟真如幻作辟隨緣真妄和合變成六根如諸男女一機即耳根也應以旋聞聲脫為抽携李曰幻師妄性也一機妄識也性由識動故息機歸寂則諸幻無性而各解脫也六根亦如是元依一精明至明極即如來吳興曰一精明合前幻師妄為能依真為所依分成等合文可見孤山曰塵垢等二句登圓初住餘塵等二句從分至極携李曰一精明識精也六根因之與塵和合而幻作諸妄故一處休復六皆不成而想塵識垢應念消亡得妙圓通矣細惑未盡曰餘塵分證未滿曰餘學惑淨明極即如來矣大衆及阿難旋汝倒聞機至非惟觀世音真際曰涅槃門者出生死證真常要道也三世果人莫不由此故未來學人當依是法溫陵曰能旋倒妄反聞自性必資此性成無上道此圓通法門實效也誠如佛世尊詢我諸方便至淺深同說法孤山曰如即律失明而旋見畢陵觸刺而遺身烏芻厭欲而登覺持地待佛而銷塵皆即己事而已吳興曰謂此方所有於諸方便而得悟者由佛之力也荀他土以餘根為利耳根為鈍者反顯可知溫陵曰成就不生不滅涅槃妙心惟耳根為最餘則佛之威神加被令即己事而捨塵勞非始終長修淺深同說之法也欲令其長修同說無如觀音法門矣頂禮如來藏無漏不思議至真實心如是偈文止此長水曰如來藏即一體三寶具足無漏性功德故真實心者文殊指已選圓通之心也泐潭曰結讚聞熏三時真如來藏無漏法門勸使未來依此修證可超餘三昧真實心要如是而已於是阿難及諸大衆至明了其家所歸道路長水曰阿難等方悟圓通從耳根入猶未有證故云明了其家所歸道路吳興曰第三卷阿難偈云銷我億劫顛倒想不歷僧祇獲法身洎第四卷請入華屋前云聞佛示誨疑惑銷除心悟實相至第五卷如來偈後云心目開明歎未曾有及請圓通又云我等今日身心皎然快得無礙以前兼此凡經五番彰灼領悟圓師判此為阿難增道理必然矣應知經家指妙覺菩提涅槃為家真修耳根圓通為路若不爾者慶喜之性幾乎檮昧也阿難整衣服於大衆中至於菩提心得無退屈溫陵曰阿難將以是法度人恐末劫多難邪魔妄作易退覺心難入正定故請攝心遠魔安立道場清淨軌則爾時世尊於大衆中至汝今諦聽當為汝說孤山曰戒定慧學大小均修示以决定進修之旨阿難大衆唯然奉教至是則名為三無漏學携李曰此下別示四重則十戒之初淫盜妄四波羅夷為根本重罪所謂其心不淫其心不偷等者皆使無思犯也攝持軌則莫尚乎此溫陵曰三藏之中毗奈耶律藏也此大小乘戒通稱也不乘稟法為戒粗治其末大乘攝心為戒細絶其本法戒則無犯而已心戒則無思犯也夫能攝心則定由是生慧由是發三者圓明則諸漏永盡故名三無漏學阿難云何攝心我名為戒至各各自謂成無上道孤山曰能持則出纏犯則落邪魔矣孤山曰犯四重禁罪在地獄今以修禪之功且落魔鬼等道若約未來輪轉明應備歷三途行簡子曰此合下二節示衆生以斷淫修禪溫陵曰衆生皆因淫欲而正性命故纏生死若欲愛乾枯則殘質不續矣魔亦多智修禪為不斷淫故不成聖道帶淫修禪必落此類我滅度後末法之中至第一決定清淨明誨資中曰觀阿難起教示遭邪染而厥初發心先厭欲濁至於三漸次中一一首懲然後身心妙圓獲大安隱十信初心由欲愛乾枯而慧性圓明遂階等妙世人心不流逸澄瑩生明漸乎六天是故真修內攝必先離欲溫陵曰諸經戒殺居首為設化以慈悲為本此經淫戒居首為真修以離欲為本蓋欲氣粗濁染汙妙明欲習狂迷易失正受續生死喪真常莫甚於此故須首戒而為清淨第一明誨也是故阿難若不斷淫至不如此說即波旬說長水曰以金為器器皆金以土為器器皆土即沙石之類溫陵曰機者淫心所自發斷性不無觸機則發矣波旬魔名携李曰本質不美求冀謾勞阿難又諸世界六道衆生至食衆生肉名為釋子行簡子曰此合下一節示衆生以斷殺修禪吳興曰五淨肉者律明三淨不見為我殺不聞為我殺不疑為我殺今言五者加自死鳥殘二也涅槃九種淨肉即於三淨各開正罪及前后方便也溫陵曰不見不聞等為五神力所化本無命根名淨此乃小乘權宜若真慈真脫皆在所斷婆羅門淨行通稱也西方四姓以婆羅門為上故彼五天志號婆羅門國僧亦號為婆羅門也溫陵曰汝負我命我還汝債所以相續殺心不除下謂帶殺修禪必墮神類孤山曰問諸律並明魚肉為時食惟楞伽涅槃及今經悉唱斷肉何邪答說法被機事有頓漸定慧既爾戒律亦然故梵網頓制對別圓機久斷食肉但鹿苑以來毗尼漸制對藏通機故開三淨化道將終則收漸歸頓於是三經俱唱斷肉楞伽且制藏通菩薩此經則兼制三乘故下云清淨比丘及諸菩薩不踏生草等洎至涅槃更獨制聲聞殷勤告示矣携李曰淨肉又除人蛇象馬驢狗獅子孤猪獼猴十種之外蓋此十種縱不見不聞而殺亦不可食也汝等當知是食肉人至不如此說即波旬說溫陵曰修禪避罪反乃行殺塞耳避人反乃高聲是欲隱彌露也不故踏不故仁慈之至猶及草木况食衆生肉耶阿難又復世界六道衆生至各各自謂成無上道溫陵曰不與而取皆為偷盜分越所酬猶徵其剩况乃盜此得無反徵此前以生死相續也携李曰邪道奸欺故偷者必落鬼類我滅度後末法之中至無量衆生墯無間獄肇法師云乞食略有四意一為福利衆生二為折伏憍慢三為知身有苦四為除去滯著今經令其捨貪不自熟食即徐去滯著也成菩提道即衛護道力福利衆生也知身為倘寄知世為旅泊無事畜藏無所顧戀皆所謂循方也不能循方而貪叨造業是敗法毀則故號賊人溫陵曰方法也僧祇律云乞食謂之分衛謂分施衆僧衛護道力汝教世人修三摩地至不如此說即波旬說行簡子曰此合上二節示衆生以斷偷修禪也行簡子曰此下尚有大妄語戒不録溫陵曰初標三學而終止四戒者定慧已備前文也大佛頂如來密因修證了義諸菩薩萬行首楞嚴經第七阿難汝問攝心我今先說至一切魔事云何發生携李曰四律為本餘戒為末真際曰口四即妄言綺語等四也然則前妄語謂大此妄言即小或舉總數耳溫陵曰內攝為要故先說妙門先持四律四律潔淨則枝葉不生緣塵不偶而魔事潛消正定可入矣心三即意三備舉十重也且汝宿世與摩登伽至揚于順風有何艱險溫陵曰登加淫質猶能速證聲聞道器固易冥資也云何合作何况携李曰塵辟宿習風如神呪順風揚塵散之則易誦呪除習脫之匪難吳興曰愛心永脫指初聞呪得阿那含也成阿羅漢指前文殊簡圓通後也若爾由聞法故方成無學何謂神力冥資邪良以密承呪力顯藉法音內資外薰乃能速證若但因呪而不因法者何故前云性比丘尼聞說偈已成阿羅漢阿難白佛言世尊至合土成泥以塗場地溫陵曰請問結壇軌則之詳也言自知修證等者知呪力冥資聖果可期也長水曰雪山牛乳純是醍醐所有茹退最為香潔吳興曰壇為建設之基信為入道之本雪山白牛取純淨也孤山曰夫欲取如來寂滅場地必本於廣大信心而資乎淨智妙善以養成純一大根充實遺餘猶足以合法香冠十度故可以嚴成寂滅場地上信大根有不可得則求其次焉故取中中信心雖未能冠乎十度萬行而能具之者亦可以嚴成溫陵曰法王法言即事即理法不孤起事不唐設如華嚴一字法門書海墨而不盡五位行相即世諦以彰明況所設施必有取像則此壇場用度無非表法也山為高土雪山純淨上信也大力白牛純淨大根也香草清水妙善淨智也茹退充實遺餘也上旃檀為十香之首十度之總萬行之冠也原為平土中信也地皮未淨也五數之中黃色之中取中中淨信也十香十波羅蜜法香也細羅為粉推之以為微妙萬行也方圓丈六為八角壇至水中隨安所有華葉泐潭曰八角丈六之制表四果四向由十六心見道也長水曰壇者除地為之即今之墠也吳興曰不爾上言場地可如其墠今既名壇必須起土為之是則先除地為場後別取黃土和香為泥於其場上以泥塗起令成壇相也溫陵曰壇寂滅坦實之體也體具分正故為八角為攝八邪故方丈六壇心蓮華中道妙行也蓮之為物華實同體染淨同源表妙行大致也用金銀銅木所造者表妙行云為也金銀百煉愈精而不變銅剛而能同義之像也木能上草以覆其下仁之像也鉢為應器表隨量應物也露為陰澤以秋降八月秋之中也水中花葉即仁覆之行隨澤所施此又隨量應物陰利潛化之表也取八圓鏡各安其方至純燒沉水無令見火資中曰鏡外即正智之外方便建立使邪正相攝德行相熏庶久而相化兩忘邪正也純燒沈水無令見火者反德藏用滅伏覺觀然後能契寂滅場地也溫陵曰圓鏡大圓鏡智也各安八方圍繞華鉢者智行相依隨方圓應也鏡外蓮華香爐各十六而間設者華表妙行香表妙德也每以食時若在中夜至燒令煙盡享佛菩薩資中曰藥王然身先服兜樓婆香意故取沐炭携李曰夫居寂滅場餐采禪悅者於此宜盡心焉溫陵曰佛以日中受食故每以日中致享中夜例日中也蜜成於華表和融法行也酥成於乳表和融法味也半為中數三為成數小香爐方寸覺心也以香沐炭發覺之法也然令猛熾投酥蜜於炎爐燒令煙盡者行法既成不可終滯當於覺心勇猛煅煉使習氣併鑠緣影俱亡豁然如所謂紅爐點雪者然後為佛所享又取八鏡覆懸虗空至使其形影重重相涉真際曰諸佛衆生身土相入不勞動步不待擬心法法遍周事事無礙舉目千聖齊現觸處萬象昭然一花一香遍供塵剎一行一相充擴無窮不假神通不涉情謂寂場法法本如是也密因修證妙極於此溫陵曰壇中之鏡混物而有依行人之智也空中之鏡離物而無依諸佛之智也混物有依者方能照物未能照已必得乎離物無依住智交相為用然後物我互照心境雙融阿難若此比丘本受戒師至汝問道場建立如是溫陵曰得須陀洹者謂得入聖流非指小果也吳興曰壇法行相此土末世行之惟艱然所誦呪下文亦許不入道場故使有緣隨器受益孤山曰陀洹按位即圓初信若依涅槃乃是初入別圓地住也苟不然者豈得自知成佛不謬邪溫陵曰從第四卷中請入華屋以來齊此通名修道分下文別起名證果分阿難於證果分初獨問修證地位世尊答文首敘十二類生而後明五十七位者意使一切衆生依此法門從凡入聖重重研極至盡妙覺成無上道而後已阿難即從座起而白佛言至云何名為等覺菩薩真際曰言四十四心者謂十住十行十向四加行十地也而下佛答之文有五十四心者於初住中橫開十信合之祇是初住不同餘經似位十信則今乾慧已是合餘經十信立其總名也孤山曰阿難所請斯有二意一者既受行門必有位次如得門入宅須知堂室淺深是故請之二者經初佛語阿難心言直故如是乃至終始地位中間永無諸委曲相前解行圓融則心言直矣地位無曲未知其相因此請之爾時世尊讚阿難言至斯則如來真三摩地溫陵曰生滅真妄菩提涅槃皆所謂諸名相也妙性之中本來圓雜由迷妄相因故有修有證於是轉不覺而依菩提轉生死而依涅槃名二轉依號携李曰欲修正受先識妄因故說二種顛倒以明流轉之本携李曰前明三種相續此明二顛倒因乃開合言之下云熏以成業即攝業果但前明生起之相此明修斷之要義同意別也吳興曰前世界相續惟在依報謂四大因起等今世界顛倒蓋指正報即十二類生也所以然者由前答富樓那問云何忽生山河大地故今答阿難修三摩地所入地位故何則位由悟入悟必由迷迷之為凡悟之為聖皆正報之事非器界之相故異前說也修三摩地能識倒因乃能斷治倒妄不生則復正性故曰斯則如來真三摩地阿難云何名為衆生顛倒至建立世界及諸衆生吳興曰本此無住者住即依也推本至末了無所依也此文總示二倒句下別明方分兩相今單標雙結者以約衆生說世界故溫陵曰性明心指真如體也性明圓言不守自性也由其不守自性故因妄明而發妄性因妄性而生妄見於是從無相真成有相妄故曰從畢竟無成究竟有然此能有所有能住所住悉皆非因所因悉皆無根本文互見也本此無住建立世界衆生則知二者無因無木全即倒妄而已迷本圓明是生覺妄至由是故有衆生顛倒吳興曰將欲復真等此舉順修況顯逆修以明顛倒之相謂若圓觀真性欲求於復斯則已非真真如性何者以除真如外凡有修入皆屬於權故圓覺云未出輪回而辨圓覺彼圓覺性即同流轉順修尚爾況逆修乎長水曰生滅淫欲故相生殺盜故相滅溫陵曰因迷本性故欲復真然希欲心生自已失真故曰欲真已非真真如性也以非真而求復於真則宛轉成妄故曰宛成非相遂使生住心法百非競發展轉重感故衆相競生焉無而忽有曰生生而暫停曰住緣慮相續曰心染淨差別曰法衆生顛倒由是發生也阿難云何名為世界顛倒至變化衆生成十二類溫陵曰承前此有所有非因所因以明之有所有故有分段有分段故有方位界為方位故因此界立也無所因則無所住無所性則常遷流世為遷流故因此世成也以世涉方以方涉世俱成十二所以衆生正報因果和合亦成十二故涉平其間者悉從其變此世界顛倒之由也孤山曰從畢竟無成究竟有故有東西南北之分段指此分段名之為界然其所有本無其因故云非因所因此惟妄住故云無住所住既非真性常住則有過現未來遷流不住三世成矣以世涉方以方涉世俱成十二所以衆生正報因果和合亦成十二也吳興曰第四卷方世相涉加流變三疊彼對依報顯於正報六根功德各千二百也此中相涉以依從正明世界顛倒立十二類生也即前云功德此云顛倒古師用此釋前三疊者其可順乎是故世界因動有聲至窮十二變為一旋復吳興曰此就聲塵當體為因從因聲有色至因味知法則展轉相因以顯六亂之相也最後知法者知即意根法即法塵以後例前則有聞聲見色等義况云六亂妄想是知聞覺知見皆歸妄想孤山曰萬物皆從流動生形動則有聲形即色也故曰因動有聲因聲有色香味觸法皆相因而具焉由此六境發起六情名六亂妄想正為惑業之本故名業性十二類生因此輪轉也世間聲香味觸牒上六亂妄想之類也謂其區分既各十二窮變亦各十二故六亂妄形自無明緣行而變以至老死終而復始故曰窮十二變為一旋復乘此輪轉顛倒相故至若非有想若非無想泐潭曰明業惑果三而卵生胎生等即果類也補注曰此總標也由十二區分窮變旋復故輪轉顛倒各具十二而變化衆生成十二類也阿難由因世界虗妄輪回至人畜龍仙其類充塞吳興曰依㲉而起曰卵生含藏而出曰胎生假潤而興曰濕生無而忽有曰化生如是四生由內心思業為因外㲉胎藏濕潤為緣藉緣多少而成次第卵生具四所以先說胎生具三濕生具二化生惟一謂思業也此依瑜伽所解溫陵曰卵惟想生虗妄即想也想體輕舉名動顛倒卵以氣交名和合氣成想多升沈名飛沈亂想故感魚鳥飛沈之類也十二類各八萬四千者各由八萬四千煩惱感變也羯邏藍云凝滑入胎初位胎卵未分之相也胎因情有雜染即情也情生於愛名欲顛倒胎以精交名和合滋成情有偏正名橫竪亂想故感人畜橫竪之類遏蒲曇云皰即胎卵漸分之相也虗妄雜染執著留礙等有情皆具但隨偏重者感類耳携李曰依㲉而起曰卵生携李曰含藏而出曰胎生由因世界執著輪回至含蠢蠕動其類充塞泐潭曰假潤而興曰濕生蔽尸云軟肉濕生初相也既不入胎故無前二位矣十生皆本於淫欲起於情想以迷情愈妄故化理愈乖以至蕩為空散頑為木石妄末雖殊妄本一也溫陵曰濕以合感執著即合也合由愛滯觸境趨附名趣顛倒濕以陽生名和合暖成所趣無定名翻覆亂想故感蠢蠕翻覆之類也由因世界變易輪回至轉蛻飛行其類充塞泐潭曰無而忽有曰生羯南云硬肉蛻即成體軟相也下皆稱羯南者諸類通稱止此若第五鉢羅奢佉曰成形則各隨狀貌非通稱也孤山曰無而忽有之化如蠐螬蟲脫換故皮欣取新質意欲飛騰故云轉蛻飛行也溫陵曰化以離應變易即離也離此託彼名假顛倒觸類而變名和合觸成轉故趣新名新故亂想故感報亦爾蛻脫故趣新也如蟲為蝶則轉行為飛如為蛤則蛻飛為潛凡以不同形而相禪皆轉蛻也由因世界留礙輪回至休咎精明其類充塞溫陵曰一切精明神物皆情耀也其想已結成精耀故但有色而已涅槃云八十神皆因留礙想元成此精耀此雖至精至神亦未離乎乘彼輪轉顛倒相也携李曰此有色者精耀留礙即業果之色故有休咎吉凶之殊資中曰事日月水火和合光明堅執不捨障隔不通名為留礙精明顯著因此受生故名色相星辰日月吉者為休凶者為咎至于爝火蚌珠皆是此類由因世界銷散輪回至空散銷沉其類充塞資中曰此有想無色而不成業體故亦稱羯南又有惑業昏重形色銷磨體合空昧識附陰隱亦空散銷沉類也溫陵曰厭者著空滅身歸無名銷散輪回迷漏無聞名惑顛倒厭有歸無則依晦昧空故和合暗成而名陰隱亂想即無色界外道類也由因世界罔象輪回至神鬼精靈其類充塞溫陵曰虗妄失真邪著影像無所託相從憶想生於罔象中潛結貌狀其神不明而幽為鬼精不全而散為靈無有實色但有想相資中曰蹈跡附影之類皆從憶想所生論因或如外道凡夫詞禱神明託附形像終身奉事志慕靈通因果相酬故生其類由因世界愚鈍輪回至化為土木金石其類充塞溫陵曰不了諦理則頑冥無知而精神化為土木金石也携李曰知精神化為土木金石無復情想即枯槁也如劫毗羅之石燕昭墓之木鄭人緩之此皆精神之化也資中曰外道計無情有命金石堅牢或習定灰凝思專枯槁心隨境變遇物成形如華表生精黃頭化石之類是也由因世界相待輪回至以蝦為目其類充塞溫陵曰水母之類以水沫為體以蝦為目本非有色待物成色不能自用待物有用迷失天真綿著浮僞彼此異質染緣相合故曰因依資中曰和合巧僞改故作新或假託因依𮞏為形勢資身養命業果相循不從自類受身故名非有色相等有情身內八萬戶蟲並是此類由因世界相引輪回至呪詛厭生其類充塞溫陵曰邪業相引使性情顛倒而乘呪託識不由生理妄隨呼名即世間邪術呪詛精魅厭物因而有生者也資中曰有一類生因聲呼名引發性成如蝦蟆等以聲附卵論因或是樂為淫聲習以生著從自性類不假他成名非無色相藉聲誕質故云無色由因世界合妄輪回至異質相成其類充塞溫陵曰二妄相合性情罔昧異質相成生理回互如彼蒲盧本為桑蟲非有蜂想而成蜂想資中曰誣罔取他納為己有名罔顛倒背親向義寄死託孤忘本蒸嘗認彼宗嗣是其因也吳興曰以異質故非有想相以相成故成想羯南由因世界怨害輪回至皆遭其食其類充塞孤山曰土梟破鏡孟康曰梟鳥名也食母破鏡食父黃帝欲絶其類使百物祠用之破鏡如貙而虎眼今云鳥者恐譯人誤或鳥字合是等字後人妄改耳溫陵曰怨害相酬傷殺相反生理怪誕棄絶倫義故感土梟之類因土塊毒果成形非無鳥想而本無想也資中曰父母有愛名非無想相怨無有愛故云無想問既是怨對無感生緣何得用附而生怨中有愛答如畜猪羊貪殺故養豈非怨中亦有愛乎是名衆生十二種類溫陵曰此皆不了妙覺明心迷陷情欲積妄發生望隨輪轉非正修行莫能免脫故下文示以除妄修證之法焉
