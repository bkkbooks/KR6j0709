body:
  text: 太史園焦竑弱侯父纂太史如岡陳懿典孟常父校大佛頂如來密因修證了義諸菩薩萬行首楞嚴經第一補注曰梵語首楞嚴乃大定之總名也此翻一切事究竟堅固溫陵曰如來果體其體本然何假密因菩薩道用其用無作孰為萬行無因無行無修無證無了不了大小名相一切不立此真首楞嚴畢竟堅固者也特以衆生如來隱於藏心非密因不顯衆生菩薩淪於七趣非萬行不修覺皇於是示之以大法使不迷於小道而默得乎無外之體喻之以佛頂使不滯於相見而妙極乎無上之致指如來密因使明本妙心知三世諸佛皆依此為初因明修證了義使悟究竟法知一切聖人皆依此而證果乃至具足菩薩清淨萬行一切事法無不究竟至於實相堅固不壞故名大佛頂如來密因修證了義諸菩薩萬行首楞嚴經即能詮之文而已詮猶筌也知經為筌則從而釋之者皆筌也非魚也學者慎勿執筌鳥魚然後首楞真經可得矣古師云未修此定一切事法宛爾差殊為法所縛得此定時山河大地明暗色空一切事法當處寂滅即時常住心故云究竟堅固韶國師云心外無法滿自青山亦此義也如是我聞至與大比丘衆千二百五十人俱溫陵曰室羅筏或云舍衛新翻豐德以國豐四德一貨財二欲境三多聞四解脫孤山曰如是之法我從佛聞室羅筏乃舍衛也祇云祇陀華言戰勝乃太子生時與外國戰勝因以立名桓即林也精舍即須達買園造立精舍以施佛者比丘含三義乞士破惡怖魔也長水曰千二百五十人者初度陳如等五人次度三迦葉兄弟兼徒一千次度舍利弗目犍連各兼徒一百次度耶舍長者等五十人經舉大數故減五人此衆並先事外道勤苦纍劫一無所證才遇佛即得上果故感佛恩常隨佛化為常隨衆也皆是無漏大阿羅漢至拔濟未來越諸塵纍凡經序衆皆隨緣起此經以阿難起教示墮淫室疑若未能住持佛法善超諸有虧威儀汙戒律不堪遺囑度生濟未來故因歎同列之德以顯阿難示迹實無虧汙意在濟也孤山曰無漏者內冥中道不漏落二邊也準涅槃四依品十地菩薩名阿羅漢溫陵曰華嚴歎衆住一切菩薩智所住境護持諸佛正法之輪所謂佛子住持也法華歎衆盡諸有結心得自在所謂善超諸有也能於國土成就威儀者隨剎現身正容悟物也從佛轉輪妙湛遺囑者道能助化德足利生也而又嚴毗尼而作範示應身而度生意非利彼一時直欲拔濟未來使皆超諸有塵纍耳此阿難同列之德也其名曰大智舍利弗至優波尼沙陀等而為上首孤山曰諸經列名不同尚年臘則先陳如尚聲德則先鶖子今從尚德之例也長水曰舍利此云鶖也弗即子也其母名舍利以其眼黑白分明轉動流利如之故連母為名目犍連姓也此云采菽氏名拘律陀此云無節樹摩訶拘絺羅此云大膝乃舍利弗之舅常論勝姊姊懷鶖子論即不勝知懷智人寄辨母口遂往南天學十八經無暇剪爪號長爪梵志學畢還家而甥已為佛弟子起大憍慢往佛所奪之佛令立論義墯負愧得法眼淨成阿羅漢獲四辨才富樓那父名此云滿彌多羅尼母名此云慈今連父母名名云滿慈子須菩提云空生生時庫藏皆空占者云既善且吉故亦云善現善吉優波尼沙陀此云塵性空弱侯曰衆有千二特舉六名者表入法大旨也行簡子曰塵性空者謂於六塵中了悟色性也復有無量辟支無學至文殊師利而為上首吳興曰并其初心正似師徒共集實部行也長水曰辟支具云辟支迦羅此云獨覺亦云緣覺獨但自悟緣依教悟獨覺自分二類孤山曰自恣律開三日七月十四十五十六也溫陵曰自有愆失恣任僧舉曰自恣九旬禁足莫由覲佛故於休夏恣決心疑自恣決疑皆所以考九旬德業也欽奉如來而稱慈嚴者慈以恩言嚴以威言宣示深奧所以為楞嚴發起如法華以無量義為發起也伽陵頻伽仙禽也其音和雅佛音如之文殊此云妙德表根本智楞嚴會上為擇法眼故居上首也溫陵曰經所謂獨覺其利根者曰麟喻喻麟之獨出無佛世觀物變易自覺無生其鈍根者曰部行亦出無佛世部黨而行師徒訓化也緣覺依佛教觀十二緣作流轉還滅二種觀法者也時波斯匿王為其父王至兼復親延諸大菩薩孤山曰波斯匿此云勝軍溫陵曰匿王舍衛國王也宮掖王之內庭也於內庭延佛敬之至也城中復有長者居士至一切衆生無量功德長興曰剎帝利王族旃陀羅云殺者即屠膾淫酒之家溫陵曰其敘其誤墯淫室之由也律制僧遠出侶須三人一上座一軌範師所以嚴行止防誤失也鉢曰應器最後檀越謂未飯僧者平等之慈於己等心而化使彼等心而施於食等者於法亦等所以能成無量功德爾時阿難因乞食次至淫躬撫摩將毀戒體㩗李曰摩登者即穢而徹賤阿難既無揀擇所以誤墯也長水曰摩登加義翻本性下經云性比丘尼是也溫陵曰摩登伽妓女也娑毗迦羅此云黃髮外道所傳幻呪名先梵天實妖術耳淫躬憮摩將毀戒體者以身逼近將毀淨戒之體也後云心清淨故尚未淪溺則將毀而已如來知彼淫術所加至及摩登伽歸來佛所補注曰一經大分準常為三一序分二正宗分三流通分序分齊此下文為正宗分蓋阿難返省前非啓請妙奢摩他等正是正宗之發端也資中曰如來常儀受請齋畢皆為説法今既速歸必有所為溫陵曰頂門為無上果光有百寶色謂之無畏者能攝魔外物無以勝也世尊不自説呪而於頂光化佛説者示此呪乃無為心佛無上心法也真際曰環師於正宗一分又科為五初見道分始於此而止於第四卷中二修道分始於第四卷中而止於第七卷三證果分始於第七卷末而止於第八卷中四經分在證果分後五助道分始於第八卷中而止於第十卷末正宗文竟遂入流通而卷終焉阿難見佛頂禮悲泣至遐坐默然承受聖旨補注曰奢摩他等三名乃楞嚴大定之名也昔孤山嘗用天台三止配之一曰體真止止於真諦二曰方便隨緣止止於俗諦三曰息二邊分別止正於中道第一義諦以止屬於定故也溫陵曰奢摩他者寂靜之義也三摩者觀照之義也禪那者寂照不二之義也義立三名體惟一法舉一具三言三即一三互融故謂之妙如是妙修方曰楞嚴大定此乃一經之要旨趣理之玄門阿雖昧之是以遭難至是始以多聞小慧為限而以楞嚴大定為請雖以大定為請然如來下文所示別無其方始則決擇真妄次則真妄和融乃至會通藏性深窮萬法直至第四卷中皆是發明究竟之圓理而已蓋此圓理乃大定之本也吳興曰最初方便者阿難所請有通有別通謂奢摩他等是諸佛成道之法也別謂最初方便即當機發行之由也佛告阿難汝我同氣至是以渴仰從佛剃落孤山曰見相實有生滅宛然緣此發心安趣常果故下經云若於因地以生滅心為本修因而求佛乘不生不滅無有是處溫陵曰阿難此云慶喜斛飯王之子如來成道夜生淨飯既聞太子成道斛飯又奏宮中生男舉國欣慶因名慶喜是佛堂弟故云同氣共本也天倫兄弟也吳興曰阿難既厭多聞而欣妙定如來欲談是義先詰妄緣故門發心見之由為止散入寂之本迷解之要並在于茲補注曰阿難見相乃緣塵分別之見其所發心即妄想攀緣之心後文七徵八辨重重逐破者此也佛言善哉阿難汝等當知至此想不真故有輪轉資中曰體性堅凝不涉塵妄名常住真心妙圓離垢無諸昏昧名性淨明體衆生由不自知常心妙體妄纏愛想故有輪轉孤山曰常住真心即下文如來藏心圓融三諦也用諸妄想謂九界衆生不達此三本無一念於是六趣見其俗二乘見其真菩薩見其中皆由不了圓融妄生取著故致輪轉二種生死汝今欲研無上菩提至故我發心願捨生死長興曰道固坦直因妄而曲將曲研窮正道革去倒妄故以直心言之直則道可徑造矣一道謂皆以直心也此因發其病而藥之也用我心目便生種種妄想泐潭曰此正陳妄體也目即眼根心即意識根識虗妄猶如空花若執有體能見能樂豈惟迷於法空亦起我人見愛故後文云六為賊媒自劫家寶無始虗習住地無明皆由根識更非他物想相為塵識情為垢生死輪轉莫不由斯故下推徵令知虗妄㩗李曰問誰為愛樂窮妄本也答因心目顯妄本也佛告阿難如汝所説至惟心與目今何所在泐潭曰妄心妄見本無實體由攀緣起是謂無始生死根本故須識其所在孤山曰王譬真心賊譬妄想真為妄轉如國被賊侵發兵討除喻修大定汝合國王心目合賊阿難白佛言世尊至如是識心實居身內自此至第三節是阿難以心在身內佛以不見腑臟為破溫陵曰謂心在內目在外自衆生至如來阿難皆然文宜見也異生有十二類除土木空散非心眼倫也補注曰浮根四塵言眼也詳見第四卷中真際曰眼根外浮假地水火風四塵以成及其散也復歸於塵故以塵名佛告阿難汝今現坐至故我在堂得遠瞻見吳興曰在內之心必應見內故以堂中先何所見為問溫陵曰定內外境欲明在內之心當次第見定先後見欲破在內之心不先見內汝矚等皆且引事辨定下乃牒破佛告阿難如汝所言至住在身內無有是處補注曰前文雙呈心目所在今乃先破妄心雖曰破妄心而但言此心無有處所却不顯言此心妄者要引阿難處處推呈令其情盡而理窮也由是直至七處徵心之後始告之曰此非汝心等然則七處逐破者且破妄心無所在也溫陵曰心在身內合見身中頗猶可也引衆以問決不能也心胃內藏縱不能知爪脈外浮云何不曉既不內知果非在內矣阿難稽首而白佛言至云何一人能令衆飽自此節至第二節是阿難以心在身外佛以身心相離破之補注曰前云受請今言從我乞食者提獎阿難在赴請日為彼演法事應隔宵故指即日循乞為例我已宿齋者即我一人已飽也溫陵曰一人不能飽餘人者喻外心不能知身也溫陵曰因破非內復生妄計謂心在外彼食不能飽此則外心不能知身矣宿預也食有四種摶即段也有形段可摶取揀非思食識食等也佛告阿難若汝覺了至住在身外無有是處吳興曰兜羅此云細香其綿色如霜佛手柔軟如之孤山曰見手在目分別在心則心非外明矣溫陵曰身心相外下辨非外也我今示汝下驗非外也阿難白佛言世尊至無障礙者潛根內故自此至二節是阿難以潛根內為詞佛以乖琉璃籠眼之喻破之長水曰眼見琉璃心不見眼縱能見眼眼即成境根既成境豈能隨即分別長水曰琉璃喻根眼喻於心眼根色淨不礙於心同琉璃碗不礙於眼隨照一境心隨根知佛告阿難如汝所言至如琉璃合無有是處泐潭曰不成隨者前云隨即分別今眼為所見則隨義不成真際曰此責阿難有法喻不齊之過喻見琉璃法不見根縱許見根根即是境若是境者不得言隨以前文云彼根隨見隨即分別故溫陵曰事理俱違非潛根矣阿難白佛言世尊至名為見內是義云何泐潭曰白虎通云五臟即肝心肺腎脾六腑者即五臟之宮府也胃為脾之府膀胱為腎之府三焦為命之府膽為肝之府大小腸為心府肺府也吳興曰初計心在身內佛以不見腑藏為破次計在外復招身心相離之難又計潛根且乖琉璃籠眼之喻今立內外欲免前三之過也何者良以有藏則暗故見暗時即名為內何必須見內之物耶有竅則明故見明時即名為外豈應更責外不相干耶內外若成自顯此心不在一處亦異潛根也然則雖云見外所執心體還成在內以開眼見明不同燈在室外故溫陵曰復計心在內故以見暗為見腑藏也下約三節破之佛告阿難汝當閉眼至若不對者云何成見泐潭曰有五神之藏六化之腑三焦即六府之一能化五穀分潤腠理有上下清濁之別故曰三焦溫陵曰汝當下問之若與下難之若不下結也若離外見內對所成至若不見面內對不成此謂眼但外見無容內對若可內對開眼時何不見汝之面乎溫陵曰眼前之境名外見身內之境名內對前以對眼為外不得成內今縱離外見而成內對即是眼能返觀且合能返觀身中則開應返觀己面若不爾者義不成矣見面若成此了知心至名見內者無有是處溫陵曰展轉辨明無返觀理也吳興曰是故應知下不可言見明為外者略也又見外為成見內今從正計結也携一曰汝眼已知身合非覺者既在虗空自非汝體也若執兩皆有知則成兩體矣阿難言我嘗聞佛至亦非內外中間三處真際曰此蓋即心是境即境是心也孤山曰心生法生境從心起也法生心生心逐境遷也興福曰阿難識一念之妄則變起根身器界是心生法生也又以境界風動則識浪騰起是法生心生也溫陵曰以心法相生則隨境思惟即是心體心法合處即為心在佛告阿難汝今説言至若從外來先合見面十九界者首羅長者言我先説四諦法是説不真今為汝更説五諦六蘊十三入十九界阿難聞已尋思法相都無此理溫陵曰以即思惟體為心特浮想耳故難其體之有無也設若無體則空有其名云何隨合如十九界七塵特空名耳設若有體當何所在令挃身而驗明體實無在也挃猶觸也阿難言見是其眼至若見物者云何名死孤山曰阿難此言謂心但能知不可言見曾不悟能見在心徒眼不見也溫陵曰阿難言下解上難也佛言下舉門喻能見在心舉死明徒眼不見阿難又汝覺了能知之心至心則隨有無有是處吳興曰先立四義下詳辨之辨非一體無在謂無定處也辨非多體辨非遍體辨非不遍體溫陵曰當知真心非一非多非遍不遍四義既非則不可謂隨所合處心隨有也阿難白佛言世尊至復內無見當在中間吳興曰此引大教而謬解也長水曰外不相知合云外又相知恐字之誤也溫陵曰以為在內則不見腑藏以為在外則身不相知二義不成當在根境之中佛言汝言中間中必不迷至表體既混心雜亂孤山曰先問下辨溫陵曰此且各就根境辨定中位身即根處即境也若在身者下謂身有中邊二義生邊則不得為中在中則同前在因應見內矣若在處者下亦辨中位無定也表者標物以表顯也混亂則無所取中矣阿難言我所説中至當在中間無有是處真際曰阿難所謂中非身處之中乃根塵之中也資中曰佛言下四句此開其端下境其説溫陵曰若兼二者下破兼二不得為中也物根塵也體心體也物非體知者物不同體之有知則根塵與心兩立無中位矣兼二不成下破不兼不得為中也不兼根則非知不兼塵則非不知二義既非中云何定補注曰環師解物非體知則曰根塵無知心體有知及解非知不知則又以根為有知語似未順今應仍以知屬心體不知屬根塵孤山曰若不兼二則非心又非根塵即無體性矣中何相哉物非體知古人有以體知為根者非也蓋佛言此之心體故阿難白佛言世尊至則我無著名為心不資中曰佛意顯心本無在不應有著阿難又著於無著不免猶存境相所謂攀緣妄情也泐潭曰既非內外中間即知心無所著而不知佛意破妄無體令識本真如云三際求心心不有心不有故妄元無妄心無處即菩提生死涅槃本平等不了此意謬引佛言妄立無著佛告阿難汝言覺知至有不著者不可名無溫陵曰為在為無者問汝心不著而彼物相為存在耶為空無耶若彼空無則同龜毛云何可著而説不著若有不著則為有物故曰不可名無孤山曰在內潛根見內似自性在外似他性中間似共性隨合無著似無因故二遂破之補注曰七徵之文皆且破其妄心無所依處阿難前云隨所合處心即隨有佛即難其心體是有是無是一是多是遍不遍雖似破其隨有之心然既令其挃身以驗則意在破其隨所合處也今指一切無著名之為心佛乃難其世間虗空水陸飛行一切物象為在為無等者亦是就其所依之處破也無相則無非無即相至名覺知心無有是處孤山曰如來七番逐破使分爾妄心無逃避處妄賊既除真王得顯無生之理於茲見矣利根上智已合潛悟但為中下之輦更廣説耳溫陵曰物果無相則同龜毛物果非無即自有相知相有則心有在云何得為無著也吳興曰夫相不自有由心在故有心不自無有相盡故無是以有相而言無著者理不可也爾時阿難在大衆中至令諸闡提隳彌戾車補注曰虗妄浮心緣塵而有本無實體亦無定所上文七番破其妄所意在顯真而阿難未悟故於此重請開示溫陵曰因前徵發乃知迷妄而責躬請教求詣真際真際者真心實際也奢摩他路乃所以詣真際也長水曰闡提即撥無之人隳壞也彌戾車惡見也佛告阿難一切衆生至而不自覺枉入諸趣泐潭曰此世尊因阿難未得無漏不知真際之請故示以二種根本次則舉拳驗見重詰其心引其復認能推然後咄而告之乃至令其微細揣摩體等始是體也溫陵曰衆生業種成聚行人不成正果皆由不知二本錯亂修習故須決擇也業種者顛倒妄惑也惡叉果一枝三子生必同科喻惑業苦三生必同聚也攀緣心即前七處妄認者清淨體即今正與決擇者不染煩惱名菩提不涉生死名涅槃不染不涉故號元清淨體識精陀那性識也元明本覺妙明也根身器界一切緣法依此而生而人者認緣失真故曰緣所遺者由遺此故無明不覺枉入諸趣言元體元明又言本明者自本而出曰元直指當體曰本孤山曰妄情既遣妄境自無而真心真見可明故著意開破之阿難汝今欲知奢摩他路至即能推者我將為心真際曰此因阿難有開示奢摩他路之請故此顯離塵常性以詔之塵謂隨緣分別之見常謂本然自性之體真心終妄故説離塵溫陵曰金拳舉處直下要識本明塵相未除依舊認賊為子資中曰奢摩他路者入實際之門也其義有五一名能滅煩惱故二名能調能調諸根故三名寂靜令三業寂靜故四名遠離遠離五欲故五名能清能清貪等三濁故佛言咄阿難此非汝心至此非我心當名何等携李曰此阿難聞咄而重請開示孤山曰佛言咄者嗟其迷重故叱以語之矍驚愕貌佛告阿難此是前塵至惟垂大悲開示未悟泐潭曰阿難以我乃無心同諸土木不知真我無我靈知無知妙淨明心何所不在吳興曰阿難以對境覺知異乎土木認為我心此則正當人執之相忽聞呵斥故以無情為難爾時世尊開示阿難至性一切心而自無體孤山曰諸法所生惟心所現者因心本具隨緣能造故所造法全能造心依正既是一心一心實無能所譬如水具波性方能造波全所造波即能造水故觀所造惟見本具溫陵曰因其怖謂無心故舉常所説引物以證示有真使知所措也心入無生法忍者令悟實相不滅心也三界惟心萬法惟識故曰諸法所生惟心所現一切因果指十界正報也世界微塵指十界依報也既無不因心成體安得謂之無心同土木哉以本自無染曰清淨染而不染曰妙淨若汝執吝分別覺觀至猶為法塵分別影事資中曰離塵是無本之心不應取著溫陵曰此依六塵辨無自性也分別覺觀即能推心也此心離塵無性不應執以為真覺知滅則意幽間然彼幽間者猶是法塵影事亦無自性也真際曰諸塵事業即色等六塵皆有牽心為緣業用我非勑汝執為非心至其誰修證無生法忍補注曰我非敕汝執為非心等者暫縱之辭也蓋上已破其執吝分別覺觀非真心矣恐其固執而本悟乃復暫縱之曰我非敕汝所執定非真心汝且試將此心微細揣摩以自驗其真邪妄邪孤山曰但汝下勸其揣摩分別之心為當離塵有體為復離塵無體若此妄心離塵有體則容是真心既離塵無體非妄而何應知即真汝心亦暫縱之語非顯真也蓋六塵如形分別無影影由形有故無自體心因塵有豈有體邪長水曰不用緣塵分別為心者塵非常住隨即變滅以此為因安取常果即時阿難與諸大衆至雖得多聞不成聖果補注曰上文破妄心此下破妄見以至會見歸心漸顯真性也原夫妄心本無自性依真發現全體即真所謂破無所破無明即明真無別真一念即是如鏡現像全像是鏡此乃今經之圓旨也長水曰四禪四空及滅受想名為九定從一禪入一禪次第而修然修此定能成無漏今言不得成阿羅漢者此明不得大乘阿羅漢也滅受想亦云二乘滅盡定世尊前云一切衆生不知常住真心用諸妄想今云執此生死妄想誤為真實然則妄想果非真心邪當知法無得失迷悟在人若根利惑薄者了達妄想之體直下便是真心是猶因像悟鏡則無像而不是於鏡因鏡悟像則無鏡而不具於像也今阿難示同於迷大似不識鏡體却認去來之像而執以為鏡不亦誤哉故假重重破斥掃蕩執情使其是非明白然後始可會妄全真也會通之文備見於第二第三卷中行簡子曰説經道為了悟阿難聞已重復悲淚至發妙明心開我道眼資中曰煩惱所知名為二障煩惱障謂根本及隨也所知障亦云智障障一切種智故吳興曰前破妄心但離粗執故請發妙明心將破妄見欲顯真見故請開道眼溫陵曰重述迷因求開示也寂常心者本來常住之心也二障一者事障續諸生死二者理障礙正知見阿難誤墮淫舍是事障未斷也緣塵分別是理障未斷也道眼即真見也由妙明心而發告阿難言吾今為汝至性淨明心得清淨眼泐潭曰生佛等有而不可測知曰妙微密垢不能染暗不能昏曰性淨明見離眚病廓然照了曰清淨眼溫陵曰幢表摧邪立正也下明妙心淨眼使摧伏邪異得正知見是謂建大法幢邪異既摧知見立正則妙心可獲淨眼可得矣阿難汝先答我至阿難言事義相類溫陵曰閻浮檀樹果汁功水沙石成金赩赤焰也眼根例拳事義不類而阿難示同未悟故答言類佛告阿難是義不然至如是見性是心非眼真際曰問相類者以明不類無手則無拳無眼無見所以不類也溫陵曰見暗即見矣是知盲非無見持無眼耳資中曰心為其主餘是助緣既知見性屬心漸明真見矣溫陵曰若燈見者下牒上結明見不由眼也阿難雖復得聞是言至合掌清心佇佛悲誨吳興曰阿難真悟之心未明故下文以客塵主空啓發一場客塵是動主空不動欲將動以譬妄不動喻真下文屈指飛光義亦如是真際曰大衆默然佇誨良由真妄未明若認見境之心前來已奪若謂本真之見豈假根塵口既默然心希開悟時憍陳那起立白佛至名為塵義佛言如是泐潭曰真諦理一以喻從法則主之與空不可分二見思惑異則客之與塵應有二義何則客義粗故喻迷事之惑塵義細故喻迷理之惑吳興曰小乘客塵喻見思生滅主空喻真諦寂然即是如來於大衆中至遺失真性顛倒行事長水曰前明手有開合見無動靜對外境以辨也次於內身自分動靜動中有不動也吳興曰此因阿難謂身境有動見性不動寄斥大衆迷真常而見無常也孤山曰無常有二種謂相續法壞及念念生滅從始洎終蓋言從生至死即相續法壞也既失真性惟造妄業故曰顛倒行事補注曰只一身境所計不同凡夫則計其身境以為實有是於無常而計常也二乘雖知身境無常而尚未悟其真常之理是於真常而計無常也故佛因普告大衆而總責之語意淺深隨機各解性心失真認物為己輪回是中自取流轉吳興曰前云顛倒行事但是為物所轉正斥能迷之心今言認物為己又斥認所迷之境為我我所也如是則塵勞之境何由可出耶故曰輪回是中自取流轉真際曰已上經文雖明見性不動然猶未論此見亦妄離見乃真資中曰此寄粗相密談真見分別顯了並在後文孤山曰圓覺云妄認四大為自身相六塵緣影為自心相即認物為己之説大佛頂如來密因修證了義諸菩薩萬行首楞嚴經第二爾時阿難及諸大衆至證知此心不生滅地携李曰前責以動為身以動為境則身心真妄未辨虗實又實以念念生滅遺失其性則不生滅者亦未能辨故兩問之泐潭曰刪闍多毗羅胝子説於衆生任運時熟得道如縷丸所投極則停住又言八萬劫滿自然得道迦羅鳩陀迦旃延説於諸法亦有亦無則是二人皆執斷見故匿王引旃延毗羅而問溫陵曰前責以動為身以動為境則身心真妄未辨虗實又責念念生滅遺失真性則生滅者亦未能辨故願顯出二義而因匿王發起者明不生滅性在纏皆具佛告大王汝身現在至決知此身當從滅盡長水曰佛舉此問欲顯生滅中有不生滅如前頭自搖動見無所動溫陵曰阿難以身境為動此相猶粗謂見性不動今佛問匿王肉身變壞乃至答云剎那剎那不得停住其相甚微汩談見性吳興曰前示阿難見無搖動後示匿王性無生滅一往似同義須甄別何則所破生滅則粗細有殊所顯見性則近遠成異聖人引物入如來藏其致漸深讀者詳此佛言如是大王至故知我身終從變滅孤山曰佛問兩時答出三時謂孩孺長成衰耄也溫陵曰孩才成孩也孺需人以養者皮表曰膚文理曰腠耄昏忘也一紀二紀以寬數粗觀也自促細觀實念念不停矣佛告大王汝見變化至云何於中受汝生死溫陵曰末伽黎即伽旃毗羅之徒既無生死即汝真常不應惑彼斷滅異論也孤山曰見精即見性也皺者為變則顯生死無常不皺非變則顯涅槃常住生死涅槃雖分兩派克論體性豈有二殊言偏意圓變即非變若然者豈但破匿王引外之見抑亦酬阿難二發之請也長水曰敘其淺悟但云捨生趣生詳彼深意必知滅元不滅隨宜領解未即顯言也爾時阿難合掌長跪至願興慈悲洗我塵垢携李曰此阿難生一顛倒遺失疑問以釋衆生溫陵曰因王問答反動疑塵以謂性有生滅可説遺失既無生滅云何能遺即時如來垂金色臂至而我不知誰正誰倒母陀羅云印手即三十二相之一溫陵曰此明諸佛衆生同一體性固無遺失特依倒見言遺失也如臂順垂為正反以為倒逆竪為倒反以為正是失真也隨汝諦觀汝身佛身至不知身心顛倒所在携李曰世尊意斥阿難認悟中迷即是顛倒所在時衆未達於是瞢然補注曰既知汝等之身號性顛倒且此顛倒名字何從而得耶佛哀愍阿難及諸大衆至寶明妙性認悟中迷長水曰此示倒無別處惟心所現使即心而悟也携李曰諸汝所生惟心所現是本體之悟遺此本悟取之色身是認悟中迷矣溫陵曰色總舉五根六塵也心總舉六識八識也諸緣即根識所緣諸法也心所使即善惡業行靜作思想諸所緣法廣舉山河大地明暗色空真妄性相邪正因果悉無自體惟心所現如鏡中像全體是鏡然則汝今幻妄身心皆是妙明心鏡所現全體是心直不即幻妄而悟妙體反乃遺本妙而執幻妄是認悟中之迷此即顛倒所在也妙心則一而稱謂多異者依法隨用之異也此明心所現物如鏡故稱妙明真精也又明迷本逐末故稱本妙明心所謂本妙者本來自妙不假修為也心之與性乃體用互稱也心則從妙起明圓融照了如鏡之光故曰圓妙明心性則即明而妙凝然湛寂如鏡之體故曰寶明妙性晦昧為空空晦暗中至如來説為可憐愍者孤山曰晦昧為空者迷性明故而成無明由此無明變成頑空所變頑空與能變無明二法和合變起四大為山河依報外色即成國土也以四大色雜妄想心變起衆生正報內色故曰色雜妄想想相為身想謂妄心相謂妄色色心和合五陰備矣即知覺乃衆生也溫陵曰正原迷倒之由也聚緣內搖等者妄有緣氣於中積聚內則隨想搖蕩外則逐境奔逸此特雜妄緣塵昏擾之相而人以為自心體性得非迷哉既一迷此則決定以心為在幻質之內曾不知妙明真心範圍天地包含萬象乃認之於蕞爾身中何異棄彼無邊剎海認一浮漚以為全潮之體溟渤之量哉補注曰背真逐妄如棄海認漚執妄為真如認漚為海阿難白佛言至未敢認為本元心地吳興曰前破妄心已責因聲分別之性今阿難重以緣心為問者欲顯真性無能所之相也既於緣心已離粗執是故但言未敢認為本元心地溫陵曰因聞法音悟妙明心本來圓滿了無遺失故曰常住心地然情猶鹵莽見未精明尚以能聞緣心為所悟本性此固常情疑混根於心而難拔者故願佛與拔之佛告阿難汝等尚以至無所了故汝亦如是真際曰以能緣心緣佛法音認為自性非自性也以此法音但是所緣聲教故吳興曰此指月喻雖遣所標之指正簡能緣之心以阿難云現以緣心允所瞻仰故由是經文惟破分別之性良有以也泐潭曰因聲而有分別者緣心耳非心之真也因境而有妄見者緣法耳非法之性也因境妄認則展轉迷緣事事失真孤山曰人喻如來手指喻聲教月喻真理示人喻化衆生也教詮真理理是衆生之心聞教自合觀心離指方能識月若以分別我説法音至拘舍離等昧為冥諦携李曰緣塵之心離塵無體故謂冥溫陵曰分別緣心離塵無性若過客耳常住真心則無所去若亭主也斯則下躡阿難之意廣明也聲分別心指聲上緣心即悟佛法音者也分別我容謂色上緣心即允所瞻仰者也蓋言非但聲分別心離聲無性色分別心離色相外亦無其性如是乃至等即兼舉六塵緣影皆無自性也一切皆無故非色對緣妄有故非空既非色空冥然莫辨於是外道昧為冥諦拘舍離即末伽黎異化也離諸法緣無分別性至妙明元心云何無還溫陵曰此結前起後也真際曰前文已説如是見性是心非眼故然其見精真妄猶雜所以廣約緣塵簡出真性披沙若盡金體自純吳興曰此問心性云何無還向下別指見精為不還者佛告阿難且汝見我至今當示汝無所還地吳興曰阿難所問妙明元心云何無還而佛以見精為答者以真心無朕發悟良難故託見精方便開示此雖屬妄切近於真如第二月取辟非遠應知此見亦是前來緣塵之見孤山曰且汝見我見精明元全指阿難對境之見也此之見元自妙精明心而出故云雖非妙心如第二月蓋第二之月實則一體因揑成異譬見精妙心本無二相由人二之也月影則端有二相故云非是真月喻妙精明心第二月喻見精明元水中影喻緣塵分別阿難此大講堂至澄霽斂氣又觀清淨吳興曰此八緣中七緣皆就能映色根論之惟分別緣則於七境而起分別是故經文列在中間蓋通上下也補注曰嶽師前云緣塵分別之性則破云有還者又見乎此真際曰欲示無還之性先指可還之相此八但是舉要而已阿難汝咸看此諸變化相至是故如來名可憐愍真際曰本因者日為明因黑為暗因隙為通因霽為清淨因吳興曰見性不還猶喻二月此見屬妄將亦須還惟有真月所喻真性誠不還耳下文云但一月真中間自無是月非月又云見見之時見非是見豈非此見亦可還乎問此還何所答還無明也由無明故而有能見無明若破此見即還起信論云若離業識則無見相厥旨顯然也溫陵曰明暗通塞緣空清各還八因能觀八種見精明性當還何所則復見緣者分別心生則見色心諸緣也若還於明下謂若有所還則隨境去無復能見矣境自有差見性無別則不隨境明矣諸可還者下結示無還實汝真性所謂萬像之中獨露身者也阿難言我雖識此見性無還云何得知是我真性吳興曰此問意者如云雖識二月何謂真月携李曰雖知見精無還而現與物雜未能甄辨佛告阿難吾今問汝至衆生洞視不過分寸孤山曰那律見三千大千世界如觀掌果此云閻浮且從近示耳吳興曰菴摩羅云難分別其果似桃非桃似奈非奈故泐潭曰此敘有五一聲聞二羅漢三菩薩四如來五衆生意明四聖六凡見量雖異見精不殊皆可即物像而決擇之也阿難見未離欲故曰未得無漏清淨初禪即色界之首離欲天也那律即無漏羅漢修得天眼能見大千故觀閻浮如一顆耳衆生不過分寸者屏帷之隔即不能及也長水曰不過分寸者隔紙膜不見外物隔皮膚不見五臟也阿難是諸近遠諸有物性至此精妙明誠汝見性孤山曰此寄見性之遍以顯真性之遍也吳興曰世尊恐阿難認此見性既周外物仍謂外物同我能見故下文破之吳興曰阿難所疑雖識見性而未知真性如來所答豈不顯真但由見性似在於內真性必周於外佛欲示之故指一切物象皆是見精所矚矚既斯遍性何攸局若見是物則汝亦可至何不見吾不見之處真際曰若汝認見為物吾見亦同是物汝應可見溫陵曰同見者依物之迹也不見者離物之體也若謂吾汝同見一物是見吾之見特迹而已吾當離物不見之時其體何在既無處可見定非是物矣若見不見自然非彼不見之相補注曰彼不見之相本自無相豈汝所能見哉溫陵曰縱使妄意謂能見吾不見者終自非是彼不見相若不見吾不見之地自然非物云何非汝長水曰此之文意展轉結歸應有五重經文存三而隱二意資中曰若不見吾不見之地亦不見吾見處既不見吾見處吾見自然非物吾見若非是物汝見亦非是物汝見既非是物云何非汝真見又則汝今見物之時至并諸世間不成安立溫陵曰又約物我雜亂辨見非物也泐潭曰若見是物則物應有見而有情無情體性錯亂不可分辨故曰不成安立則見非是物又可明也諸世間謂衆生及器通指有情無情也阿難若汝見時是汝非我至性汝不真取我求實真際曰見性雖同各自受用一室千燈光豈有別而彼此自照各不相離孤山曰性汝不真等謂真性在汝而自不能知其真翻取我言以求其實迷之甚責之深溫陵曰牒上以顯真性也是汝非我者明見體不與物雜也若悟見體不與物雜則了知見性廓然清淨周遍法界即真汝性何疑不真而求質於我耶此結答云何得知是我真性之問也阿難白佛言世尊至我今不知斯義所在孤山曰既觀初天則惟見一四天下言娑婆者舉其通名耳非指大千也補注曰前文泛敘見用意顯真性本來周遍特聖凡見量之不齊耳今阿難以所觀廣狹而疑見體舒縮故有斯問携李曰此躡承佛神力能見初禪之事為問以所視廣狹而疑見體舒縮蓋未能親證徒以情器量度故也四天宮與日月齊所視之廣故遍娑婆國精舍則狹戶堂又狹矣一界即娑婆也佛告阿難一切世間至義性如是云何為在孤山曰方圓因器不在虗空大小由塵何關見性是故責言云何為在泐潭曰器有方圓空無變異既無變異何有舒縮云何為在者見體如如不容情器妄度也溫陵曰一切世間則根身器界之類大小內外則一界一室之類諸所事業則舒縮夾絶之類此總舉萬法皆屬前塵與吾靈覺自不相涉是故前塵大小見無舒縮辟如下器喻前塵空喻見體也阿難若復欲令入無方圓至更除虗空方相所在資中云若復欲令入無方圓等空體無方喻見性無二也以虗空無方圓可除況見性無大小可還惟言方者義攝於圓佛語之略耳孤山曰空性無動寧有出入因器去留強云出入溫陵曰離塵觀性自得本真不勞功用若如汝問入室之時至寧無續迹是義不然溫陵曰既非可挽定非可縮既非可續定非可斷義既不然無用情計一切衆生從無始來至遍能含受十方國土補注曰前云認物為己今云迷己為物前乃就妄擇真且言物與己異故斥自身皆謂之物今將以真融妄應知萬物皆己萬物皆己而迷以為物故失本心為物所轉而見內外之殊大小之異也孤山曰迷己為物謂失性隨塵也為物所轉謂因而倒妄也為物所轉者如空隨器變故於是中觀大觀小而終為衆生能轉物者如除器觀空故即心圓明遍含國土而即同如來蓋毛端國土本非小大含容之理不假神變但除情器則廓爾現前也阿難白佛言世尊至先所難言物能見我携李曰此皆即迷情而難辨也溫陵曰物能見我謂見在物而不在身是物能見我矣孤山曰向云迷己為物失於本心故為物轉若能轉物則同如來是則所見山河皆我妙性故云今此妙性現在我前此領旨也見必我真下阿難尚存能所謂所見既是真性則我能見復是何物若謂身無見性而今分別非虗若言現前是見則彼之外物別無心智反辨我身若彼外物實我是心現今能見則成外物是我內身非我佛告阿難今汝所言至佛言如是如是携李曰通辨萬物無是見者若空若物總舉色空諸法詳辨也初言見精次言見元後言精見者此見本乎妙精明心故通言精從心首出故曰見元依用指體故曰見精依體指用故曰精見林渠猶林泉也溫陵曰物無是見故雖大聖不能即物剖辨意須離物矣長水曰如是如是者印其不能分出見性也佛復告阿難如汝所言至佛言如是如是携李曰見非是物方有所見物若即見則無所見是萬象中無非見者可剖而出也溫陵曰若樹非見何能見樹若即是見樹當名見云何名樹然前斷為無是見者既不中理故復思惟無非見者二義無定佛皆許者以色空等象如虗空華本無所有不可定指也是時文殊師利法王子至於其中間無是非是資中曰二種者精明見元及前緣色空是非二義也溫陵曰佛意為顯見與見緣如虗空華於中本無是非是義然此非有學小智所及故必須文殊請明也佛告文殊及諸大衆至云何於中有是非是三摩地名妙生菩薩得此定故立妙生號而妙生者即文殊也以此定之人發此定之問溫陵曰自住三摩地即自性首楞正定也聖人住是定中了見萬法惟一圓融清淨寶覺曾無非是此正答所問也見根也見緣境也所想相識也根境識三攝盡萬法夫能了諸緣元一寶覺無是非是則從前真妄虗實倒心緣影疑異分別之情豁然而蕩矣文殊吾今問汝如汝文殊至是文殊者為無文殊吳興曰問意有三如汝文殊一也更有文殊是文殊者二也為無文殊三也吳興曰此示一真法性本無是非也如汝文殊者舉本無是非之體也更有文殊是文殊者離增益杯也為無文殊離減損也如是世尊我真文殊至於中實無是非二相吳興曰我真文殊答第一義例立菩提妙淨明體也無是文殊答第二義例破色空是見也何以故下釋成上義然我今日非無文殊答第三義例破色空非見也於中實無是非二相總結破意泐潭曰故曰我真文殊無是文殊蓋若有是者我則非真矣所謂才有是非遂失本真也則二文殊者明有是則有非也然我以下明雖不立是亦不墮非於當體中實無二相夫真無是非是非由妄若謂色空是真見者斯乃從妄辨真對於無妄之真則成二義佛言此見妙明至中間自無是月非月吳興曰前第二月別喻見精明元今通喻色空及與聞見者由文殊對揚既無二相復舉月喻以遣妄情携李曰月本無二妙圓真心寧有聞見是非耶溫陵曰妙明之見如所謂無文殊也空塵見緣如所謂是文殊也菩提心如所謂真文殊也色空聞見如所謂二文殊也皆依淨圓真心而起故如第二月當體全虗無空辨詰知不容辨但造真是非自亡是以汝今觀見與塵至故能令汝出指非指吳興曰物為所指見非可指真性俱離故云出指非指携李曰是空是見名為可指非空非見名不可指妙覺真精此相離故楞嚴經曰自住三摩地中溫陵曰見與塵指妄根妄境也觀見塵而發明終沉妄想不出是非由真精而發明可出是非得無分別出指非指言是非雙泯也阿難白佛言世尊至獲真實心妙覺明性資中曰外道通稱梵志按灰苦行外道也吳興曰向云我今觀此覺性自然今云與彼自然云何開示蓋言今之自然似非昔之因緣則與外道自然云何分別耶溫陵曰先引佛説起疑也楞伽會上為大慧菩薩説因緣義以破外道自然之執非彼境界者非同外道所見也楞伽雖説因緣破彼妄執今觀覺性有真自然體遠離倒妄則似非因緣矣佛告阿難我今如是至見性斷滅云何見明孤山曰約明暗色空推自然之性謂以明為自體則性一於明應無見暗謂性非自然之體則因緣之性俱為情計可知溫陵曰釋非自然也自然謂自體本然也自體本然則不隨境變今皆隨變非自然矣阿難言必此妙見至緣明緣暗同於空塞孤山曰阿難始疑妙性同外自然既聞逐破則謂如佛音説正因緣義但未知妙性云何符合耳真際曰因親緣疏故分二門溫陵曰汝言因緣下釋非因緣也假物為因循物為緣既無定處非因緣矣當知如是精覺妙明至離一切相即一切法吳興曰非因緣下不言非不因緣者以此中正破因緣故且置之無非不非無是非是者此顯覺性本無非與不非亦無是與非是離則顯真非俗即乃觸境惟心溫陵曰疊拂遍計直示精覺也因緣自然是非算相皆是妄情遍計分別精覺妙明本無是事故曰離一切相遍計既離則圓成實體觸處現前故曰即一切法祖師所謂但離妄緣即如如佛又云是非已去了是非裏薦取諸離一切相即一切法之意也汝今云何於中措心至虗空云何隨汝執捉溫陵曰結上文而責滯情也精覺不可措心如虗空不可措手阿難即從座起白佛言至諸因緣相非第一義孤山曰此又特起因緣之義以覺衆生溫陵曰緣生之法因空而有因明而顯因心而知因眼而見是乃世間名相於第一義皆為戲論阿難吾復問汝至二俱名見云何不見吳興曰若必見暗等與初卷眚人覩暗見性是同所破有異前顯見性是心且破眼根能見今顯見性非明廣破因緣能見破緣既廣顯性實深由是下文談見見非見溫陵曰因三種光而後能見名和合相非真見體當知真見非和合相不逐緣生不隨境滅故世尊始則詰之曰云何無見漸核真見也繼則詰之曰如是二相俱名不見逆質俗情也三則詰之曰云何不見順顯真見也明暗自奪見不暫無比即不逐緣生不隨境滅者也是故阿難如今當知至見塞之時見非是塞補注曰此明離緣之見即是精也於下文則遣之矣孤山曰明暗空塞皆屬緣塵各非見體四義成就汝復應知至無得疲怠妙菩提路溫陵曰四義成就等結上起下也汝等下責而勉之之辭也清淨實和即真見也阿難引世尊常説因緣以為問難世尊重拂因緣發明真見乃復責而勉之可謂詳且明矣然阿難終於慧目未開覺心未淨故又起後章之問也溫陵曰上明見非是明乃至見非是塞義既成就次復應知見見之時見非是見蓋知明暗之非見則雖悟見體離緣而未見見體知見見之非見則悟見體離相而真見見體矣夫見情屬妄何以真見復見於妄乎蓋見精者映色之性也見雖屬妄其性元真當知見見之時無別所見只是見於見中之性耳然則若未見性性在見中同名見精若能見性性脫於見方名見見若見體尚猶離見而見不能及況諸言説能及哉離緣離相言説不及是謂清淨實相妙菩提路而聲聞但局名相不能通達故勉令善思勿疲怠也前文躡迹廣明身心真妄意在發正知見顯如來藏而學者見見未明覺心未淨故下文重開慧目再爭餘塵使真精瞭然則如來藏存於目擊矣阿難白佛言世尊至心猶未了汝今諦聽吳興曰阿難所迷心境轉細如來所示觀照愈深故曰微密真際曰奢摩他三止也微密觀照三觀也經家所敘則先慧而後定如來所告則先定而後慧用顯圓融止觀體無二也阿難一切衆生輪回世間至二者衆生同分妄見吳興曰此因阿難問見見非見故發明二業之疑補注曰別業者分人妄見也同分者多人妄見也故文先引別業且喻阿難一人眼根之妄次連同分廣喻十方衆生根身器界同一妄耳溫陵曰二倒見妄即同別二見也由此見妄循造妄業故云當處發生隨業受報人天諸趣故云當業輪轉泐潭曰別業言起惑之異妄逐緣影迷失正見同業言感妄所同妄隨生死淪替本覺云何名為別業妄見至別有圓影五色重疊孤山曰目喻本是真智燈喻本具真理赤眚喻妄心圓影喻妄境境謂五陰故云五色重疊吳興曰目有赤眚則於燈見重疊之色見有妄病故於境起差別之惑於意云何此夜燈明至見圓影者名為何等溫陵曰惟彼見者目眚所成喻差別妄見非由境起亦非根起皆是衆生見病所成也補注曰五色圓影既非燈色又非見色惟彼見者目眚所成喻五陰妄境皆是衆生妄心所成也惟眚之觀謂獨有眚者見之也名為何等謂若是見色見已成色則彼眚人見圓影者不得名為見矣色即影也復次阿難若此圓影至云何眚人目見圓影補注曰此合上一節難破圓影一即燈見二離燈見至下文牒結以顯其妄也溫陵曰上即燈見既無實體此離燈見又無定處足知其妄矣是故當知色實在燈至何況分別非燈非見孤山曰色實在燈理體本真也見病為影妄心成境也影見俱眚心境皆妄也見眚非病謂有智眚人知因目眚終不執言圓影實有故雖有眚不為見病也辟圓初心無明雖在而達無明本自不有則無妄境可得也吳興曰如來舉此推破性執者正欲引例阿難目觀山河等皆是妄見義在下文其昭昭矣孤山曰燈有色而無影影由目眚之為智有照而無妄妄由見病所起知影由見病之為則影與見俱眚病耳而見眚者自非病也見眚者即見體也見體本自無病則影見之眚皆為浮妄了不相涉故不應執言是燈是見亦不應執非燈非見如第二月非體非影全即虗妄故不應窮詰也是燈句謂圓影由燈見而有即因緣義也非燈非見謂圓影離燈見而有即自然義也前文已破此重責之故曰今欲名誰等携李曰體謂真月影謂水月云何名為同分妄見至本所不見亦復不聞資中曰不祥氣現惟災地見之乃同業妄感也彼無災地不見不聞喻有漏境界惟妄覺之見即同業妄見也彼無漏者見本清淨故釋迦化土現淨穢之不同諸天飯食隨福德而有異也泐潭曰暈適佩玦日月之災象也彗孛飛流星辰之災象也負耳虹霓陰陽之災象也惡氣還日為暈日食曰適所謂適見於日月之災也珮玦謂妖氣近日如環珮之狀星芒偏指曰彗如彗也芒氣四出曰孛孛孛然也絶迹而去曰飛光迹相連曰流陰陽之氣或背日如負旁日如耳或明而為虹暗而為霓阿難吾今為汝以此二事至然見眚者終無見咎興福曰二事者別業眚見同分不祥也法喻互顯曰進退合明長水曰喻別業之妄咎由根起非由境也雖由根起特根之妄非見之妄故曰終無見咎溫陵曰圓影無實則似境而已乃見勞目眚所成非燈色所造也例汝今日以目觀見至本覺明心覺緣非眚補注曰以眼根及山河等境俱例圓影然則所指見病即無明也無明即覺明也上舉圓影無實乃目眚所成例今根境無實乃無始無明所成見與見緣下牒顯而注釋也溫陵曰見即根見緣即境此根與境雖似現前實有而元非實有元我覺明見所緣眚之所成耳見所緣三字釋成覺明也此一見字即能見分謂此覺明能見其所緣者即眚也覺見即眚等謂有覺有見即為眚病惟吾本覺明心能覺諸緣者非眚也蓋本覺如好眼覺明如眚病根境如燈影耳吳興曰無始見病如目眚也以法言之則阿賴識能見相分以惑言之正屬無明覺所覺眚覺非眚中至性非眚者故不名見補注曰覺所覺下牒上各緣非眚之意釋前見見非見之疑也吳興曰云何復名覺聞知見者顯其離妄亦責其未悟也又阿難云而今更聞見見非見重增迷悶故今再示覺非眚中此實見見也閲此文者當曉大途真際曰所覺即覺明等也今吾覺其所覺是眚而吾真覺非墯眚中此實見見之時見非是見也真見如是云何復以覺聞知見眚中之事而名之哉是故下重明眚事彼見下重結見非是見也資中曰皆即見眚非見眚者言可見之法皆即眚病非是見體彼見真體本非眚類故不名見阿難諸衆生同是覺明至和合妄生和合妄死吳興曰真妄和合故有生死偏言妄者真如在迷故溫陵曰合顯器界根身無非見病和合妄起也覺明無漏妙心即依真起妄者若能遠離諸和合緣至清淨本心本覺常住溫陵曰此示以開慧目淨覺心之要吳興曰不和合者有似自然下文所破其義𮨇異阿難汝雖先悟本覺妙明至非和合生及不和合携李曰前于妙明本覺疑同因緣自然既與辨質而未明證道始覺非和合生及不和合是為覺心餘塵故再與辨之使明淨也補注曰阿難前云因緣自然諸和合相與不和合心猶未開如來乃就同別二見文中重破因緣自然二種之執意謂阿難之心必已悟矣但和合等義疑猶未明故此下因辨覺元而重與明之先悟者已悟也阿難吾今復以前塵問汝至為與通和為與塞和溫陵曰則汝下意謂設有所和即涉妄塵而不名妙淨矣吳興曰菩提心者覺性也上文云而猶未明如是覺元非和合生等古人以佛果菩提解者謬矣若明和者且汝觀明至及諸群塞亦復如是真際曰此章皆明浮塵幻相一無實體不容穹詰孤山曰性謂見性見被明雜豈得名見明被見雜豈得名明和雜既失明性兩名則知謂見和明不成義理故云和明非義彼暗與通下知非與明和則餘皆非也資中曰明屬前相見屬內心齊何處所而論具雜見之與相目擊可分明見相雜作何形像溫陵曰若非下謂明若非見不能見明此疑若相雜也明若即見誰為能見又非雜矣必見下謂惟見與明體必圓滿不合相和蓋和則間雜不圓滿矣見必異明下牒上結成非和也復次阿難又汝今者至及諸群塞亦復如是資中曰上明和義如水和土今明合義如蓋合函興福曰既不離明應無見暗今既見暗則非合明溫陵曰和則雜而不辨合則附而不離合則不離故明相滅時見亦隨滅不復合暗若不合暗而能見暗則與明合時應非見明然既不見明云何言與明合云何了明非暗耶合義不成則菩提心非和合起矣阿難白佛言世尊如我思惟至及諸群塞亦復如是真際曰若和合不成即非和合形對必然故也此計真妄二法了不相觸溫陵曰若非下謂和則同而無畔非和則異故必有畔且求畔不得非非和矣阿難下謂相及乃有畔畔義不成非非和矣又妙見精非和合者至及諸群塞亦復如是吳興曰非和約體不相入故以際畔推之非合約性自差別故以乖角破之資中曰自徵心辦見以來齊此廣破人執此下陰入此界等文破法執也溫陵曰以為非合則根境乖背既不知明亦不顯見二體既無從何甄別合與非合之理耶阿難汝猶未明一切浮塵至迷悟生死了無所得問真常之性人人本具既無去來生死奈何今之實有邪資中答不真常則有真常則不有辟之空水目病則華風擊則泡豈其真常若晴明澄湛乃謂真常于明湛中靜求華泡夫何所得能審乎此則不疑聖言惟務了幻妄而復真常溫陵曰明暗通塞合非合理皆所謂浮塵幻相和合妄起和合妄滅故曰當處出生隨處滅盡本無有生亦無和合則幻妄稱相而已幻無自性依真而立如華起空全體即空如泡生水全體即水故曰其性真為妙覺明體近取諸身遠取諸物莫不皆然故曰如是乃至等也如來藏者當人法身妙性也依果而稱曰如來含攝衆德曰藏未嘗去來曰常住暗不能昏曰妙明不隨生滅曰不動無不遍足曰周圓妙萬物而至神性一切而不異曰妙真如性能見是性則迷悟生死了不可得蓋由離生滅斷常之見而得圓妙藏性之體也孤山曰五陰等諸經皆列三科謂陰處界以對愚根樂各有三故而今有四更加六入只是破十二處中內六是耳隨機增減何必定三此並色心開合之殊廣上浮塵諸幻化相也阿難云何五陰本如來藏妙真如性資中曰色受想行識五者成體蔭蔽妙明曰五陰長水曰梵語塞健陀此云蘊古翻為陰蘊謂積聚陰謂蓋覆積聚有為蓋覆真性阿難辟如有人以清淨目至色陰當知亦復如是溫陵曰狂華喻色陰狂相喻色境皆妄感也携李曰淨目晴空喻淨智觀妙性故逈無所有勞目華空喻妄因緣幻色故別見狂相此色陰所起也孤山曰淨目況本具真智睛空況本具真理惟睛虗即理智一如也迥無所有絶九界妄色也其人喻衆生也背真合妄故曰無故不動目睛妄心取著也瞪以發勞妄惑潤業也於妙性中現九界色故曰於空見狂華等阿難是諸狂華非從空來至云何晴空號清明眼泐潭曰若有出入下辨狂華不因空生明色除不因境有如若目出者下辨狂華不因目出明色陰不因根生也孤山曰圓覺謂非惟惑此虛空實性亦復迷彼實花生處是矣溫陵曰若有出入則有實體故非虗空非空則實故如阿難體更無所容若華從目出則得目之性故應有見今旋時既不見眼又不翳眼非目出矣又若華從目出則華在空時目應無翳云何見華目尚有翳必見晴空無華方號清明眼邪是故當知色陰虗妄本非因緣非自然性資中曰若知華相即空則顯色陰本如來藏溫陵曰既了幻華無因當知色陰虗妄本非因緣自然即如來藏妙真如性餘四例此阿難辟如瀑流波浪相續至行陰當知亦復如是携李曰行固藏生從妙湛流出而明暗色空皆入識真體故以流水為喻溫陵曰妙湛妄動隨境轉徙念念遷謝新新不停故名行陰而辟瀑流也以念念生滅後不至前故曰不相踰越阿難如是流性不因空生至本非因緣非自然性資中曰若因水有下開若因其水別有流性因果性別則瀑流性不㡴是水能有是水所有是流一相若殊俱㡴現在溫陵曰牒釋流性不因空水非即非離以明行陰無實體也有所有相謂流應離水別有體相也空非有外水流其間水外無流流終依水則非離空水矣阿難辟如有人取頻伽瓶至識陰當知亦復如是携李曰頻伽好色鳥也瓶形象之孤山曰瓶喻妄業空喻妄識業牽識走如瓶擎空行捨身受身喻以遠行現陰如此國中陰生陰悉如他國泐潭曰瓶作頻伽鳥形有形無實譬衆生妄身也滿中之空譬識陰也性空真覺周遍法界一迷為識故局在妄身之內如瓶中之空耳內外一空喻性識一體塞其兩孔喻妄分同異也空無往來不可擎餉以隨頻伽瓶故妄有千里之行他國之餉喻性無生滅無捨受以依幻妄身故逃形於此託生於彼此迷性成識妄隨流轉之狀也阿難如是虗空非彼方來至本非因緣非自然性資中曰此明性無往來無出入也計有出入皆為虛妄生滅去來為如來藏此楞伽以藏識為如來藏也孤山曰虗空非從彼方來入此方若瓶盛空從彼入此何故彼方不見空少此方不見空出身心萬法即如來藏妙真如性道嫌揀擇理忘情謂凡有言説皆為戲論擬心動念盡涉迷倒大覺將與覺之故此卷之初權且明正倒辨緣影擇見精一就其迷倒情計為之拂心眼之塵翳洗肺腸之垢濁使心境灑落真妄兩忘然後融會入如來藏遂知根塵處界法法無非妙真如性此第二及第三卷大旨也大佛頂如來密因修證了義諸菩薩萬行首楞嚴經第三復次阿難云何六入至同是菩提瞪發勞相資中曰六根吸塵曰入問何不直就根塵推破見性而須指前勞目之事乎携李答夫根塵遍迷悟必從要故指凡夫易解之妄事用開阿難未了之執情向下塞耳聞聲畜鼻覺觸例亦如是吳興曰前色陰中辟如目睛瞪以登勞則于虗空別見狂花等相蓋以目喻真以勞喻妄以華喻色今指前喻故云即彼目睛等兼目與勞下斯取前文能喻之根便為此中所喻之法以彼勞目正是眼入虗妄之相故當知眼入乃至意入皆如空華故六入文並云同是菩薩瞪發勞相因于明暗二種妄塵至本非因緣非自然性補注曰按環師科經此有三科即彼目睛下依真起妄因于明暗下辨妄無實是故當知下了妄即真蓋謂妄無自性全體即真也餘五例此溫陵曰因塵發見因根吸塵故名眼入然離塵無體足知虗妄乃至云非明暗來非根出等既無所從則非因緣自然本如來藏妙真如性矣阿難辟如有人以兩手指至同是菩薩瞪發勞相吳興曰辟如者此以假設其事曉訓令悟故云辟如非取比况之義也下文亦爾溫陵曰指本無聲耳本無聞妄相感觸故頭中作聲耳入之妄皆如是也必依指喻者明凡聲本無由妄感觸非感非觸彼此寂然則如來藏本然真妙矣耳勞因塞乃至意勞因習妄同眼勞故例稱瞪發因于動靜二種妄塵至本非因緣非自然性真際曰色受想行識眼耳鼻身心及地水火風空皆無所從來無所至去緣合則有緣離則滅如幻如化故云當處發生隨處滅盡此也泐潭曰有聞成性謂有所聞則成有性孤山曰耳因動靜發聞猶目因明暗發見也諸經所説對聲有聞緣明有見今文了義靜亦名聞暗亦名見鼻聞通塞意知生滅例亦如是阿難辟如有人急畜其鼻至同是菩提瞪發勞相溫陵曰畜縮氣也冷因畜有不畜本無鼻入之妄皆如是也吳興曰機者弩牙也根有發聞之義故取譬之因于通塞二種妄塵至本非因緣非自然性溫陵曰鼻聞通塞亦猶耳聞動靜而知覺以塵為相故離彼無有則非惟緣彼而生而亦即彼為體故知明暗動靜乃至離合生滅之塵與今見聞覺之性混而為一本如來藏中妙真如性矣阿難譬如有人以舌舐吻至本非因緣非自然性資中曰吻非舌甜因勞妄有故不動之時淡性常在舌入之妄皆如是也溫陵曰口之以味性也以舌取味曰舐熟蚳令勞甚言取著之狀阿難辟如有人以一冷手至本非因緣非自然性資中曰身入之覺由觸所顯蓋以離觸之時覺知此身無合之覺是以合覺顯於離知也溫陵曰身入生觸然觸無自性猶如二手冷熱相涉兩無定勢足知其妄也手不自觸因合覺觸故曰合覺之觸合不自合因離知合故曰顯於離知涉勢若成等者謂以熱涉冷使冷成熱亦則勞觸而已阿難辟如有人勞啳則眠至同是菩提瞪發勞相資中曰意入主於憶知憶知生於寤寐故托睡寤以明也補注曰意以生滅為性而其體不出憶忘眠寤之境由四相妄遷名曰顛倒吳興曰寤則覽塵斯憶睡則失憶為忘又睡中有夢寤中有忘皆是覽塵失憶之相憶之則生忘之則滅故下文云因于生滅二種妄塵也以妄對真即是顛倒此二妄塵復為生住異滅四種細相吸習此相中歸意根四相剎那前後不雜故曰不相踰越因于生滅二種妄塵至生滅二塵畢竟無體溫陵曰意生覺知而根潛身中故云集知居中意著法塵而想像內發故云吸撮內塵泐潭曰眼等五根但緣現境惟意知根能緣過去乃是流入五根不及之地雖通兩釋孤山義為正録之孤山曰前舉四相此惟二者以生攝住以滅收異而且以憶者為生忘者為滅內塵法塵也見聞逆流者以憶故則能逆緣落謝五塵即覽塵斯憶也流不及地者以忘故則成緣於思不及處即失憶為忘也如是阿難當知如是至本非因緣非自然性補注曰將何為寐令誰受滅為受二字當作知字寤寐當互破但文略耳長水曰覺知之性離斯二者故知空華資中曰列子云其寤也形開其寐也形交交即合也寤寐二相自是形之開合汝覺知性則無別體故云同於空華復次阿難云何十二處本如來藏妙真如性興福曰六根六塵名十二處處為生門心心所法於中生長故名為處孤山曰前六入破六根雖以塵對辨而正意在根今十二處雖根塵互破正破在塵後十八界雖根境識三相對推破而正意惟在六識也阿難汝且觀此祇陀樹林至本非因緣非自然性泐潭曰樹林泉池色也能觀此者眼也吳興曰初五陰中以喻比法用破執情次六入中指假設事顯其妄相今十二處乃至七大即於現前見聞之境及近所目擊者示其藏性是則經文從疏泊親去假就實善巧開發之意了然可別矣溫陵曰眼能生色則眼為色性然見空之時既無色相則色性應銷眼中之色性既銷則顯發一切都無色相矣且色空二法對待而顯色相既無何以顯空故曰誰明空質然則計眼生色處者妄也空亦如是者因色例空亦無定處也若復色塵下謂色能生見則觀空之時見無所生故曰銷亡亡即無見誰明空色然則計色生眼處者妄也長水曰此明眼色二處俱無生也阿難汝更聽此祇陀園中至本非因緣非自然性孤山曰若無來往下謂聲不來耳耳不往聲聞義不立此見耳與聲二處無生也溫陵曰如我入城祇林無我喻聲來耳邊則餘處無聲然千衆皆聞則聲處無實矣若復汝耳下謂如我歸林城中無我喻耳往聲處則餘處無耳然異音皆聞則耳處無實矣阿難汝又嗅此爐中栴檀至本非因緣非自然性携李曰此中義理稍難成立且鼻舌身三者是合中知也設四十里內聞香亦是香有殊勝之力其氣遠騰彼合知處久久方聞長水曰此見鼻與香一處無生也溫陵曰鼻根聞香由境有勝劣故聞有遠近法華經所謂此香六銖價值娑婆世界者非以勝乎溫陵曰華嚴經有云牛頭栴檀香從離垢出若以塗身火不能燒佛言鼻非栴檀非鼻生也藉爇而有非空生也香質木也煙非木也離木離煙又遠四十里聞香豈木生哉既非鼻非空非木則無實處矣阿難汝常二時衆中持鉢至本非因緣非自然性長水曰此言苦與味二處無生也資中曰虗空無味不可辨明故托鹹以辨溫陵曰生於汝舌下謂舌無定味又非多體則味不生於舌矣石蜜沙糖也堅如沙石若生於食下謂食不自知因舌知味縱食能知則知不在汝便同他食汝無所預何名知味理既不然則味不生於食矣若生於空下謂虗空無味則味不生於空矣阿難汝常晨朝以手摩頭至本非因緣非自然性長水曰此明身觸二處無生也真際曰觸有能所方名為觸頭足一體豈名觸耶溫陵曰觸因根境能所相感而獨依根明者示萬法一體由妄分能所故有妄觸然在手在頭初無定處即身典觸處皆虗妄矣若各各有下二者合辨身觸二處皆無實矣觸則無成者謂觸須二物一則不成非所非能言皆無實處阿難汝常意中所緣善惡至本非因緣非自然性孤山曰即汝即心者防轉計也云何下難也汝心惟一云何有二根塵俱知是二心也離合冷暖者觸塵也吳興曰法若非知則非色聲若是色聲自應可知今既無知豈應藏於色空之外耶携李曰此十二處是心體根本諸根緣此以生故外論之勃路拿勃路拿者即根本義也溫陵曰善惡緣慮心也無記昏住心也意緣不出此三而吸撮內塵成所緣法故曰生成法則若即心者下謂法若即心則不屬塵既非所緣何成意處法塵非相因意知顯故問為知非知知則屬心然體異於汝又且非塵故同他心量設若非知然此法塵既非色等特由知發今既非知處當何在既色空之內無所表顯不應存於色空之外況空又非有外也則心緣意處終無實矣復次阿難云何十八界本如來藏妙真如性孤山曰界者因也種族也溫陵曰根塵識三各六分內外中為界阿難如汝所明眼色為緣至本非因緣非自然性資中曰若識因眼生則無塵可知故見非青黃云云吳興曰謂眼色共生則此識性應妄根塵兩合合則其識中離亦不成界孤山曰體性雜亂謂根境兩屬乘程族也溫陵曰若獨因眼不有色空則識無所緣見無所表界無所立非因眼矣若因色生當隨色滅色滅空現當不識知矣若亦識知則是色相遷變汝識獨存獨則無鄰界從何立非因色矣從變下牒難變則無體故界相自無若不隨變則識性常一當一於色應不識空理又不然非從色生矣若眼色兼合共生識界當半有知半無知故曰中離若中離者半合根半合境故曰兩合二義推窮皆不成界既不因色亦不兼二諸妄併除藏性自顯餘五例此阿難又汝所明耳聲為緣至本非因緣非自然性長水曰若因耳生等破勝義根也若無前境根自無知若實無知更有何識若取耳文等破浮塵根也設取浮塵之耳容有聞者若無動靜亦不成聞云何將此可見浮塵雜色觸法為識界耶則耳下雙質二根也聲能生識何假於聞若無於聞聲亦不有縱謂識從聲生又許因根有相則文聲時即是文識若不文識則非界義若文於識識則同聲既能了之識作所聞之境誰為能知知此間識溫陵曰耳識別了曰知耳形觸聲曰聞皆由動靜而發若無動靜各無所成矣知乃識之體故曰知尚無成識何形貌聞恃耳形雜物色觸聲塵而已非耳識也故曰云何耳形名為識界若謂識生於聲則識因境有自不關根然不因根聞何知聲所許聲因聞謂聲因聞許也然識從聲生聲即識矣則聞應聞識設若不聞又非界義皆不可也識為能聞聲為所聞若實聞識識則同聲已為所聞誰為能聞故曰誰知聞識能聞而無知則如草木又不可也依根依境單論既非不應二者合成識界而為中位中位既無邊界何立阿難又汝所明鼻香為緣至本非因緣非自然性孤山曰若取肉形下破浮塵根也孤山曰若取嗅知下破勝義也溫陵曰肉質之知屬身故曰無觸非鼻非空之知屬空故曰肉應非覺伊蘭臭樹也吳興曰從二物不吳下以根從境破境既有二根應成兩先定云為香為臭次責云臭則非香香應非臭意在俱文墮兩鼻之失也若鼻是一復以境從根破根既惟一境云何二二性不立識界奚存已上皆破根孤山曰中間識也內外根境也溫陵曰名身則非鼻名觸則屬身根所對之塵故曰鼻尚無名也肉質之知屬身故元觸非鼻虗空之知屬空故肉應無覺又應空是汝身則今阿難身空無所在矣此計識因鼻生者妄也若知屬香則鼻不預知知不屬香矣若香生鼻則木應無香且伊蘭之臭旃檀之香二物不來鼻作何氣則香不生鼻矣此計識因香生者妄也臭則非香下境二則根亦應二此皆遣識心分別計度也若鼻是一下以根一境則境性互奪從何立界若因香生識下不見眼鼻識因香而有應不知香若曰能知即非香生若曰不知即不名識皆不可也香非知有香下香不因根則不成香界識不知香則不成識界識界奚存問既云以香為知知自屬香豈非破境邪資中答斯蓋對根而説正破勝義下文不對根辨方破境生也阿難又汝所明舌味為緣至本非因緣非自然性孤山曰初因舌是破自生二因味是破他生三不應虛空是破無因生四舌未和合是破共生前後諸文皆爾此中最顯吳興曰鹹淡甘辛略舉四味詳則有六更加苦酢言和合者衆未共成也俱生者本性不易也變異者燒者異本也溫陵曰甘蔗等舉五味也味因舌嘗若舌本苦則無能嘗者孰為識體若舌本淡既不因境味無所生無味與對從何立界此計識因舌生者妄也識自為味謂識即味也同於舌根謂識不自嘗也又一切味下謂識因味生則味多識亦應多識一味亦應一體必味生者牒定識因味生也醎淡甘辛同為一味者結成識一味亦應一也異識既一異味既同則無分別無別則非識非識則無界此計識因味生者妄也根境合混則自性無定從何生界阿難又汝所明身觸為緣至本非因緣非自然性携李曰為身所證説名為觸觸因感物而生物無情不能知觸則知觸者溫陵曰覺觀即身識而以合離二境為緣若無緣則無識是則因境非因身也若因觸生下謂若無身即不知合離是又因身非因境也物不觸知身知有觸者徒觸不能生知因身然後知觸此明身識由根境合顯也合則當知身即觸也觸即身也若身即觸則身非身矣若觸即身則觸非觸矣身觸互奪故無處所合身則無觸位故即為身體離身則無觸用故即同虗空然則內外中間之位皆不成立矣阿難又汝所明意法為緣至本非因緣非自然性吳興曰俱舍論云集起名心籌量名意了別名識此文識心同彼第一即意根也思量兼了別性同彼第三第三即意根所生之識也彼第二亦云意者蓋識之異名耳故婆娑中明心意識三無有差別如火名焰亦名為熾亦名燒薪是知意識名同但約先後以分二叉也溫陵曰意識發於所思意根生於法塵二者皆屬前境離此則根無形識無用是必因境計根生者妄也又汝識心下又辨根識混濫不成因界也同則無復能所異則不能有識二既混濫已無自性則界無所立矣資中曰以五塵之法各配五根離五塵外意無別法長水曰法法者法塵之法也檇李曰色空動靜通塞即色聲香三塵也合離即味觸兩塵生滅即法塵然生滅但是五塵通相離五無體故云生則諸法生滅則諸法滅也補注曰所因者即法塵也所因之法自無實狀則因之生識復作何狀耶狀不有則界亦亡矣既非因緣自然是謂妙真如性也溫陵曰前近取諸身顯如來藏故依陰入處界四科以明雖悟一身未融萬法根境尚異見性未圓後復遠取諸物圓示藏性故依地水火風空見識七大以明使悟物我同根是非一體法法圓成塵塵周遍法界頌云若人欲識真空理身內真如還遍外情與無情共一體處處皆同真法界此七大之大旨也謂之大者以性圓周遍含裹十分為義所以有七者萬法生成不離四大而依空建立因見有覺因識有知故也泐潭曰前五無情所具後二有情無之今舉其七則萬法該矣然彼大性先非水火亦非空識全一如來藏體循業發現而已阿難白佛言世尊至因緣自然二俱排擯孤山曰阿難恐衆生聞音和合則滯於有聞今排擯則溺於空不達中道動成戲論故請開示溫陵曰此依權教問難由四大發起七大因緣自然之義也爾時世尊告阿難言至如旋火輪未有休息吳興曰若彼大性下破非和合之疑也以阿難既執和合疑非和合故今破之資中曰權教雖説和合都無實義蓋彼大性果非和合則如虗空不和諸色殆不然也若果和合則同彼萬變相成相續展轉虗妄又不然也旋火之輪無有實體喻虗妄相成相續之相也四大之性不和四大之相此約真如隨緣不同頑空之性也既破非和恐計和合故復破之此約真如不同變化等相也阿難如水成冰冰還成水溫陵曰直示大性非和不和之理而起後文故復召告也資中曰夫水何和而成氷氷何和而成水七大之性不因和合循業發現如此而已汝觀地性粗為大地至但有言説都無實義興福曰地者和合微塵之聚若離於心即無所得孤山曰既能析色為空亦可合空成色資中曰若空不可合色從何生故知此色本無自性孤山曰如來藏即心性中道也即俗而真故曰性色真空即真而俗故曰性空真色以真俗即中故並云性三諦圓云不一不異非縱非橫名如來藏俗則十界備矣真則生佛寂然此言理具非關事造然理必云事事豈殊理理事雙泯故曰清淨本然心佛衆生三無差別彼彼互攝一一相融故曰周遍法界隨衆生心下即如來藏隨染淨緣順差別業變造十界依正之事也世間通指九界因緣義含自他共三性自然即無因性溫陵曰塵之細者曰微細之又細曰極微微之又微曰鄰虗極微之塵猶有微色故名色邊際相折極微為七分則微色殆虗故名鄰虗泐潭曰若此鄰虗下先立理下辨羽汝今問言下此明諸變化相非和合法色合則不應名空空合則不應析色知空非和合則色非和合矣如來藏性萬法一如而循發似異遂有七大之名特體用異稱耳真空者一如之體也故必大皆言真空七大即循業之用也故曰性空真色乃至性空真識體用不二故相依互舉不離妙性故一一言性也不垢不淨曰清淨非和不和曰本然無乎不在曰周遍既非垢淨和合而能成七大萬法者但隨心應量循業發現而已后云汝以空明則有空現地水火風各各發明則各各現此隨心應量之事也背覺合塵故發塵勞滅塵合覺故發真如此循業發現之事也至於十界所正之相萬形纖悉之理莫非隨應循發者也然此規相元妄無可指陳規性元真唯妙覺明理絶情謂不容妄度故但有言説都無實義所以第一義諦擬心則差動念則乖惟居一切時不起妄念不用計度然後相職心分應也阿難火性無我寄於諸緣至但有言説都無實義吳興曰陽燧取火珠也以銅為之其形如鏡淮南謂陽燧見日然而為火是也携李曰相遠顯非和合之性無從破自然之情長水曰三物相遼火無方所凡所測度皆妄計也由體大故周遍法界由用廣故循業發現此火性真空之義溫陵曰火無自體寓物成形故曰無我衆名和合詰之各有根本真和合也火名和合詰之各無根本非和合矣優樓頻螺云木瓜林迦葉波云龜氏瞿雲云地最勝亦云日種孤山曰瞿曇星名從星立姓至于後代改姓釋迦携李曰陽燧者崔豹古今注云以銅為之如鏡之狀照物則影倒向日則火出淮南子云陽燧火方諸也論衡曰於五月丙午日午時銷鍊五方石圓如鏡中央窪紆者屈也阿難水性不定流息無恆至但有言説都無實義資中曰方諸陰物月群陰之宗氣數相感故水從出淮南謂方諸見月津而為水是也吳興曰初言汝元不知次言猶言尚言宛言全言曾而終又言元者初意恕之終意責之輕重有序也溫陵曰求則流否則息所謂流息無恆也迦毗羅等四皆外道善幻術太陰精月中之水也月望前曰白亭午曰晝方諸取水之珠也即陰燧也孤山曰淮南子云方諸見月則津而為水高誘注曰方諸陰燧大蛤也熟拭令熱以向月則水生也許慎注曰方石也諸珠也譯人今取許注故文云從珠中出等也謂林木既不吐流明知此水非從月降水非月來又非珠出不從空生則本然周遍非和合矣川澤陂池流行不息而獨言方諸者取業用言之也阿難風性無體動靜不常至但有言説都無實義真際曰僧伽梨大衣也袈裟從色得名三衣通稱真際曰阿難下辨風非應出也泐潭曰若生虛空下辨非空生也虛空當滅者謂無風時亦應無空真際曰若風自生下辨風非生彼面也泐潭曰風性動空性靜故不相參雜携李曰言法界又言國土者遍界對一人言國土對衣服言溫陵曰拂衣則動垂衣則靜所謂動靜不常也汝審下謂三性不參三性相隔求風所從杳莫可究既非衣出又非空生非生彼面了無所從非和合矣謂本然周遍循業發現得不信哉風性或作風心誤也阿難空性無形因色顯發至但有言説都無實義孤山曰西天貴賤族分四姓如此方四民剎帝利王族也婆羅門淨志也亦云淨行以守道居正潔白其操也毗舍商賈也首陀農夫也是謂四姓頗羅墮利根也旃陀羅魁膾也此又智愚之族也携李曰未鑿土前地無通達則空非無因也謂因鑿土而出則空居土外故土出時應見空入此辨明空不因土也謂空士同休則土出時何不見空同土而出又非同體矣智論云佛説四大無處不有故名為大若言大性周遍必須指事即理攝末歸本不可名而名之是謂如來藏也或有直以藏性釋於大名者一何誤哉泐潭曰空與覺亦體用不二故相依而舉一之空喻一法性也十方之空喻萬法性也由一觀萬由自觀他性無二別特形器妄辨耳溫陵曰鑿土得空所謂因色顯發也補注曰若因土出下謂虗空若因土出則鑿土出井之時應見虗空出於土而入於井今既不然矣故又破云虗空若無出入則空與土二無有異而同體矣既同體則土出井時何不見空從井出邪溫陵曰汝更下令詳察其非因緣自然也鑿空虗實謂鑿實空虗也上諸巧辨皆遣識心妄計而顯圓融真體也若此虗空下會上義而通前文也由上所明非因緣和合則知空性圓偏非生滅法一大既爾餘大皆然故通言地水火風云現前者使觸事而明無他求也若悟虗空性圓周遍本無出入即悟四大性真圓融本無生滅也吳興曰經文四大後所以點空均名五大者蓋諸經常談惟四而已此既異彼故特言之下根識中其例亦爾通名七者且依事立阿難見覺無知因色空有至或同非同或異非異長水曰此以大種義破諸見計情也携李曰此問四句一同二異三亦同溫陵曰見覺之體本自無知阿難此見若復與明與暗至但有言説都無實義資中曰上總標下詳辨相亡猶相奪也泐潭曰見性常住境性代易云何為一根境相因離明暗空則無見相云何非一資中曰明暗有差別見性無差別云何或同根塵相因而有離三元無云何為異分空分見本無邊際云何非同見無遷改境有變更云何非異溫陵曰為生為滅等者生滅同異皆因妄塵非生非異不離妄計離此諸妄即如來藏也溫陵曰阿難下辨非一體也若此見精下辨非異體也明暗相背下辨非或同非同或異非異也汝更下令詳察其性真圓融不涉諸妄也若見聞知者前於六根廣破眼見餘根並略今類通顯示其性皆遍聞即耳根覺即鼻舌身根知即意根不言覺者略也性見等者亦體用相依而舉有見有覺雖覺明之咎而體實性見用實覺精也如一下例餘根也嘗觸即舌根以味合方覺故亦名觸覺觸覺知即身意根也阿難識性無源因于六種至但有言説都無實義溫陵曰見根也相境也長水曰日中無月既無見月之識應知非是無因而有也資中曰前文詳辨意皆萃此故自根境萬法總會而旁通也長水曰覺明即本覺明心也真際曰根但照境故知鏡中識有了別故能標指溫陵曰阿難若汝下明識性非生於見亦非生於相也若生下明非生於空也若生於空則非是相亦非是見非是見則無所辨非是相則無所緣若無所緣能緣何立又處此非相非見之間識體若空則同龜毛識體若有非同物象既自無體安能有用故曰欲何分別若無下明非無因也溫陵曰見託根相託境有出可狀無出非相識何所從出邪識有分別名動見無分別名澄識動見澄性相隔異見與識隔聞知亦然皆非和合又非自然是則性真圓融不涉諸妄矣若此識心總指識大了別見聞覺知別指六識也兼彼空等總會七大旁通萬法也既本無所從則湛然圓遍地等既爾世界衆生物物皆爾不惟地等名大草芥塵毛皆可名大性真圓融本無生滅矣阿難下謂識體深潛當微細沈思不可粗浮觀得其真則悟其本如來藏矣識知皆出於性明故曰性識明知識雖覺明之咎其體實真故曰覺明真識體用不二真妄一如所以迭舉也泐潭曰七大者地水火風空見識是也按六大經獨不言見大而曰六大者合內外而言也爾時阿難及諸大衆至獲本妙心常住不滅溫陵曰自初決擇心見絲至陰入七大多方發明使悟器界萬法當體全真本如來藏是謂微妙開示也既悟器界性真圓融故身心蕩然得無罣礙悟妙覺湛然周遍法界故各各自知心遍十方也孤山曰各各自知即能覺之智也心遍十方即所覺之理也常住真心遍融十界故曰十方見十方空謂十界循業發現之空也迷妄有空比真為小故以掌葉為喻一切世間等謂依空立世界也即十界循業發現依正之法耳皆即菩提等謂十方虗空十界依正一法叵得皆我真心含裹十方者即此真心具足十界而非斷滅觀此文者豈疑無情有性無情作佛之説耶反觀下阿難大衆自觀己界正報之身也虗空巨海以況心精微塵浮漚以況己質理即若塵存而漚起事即理故若塵亡而漚滅事理不二故曰無從獲本妙心等得分真智知本覺理得未曾有謂得圓頓之解也天台智者禪法華經深達罪福相遍照於十方亦云十方即十界也
